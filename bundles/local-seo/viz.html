<script>
const DATA = [{"id": "maintenance", "type": "Policy", "title": "Maintenance Policy", "description": "Ownership, review cadence and freshness tiers for keeping fast-moving claims in this bundle accurate.", "resource": "", "tags": ["governance", "maintenance", "policy"], "body": "This bundle mixes durable principles with fast-moving product facts. This policy says who keeps it current, how often, and how to tell which claims need the closest watch.\n\n# Ownership\n\n* **Owner:** CTB Marketing (bundle maintainer).\n* The owner is accountable for the scheduled reviews below and for re-running `tool/okf_verify.py` before any export or release.\n* Each reference doc records its own `accessed` date in frontmatter; each concept records a `timestamp`. The `last_verified` date in this file is the date of the most recent full pass.\n\n# Freshness tiers\n\n| Tier | What it covers | Review cadence |\n|---|---|---|\n| **Volatile** | Named product names, eligibility thresholds, launch dates, rollout regions, API field names, protocol adoption status. Mostly the `agentic/` section. | Monthly, plus on any known vendor announcement. |\n| **Semi-stable** | Survey figures, study percentages, ranking-factor framing. The `references/` studies. | Quarterly; re-check the source for a newer edition. |\n| **Durable** | Method and detection docs, governance principles (HITL, NAP consistency, schema fundamentals). | Semi-annually, or when a dependency changes. |\n\n# Review procedure\n\n1. Run `python tool/okf_verify.py bundles/local-seo` and resolve every hard failure.\n2. Run it with `--check-urls` to catch dead external links.\n3. For each **volatile** claim, re-open the cited primary source and confirm the figure, name and status still match. Update the doc body and the reference's `accessed` date.\n4. Re-run `python tool/okf_build.py bundles/local-seo --name \"Local SEO OKF\"` to regenerate `viz.html`.\n5. Append a dated entry to the bundle `log.md` and update `last_verified` above.\n6. File or update a dated verification report (see [the 2026-06-25 report](/references/verification-report-2026-06-25.md)) when a full claim-by-claim pass is done.\n\n# Open follow-ups\n\nCarried from the latest verification pass:\n\n* Confirm whether Google has a current replacement for the earlier Maps grounding widget context token / \"Contextual View\".\n* If OTA commission or rate-parity guidance is ever required, research it by jurisdiction, contract type and named platform rather than publishing a universal range.\n", "links": ["references/verification-report-2026-06-25"]}, {"id": "agentic/agentic-commerce-readiness", "type": "Playbook", "title": "Agentic Commerce Readiness", "description": "A conservative checklist for making a local business discoverable and safely transactable by supported AI agents.", "resource": "", "tags": ["local-seo", "commerce", "gbp", "agentic", "checklist"], "body": "This is the actionable counterpart to [Agentic Commerce](/agentic/agentic-commerce.md). Readiness means publishing reliable business, offer and fulfilment data, then exposing transaction capabilities only through channels the business can operate safely.\n\n# 1. Separate local identity from retail identity\n\n* Claim and maintain each [Google Business Profile](/local-seo/gbp-signals.md) for location facts such as address, hours, categories and services.\n* Retailers should separately verify Merchant Center and, where eligible, claim their Search brand profile.\n* Do not treat a brand profile as another name for a Business Profile; they are different surfaces.\n\nGoogle's Business Agent is a Search experience for eligible US e-commerce retailers. Customisation requires a US-based store, a verified Merchant Center account, at least **50 approved free listings**, and a claimed brand profile. It uses Merchant Center data, the retailer's website and additional supplied business data. See the reference page [Google \u2014 Get started with Business Agent](/references/google-business-agent.md).\n\n# 2. Publish structured offers\n\n* Keep product identifiers, titles, descriptions, prices, availability and fulfilment terms consistent across the site and connected feeds.\n* Use appropriate [schema](/local-seo/local-schema.md) on first-party pages, but do not assume schema alone enrols a business in an agent checkout programme.\n* Restaurants should publish structured menu data. The Business Profile API supports menu-item names, prices, descriptions, dietary information and associated photos.\n* Do not rely on photos of a printed menu as a substitute for structured menu data. No primary source was found for automatic menu extraction from Business Profile photos.\n\n# 3. Expose only supported protocol capabilities\n\nIf adopting UCP, publish the business profile at `/.well-known/ucp`. The profile declares supported protocol versions, services, capabilities, endpoints, payment handlers and verification keys.\n\nA discovery document is useful only when the corresponding protocol is actually implemented. Publishing an invented or incomplete endpoint creates false capability signals.\n\n# 4. Connect operations to promises\n\n## Retail\n\nPublish branch-level [local inventory](/agentic/real-time-local-inventory.md), price and pickup terms. Availability shown to an agent must match the store.\n\n## Restaurants\n\nEnsure the ordering channel, point-of-sale system and kitchen workflow share the same menu and order state. Removing an unavailable item should update every active ordering surface. This is an operational requirement; current UCP food specifications were still described as forthcoming on 25 June 2026.\n\n## Hotels\n\nConnect the property or central reservation system to the chosen distribution channel through a supported integration. Google's Hotel Prices documentation supports availability, rates and inventory messages, along with price-accuracy and coverage reporting. This verifies channel synchronisation capabilities, but not a universal requirement to use any named property-management vendor.\n\n# 5. Keep a safe fallback\n\nWhen price, availability, identity or authority cannot be verified, the system should stop before purchase and hand the user to a human or first-party checkout. Readiness is not maximum automation; it is reliable execution within explicit limits.\n\n# Citations\n\n[1] [Google \u2014 Get started with Business Agent](https://support.google.com/brandprofile/answer/16410382?hl=en)\n\n[2] [Google Business Profile APIs \u2014 Update Food Menus](https://developers.google.com/my-business/content/update-food-menus)\n\n[3] [Universal Commerce Protocol \u2014 Specification overview](https://ucp.dev/specification/overview/)\n\n[4] [Google Hotel APIs \u2014 Hotel Prices Developer's Guide](https://developers.google.com/hotels/hotel-prices/dev-guide)\n\n[5] [Universal Commerce Protocol \u2014 Protocol and industry roadmap](https://ucp.dev/)\n", "links": ["agentic/agentic-commerce", "local-seo/gbp-signals", "references/google-business-agent", "local-seo/local-schema", "agentic/real-time-local-inventory"]}, {"id": "agentic/agentic-commerce", "type": "Concept", "title": "Agentic Commerce", "description": "Commerce in which an AI agent can help discover, select and transact with a business under explicit user authority.", "resource": "", "tags": ["local-seo", "ai-search", "commerce", "agentic"], "body": "Agentic commerce describes commerce in which an AI agent can move beyond recommendation into actions such as building a cart, initiating checkout or completing an authorised purchase. For local businesses, the practical shift is from being merely discoverable to exposing reliable data and transaction capabilities that an agent can use.\n\n# The protocol landscape\n\nAs of 25 June 2026, several distinct open protocols exist. They are not one universal, fully adopted stack.\n\n| Protocol | Scope | Primary backing and status |\n|---|---|---|\n| Universal Commerce Protocol (UCP) | Discovery, catalogue, cart, checkout, identity linking and order management | Launched in January 2026; co-developed by Google and several retailers and platforms, with public specifications and reference implementations. |\n| Agent Payments Protocol (AP2) | Verifiable authority, payment instructions and accountability for agent-led payments | Announced by Google in September 2025 with more than 60 participating organisations; public specification available. |\n| Agentic Commerce Protocol (ACP) | Programmatic checkout between buyers, agents and businesses | Open-sourced in September 2025 and developed by OpenAI and Stripe; first implemented for an in-chat checkout experience. |\n| x402 | HTTP-native, programmatic stablecoin payments | Developed by Coinbase as an open protocol. AP2 also documents an A2A x402 extension for agent-based crypto payments. |\n\n# Signed mandates\n\nCryptographically signed mandates are a mechanism within AP2, not a separate commerce protocol. AP2 uses tamper-evident digital credentials to record checkout and payment authority for both human-present and delegated transactions.\n\n# Adoption should not be overstated\n\nPublic specifications, launch partners and early production integrations demonstrate that these protocols exist. They do not establish universal merchant, wallet or payment-network adoption. A business should select a protocol only when a target channel or integration partner supports it, then preserve ordinary web and API fallbacks.\n\n# Local-business implication\n\nThe durable requirement is structured, current and actionable data: identity, offers, price, availability, fulfilment and a safe way to authorise an action. See [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md) and [Real-Time Local Inventory](/agentic/real-time-local-inventory.md).\n\nPer-protocol provenance (publisher, first-public date, canonical spec) lives in the reference page [Agentic commerce protocols](/references/agentic-commerce-protocols.md).\n\n# Citations\n\n[1] [Google \u2014 New tech and tools for retailers to succeed in an agentic shopping era](https://blog.google/products/ads-commerce/agentic-commerce-ai-tools-protocol-retailers-platforms/)\n\n[2] [Universal Commerce Protocol \u2014 Specification and ecosystem](https://ucp.dev/)\n\n[3] [Google Cloud \u2014 Powering AI commerce with the Agent Payments Protocol](https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol)\n\n[4] [OpenAI \u2014 Instant Checkout and the Agentic Commerce Protocol](https://openai.com/index/buy-it-in-chatgpt/)\n\n[5] [Agentic Commerce Protocol \u2014 Open specification](https://www.agenticcommerce.dev/)\n\n[6] [Coinbase Developer Platform \u2014 x402 overview](https://docs.cdp.coinbase.com/x402/welcome)\n", "links": ["agentic/agentic-commerce-readiness", "agentic/real-time-local-inventory", "references/agentic-commerce-protocols"]}, {"id": "agentic/ask-maps", "type": "Concept", "title": "Ask Maps", "description": "Google's Gemini-powered conversational experience in Google Maps for complex, place-based questions and actions.", "resource": "", "tags": ["local-seo", "ai-search", "google-maps", "agentic"], "body": "Ask Maps is Google's Gemini-powered conversational experience in Google Maps. A user taps the **Ask Maps** button, asks a complex place-based question, and receives a conversational answer with a customised map.\n\nGoogle announced Ask Maps on 12 March 2026. It began rolling out on Android and iOS in the United States and India, with desktop availability described as coming soon. This rollout status was checked on 25 June 2026.\n\n# What it uses\n\nGoogle says Ask Maps can draw on:\n\n* information from more than 300 million places;\n* reviews and other local knowledge from a community of more than 500 million contributors;\n* places the user has searched for or saved in Maps; and\n* route context, directions and estimated arrival times.\n\nThe experience can also help a user act on a result, such as making a restaurant reservation, saving a place, sharing it or starting navigation.\n\n# What changes for a business\n\nAsk Maps can synthesise constraints that do not fit neatly into a short keyword query: location, timing, route, atmosphere, availability and personal preferences. This increases the importance of complete, current and mutually consistent source data across the [Google Business Profile](/local-seo/gbp-signals.md), [reviews](/local-seo/reviews-reputation.md), menus, photos and first-party website.\n\nGoogle has not published a separate set of Ask Maps ranking factors. Treat recommendations about profile completeness, media and review detail as data-quality practices, not guaranteed optimisation levers. See [Generative Engine Optimization](/agentic/generative-engine-optimization.md).\n\nSource provenance for this concept lives in the reference page [Google \u2014 Ask Maps announcement](/references/google-ask-maps.md).\n\n# Citations\n\n[1] [Google \u2014 How we\u2019re reimagining Maps with Gemini](https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/)\n", "links": ["local-seo/gbp-signals", "local-seo/reviews-reputation", "agentic/generative-engine-optimization", "references/google-ask-maps"]}, {"id": "agentic/generative-engine-optimization", "type": "Concept", "title": "Generative Engine Optimization", "description": "Improving the visibility and attribution of source content in answers synthesised by generative search systems.", "resource": "", "tags": ["seo", "ai-search", "local-seo", "geo"], "body": "Generative Engine Optimization (GEO) is the practice of improving the visibility of source content in responses produced by generative engines. The term was formalised in the 2023 paper *GEO: Generative Engine Optimization*, which describes generative engines as systems that retrieve and synthesise information from multiple sources.\n\n# Applying GEO to local search\n\nThe original GEO research evaluates content visibility in generated responses; it does not establish Google Maps ranking factors. For local search, GEO is therefore best treated as a data-quality discipline:\n\n* publish clear, specific descriptions of the business, services and locations;\n* keep names, prices, availability and policies consistent across the [Business Profile](/local-seo/gbp-signals.md), website and structured data;\n* provide useful first-party evidence and cite authoritative sources;\n* maintain descriptive, authentic media and current structured menus or catalogues; and\n* make booking, ordering or contact paths explicit.\n\nGoogle has not said that any one of these practices guarantees inclusion in [Ask Maps](/agentic/ask-maps.md).\n\n# GEO and AEO\n\nThere is no single authoritative industry standard separating GEO from Answer Engine Optimization (AEO). In this bundle:\n\n| Term | Working objective |\n|---|---|\n| AEO | Make a fact or answer easy for an answer system to retrieve and present directly. |\n| GEO | Improve whether a source is used, represented or attributed in a synthesised generative response. |\n\nThe practices overlap. Both depend on accessible, accurate and well-structured source material.\n\n# Media context\n\nIn April 2026, Google introduced Gemini-generated draft captions for contributor photos in Maps. The model analyses selected images and suggests captions that contributors can edit or remove. At launch, caption suggestions were available in English on iOS in the United States, with wider Android and international availability planned.\n\nThis update shows that Maps is adding machine-generated textual context to contributed media. It does not prove that captions are a ranking factor.\n\n# Citations\n\n[1] [Aggarwal et al. \u2014 GEO: Generative Engine Optimization](https://arxiv.org/abs/2311.09735)\n\n[2] [Google \u2014 3 updates that make contributing to Maps easier](https://blog.google/products-and-platforms/products/maps/contributor-updates/)\n", "links": ["local-seo/gbp-signals", "agentic/ask-maps"]}, {"id": "agentic/grounding-google-maps", "type": "Concept", "title": "Grounding with Google Maps", "description": "Google's developer services for adding Google Maps place, route, weather and review context to AI applications.", "resource": "", "tags": ["google-maps", "ai", "grounding", "developer"], "body": "Grounding with Google Maps connects Gemini models to Google Maps geospatial data. Google states that the service can use information on **more than 250 million places** and can be combined with Google Search grounding or private data sources.\n\n# Full Maps grounding\n\nIn the Gemini Enterprise Agent Platform and Vertex AI Studio workflow, a developer enables Google Maps as a grounding tool. Responses can include Google Maps sources in REST field `groundingMetadata.groundingChunks`; client libraries may expose equivalent snake-case names such as `grounding_metadata` and `grounding_chunks`.\n\nMaps source chunks can contain:\n\n* a Google Maps URI and title;\n* a place ID;\n* place-answer sources; and\n* review snippets and review identifiers where available.\n\nSource attribution is part of the product's display requirements. The current documentation does not describe the earlier draft's widget context token or a product named \u201cContextual View\u201d, so those claims are not retained.\n\n# Maps Grounding Lite\n\nMaps Grounding Lite is a Google Maps Platform service with Model Context Protocol support. Its MCP server exposes tools to:\n\n* search for places;\n* look up current and forecast weather; and\n* compute driving or walking route distance and duration.\n\nIt does not provide turn-by-turn directions, real-time traffic or navigation.\n\n# Places API AI summaries\n\nPlaces API (New) can return AI-powered place summaries through `generativeSummary` in Place Details, Text Search and Nearby Search responses. Google describes these as brief, 100-character overviews and requires a \u201cSummarized with Gemini\u201d disclosure. On 25 June 2026, place summaries were documented for supported place types in English in India and the United States and were not guaranteed for every place.\n\n# Why it matters\n\nThese services let developers build location-aware applications with identifiable source material instead of relying only on a model's internal knowledge. They are developer products, not evidence that every consumer Maps answer uses the same API path. See [Ask Maps](/agentic/ask-maps.md).\n\nSource provenance for these products lives in the reference page [Google \u2014 Maps grounding for AI](/references/google-maps-grounding.md).\n\n# Citations\n\n[1] [Google Cloud \u2014 Grounding with Google Maps](https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps)\n\n[2] [Google Maps Platform \u2014 Maps Grounding Lite](https://developers.google.com/maps/ai/grounding-lite)\n\n[3] [Google Maps Platform \u2014 AI-powered place summaries](https://developers.google.com/maps/documentation/places/web-service/place-summaries)\n", "links": ["agentic/ask-maps", "references/google-maps-grounding"]}, {"id": "agentic/hitl-gbp-management", "type": "Playbook", "title": "Human-in-the-Loop GBP Management", "description": "A control pattern in which AI drafts Google Business Profile changes and an authorised human approves execution.", "resource": "", "tags": ["local-seo", "gbp", "ai-ops", "hitl"], "body": "Human-in-the-loop (HITL) Business Profile management is a governance pattern: software prepares a proposed change, but an authorised person reviews it before any customer-visible write.\n\nGoogle does not require this approval pattern. It is an operator control for reducing accidental, misleading or policy-breaking changes.\n\n# Control flow\n\n1. **Draft** \u2014 generate a proposed reply, post or field update.\n2. **Validate** \u2014 check required fields, policy constraints and current profile state.\n3. **Approve** \u2014 record the human reviewer, decision and any edits.\n4. **Execute** \u2014 use the relevant Business Profile API only after approval.\n5. **Audit** \u2014 store the request, response, timestamp and resulting resource identifier.\n\n# Supported candidates\n\nGoogle's Business Profile APIs document support for:\n\n* creating, editing and deleting event, call-to-action and offer posts;\n* listing reviews, publishing or replacing an owner reply, and deleting an owner reply;\n* patching supported location fields with an update mask;\n* uploading media;\n* updating eligible food menus; and\n* managing services and attributes through their relevant resources.\n\nProduct posts cannot currently be created through the documented Posts API.\n\n# Guardrails\n\n* Compare the proposed update with the latest live resource immediately before execution.\n* Reject a change if the live profile changed after the draft was approved.\n* Use the narrowest possible update mask.\n* Never fabricate customer experiences, prices, availability or review details.\n* Treat \u201creversion\u201d as a new, reviewed API update based on a known-good snapshot; there is no generic undo endpoint.\n* Keep credentials, approval authority and execution authority separately scoped where practical.\n\n# Suitable drafting tasks\n\n* review replies;\n* event, offer and call-to-action posts;\n* category, hours, service or attribute corrections supported by the API; and\n* structured menu updates for eligible restaurant locations.\n\n# Citations\n\n[1] [Google Business Profile APIs \u2014 Create Posts on Google](https://developers.google.com/my-business/content/posts-data)\n\n[2] [Google Business Profile APIs \u2014 Work with review data](https://developers.google.com/my-business/content/review-data)\n\n[3] [Google Business Profile APIs \u2014 Update a location](https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch)\n\n[4] [Google Business Profile APIs \u2014 Update Food Menus](https://developers.google.com/my-business/content/update-food-menus)\n", "links": []}, {"id": "agentic/real-time-local-inventory", "type": "Concept", "title": "Real-Time Local Inventory", "description": "Store-level product availability, price and pickup data that makes local retail results actionable.", "resource": "", "tags": ["local-seo", "retail", "inventory", "agentic", "ai-search"], "body": "Real-time local inventory is store-level data showing whether a product is available at a particular location, at what price and under which pickup terms. It helps a shopper or agent distinguish a product that exists in a catalogue from one that can actually be obtained nearby.\n\n\u201cReal-time\u201d is an operational objective, not a guarantee made by every publishing channel. Google notes that Business Profile locations can take up to 24 hours to synchronise into Merchant Center.\n\n# Consumer evidence\n\nLastmile Retail reported results from a consumer survey conducted with Greg Sterling among **1,000 US adults** about local purchases totalling **$300 or more**:\n\n* **95%** said confirming that an item priced at $300 or more is available locally before visiting is somewhat to extremely important.\n* **56%** selected real-time product availability before visiting as a factor that would influence them to choose a local option instead of remote shipping.\n* **48%** selected the option to reserve online for in-store purchase or pickup.\n* **40%** reported insufficient product information on company websites when searching online to buy locally.\n* **37%** reported being unable to confirm whether a product was available at a particular store; the same proportion reported inaccurate inventory information.\n\nThese findings are specific to the reported US survey and high-dollar purchase scenario. They should not be generalised to all markets or purchase values. Provenance is recorded in the reference page [Lastmile Retail \u2014 High-dollar local purchase survey](/references/lastmile-high-dollar-survey.md).\n\n# Minimum data\n\nGoogle's local inventory specification supports:\n\n* product ID;\n* store code matched to the corresponding Business Profile;\n* availability: in stock, limited availability, on display to order or out of stock;\n* store-specific price and sale price;\n* optional quantity;\n* pickup method, including buy, reserve or ship to store; and\n* pickup service level, such as same day or next day.\n\nThe submitted availability, price and pickup promise should match the physical store and the landing or checkout experience.\n\n# Implementation checklist\n\n* Maintain one stable product identifier across product and local-inventory data.\n* Publish availability for each store, not only at chain level.\n* Update stock promptly after sales, returns and stock transfers.\n* Show nearby alternatives when the preferred branch is unavailable.\n* Keep first-party pages, Merchant Center and the [Business Profile](/local-seo/gbp-signals.md) consistent.\n* Provide a human confirmation path for expensive, scarce or fast-moving items.\n\n# Agentic angle\n\nAvailability, price and fulfilment are decision inputs for [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md). An agent should not reserve or purchase when those inputs are stale or contradictory.\n\n# Citations\n\n[1] [Google Merchant Center \u2014 Local inventory ads and free local listings overview](https://support.google.com/merchants/answer/14615117?hl=en)\n\n[2] [Google Merchant Center \u2014 Local inventory data specification](https://support.google.com/merchants/answer/14819809?hl=en)\n\n[3] [Lastmile Retail / Miriam Ellis \u2014 Data-based Tactics for Increasing High-Dollar Local Purchases](https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte)\n", "links": ["references/lastmile-high-dollar-survey", "local-seo/gbp-signals", "agentic/agentic-commerce-readiness"]}, {"id": "local-seo/ai-search-local", "type": "Concept", "title": "AI Search Impact on Local", "description": "How AI assistants and AI Overviews reshape local discovery, and where they source business facts.", "resource": "", "tags": ["local-seo", "ai-search", "geo", "aeo"], "body": "AI assistants and AI Overviews are now a real local-discovery surface. Google's own guidance is that AI features run on the same systems as ordinary Search \u2014 there's no separate \"AI SEO\" trick, and normal indexing/eligibility is the floor. So the work is mostly good SEO done well, plus attention to where AI gets its facts.\n\n# What the data suggests\n\n* AI traffic tends to **convert well**: Seer Interactive's case study saw ChatGPT traffic convert at ~15.9% vs ~1.76% for Google organic \u2014 though that's a single client, so treat it as directional, not a benchmark.\n* **Brand mentions** matter more than backlinks for AI visibility (Ahrefs) \u2014 see [local links & authority](/local-seo/local-authority-links.md).\n* AI assistants generally pull from the open web and major third-party sources rather than reading Google Business Profile directly, so your presence on independent sites and directories ([NAP & citations](/local-seo/nap-citations.md)) does real work.\n\n# What to do\n\n1. Get the SEO fundamentals right \u2014 indexable, eligible, well-structured pages.\n2. Build genuine brand mentions and earned media.\n3. Be present and consistent on the third-party sources AI tools commonly cite (review sites, directories, community platforms).\n4. Claim under-used surfaces like Bing Places and Apple Business Connect.\n\n# Citations\n\n[1] [Google \u2014 AI features and your website](/references/google-ai-optimization-guide.md)\n[2] [Seer Interactive ChatGPT conversion case study](/references/seer-chatgpt-conversion.md)\n[3] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/local-authority-links", "local-seo/nap-citations", "references/google-ai-optimization-guide", "references/seer-chatgpt-conversion", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/business-type-detection", "type": "Detection Method", "title": "Business Type Detection", "description": "Classify a business as brick-and-mortar, service-area, or hybrid before running local SEO checks.", "resource": "", "tags": ["local-seo", "detection", "gbp"], "body": "Detect the business type from page signals **before** analysis. The type determines which checks apply \u2014 for example, service-area businesses skip embedded-map and physical-address checks.\n\n# Types\n\n| Type | Signals |\n|------|---------|\n| **Brick-and-mortar** | Physical street address in content/footer; Google Maps embed with pin/directions; \"Visit us at\", \"Located at\"; structured address in [LocalBusiness schema](/local-seo/local-schema.md). |\n| **Service Area Business (SAB)** | No visible physical address; \"serving [city/region]\", \"we come to you\", \"mobile [service]\"; `areaServed` in schema without `address.streetAddress`. |\n| **Hybrid** | Both a physical address and service-area language; e.g. \"visit our showroom\" plus \"we also serve [areas]\". |\n\n# Impact on checks\n\nSABs skip embedded-map verification and physical-address consistency. Brick-and-mortar gets the full [NAP and citation](/local-seo/nap-citations.md) checks. This classification also shapes [schema generation](/maps/schema-generation.md) \u2014 SABs use `areaServed` with named cities rather than a street address.\n\n# Citations\n\nA heuristic detection method derived from observable page signals; not an externally published taxonomy. Its schema implications follow Google's service-area handling:\n\n[1] [Google Business Profile Help \u2014 Service-area businesses on Google](https://support.google.com/business/answer/9157481?hl=en)\n\n[2] [Schema.org \u2014 LocalBusiness `areaServed`](https://schema.org/areaServed)\n", "links": ["local-seo/local-schema", "local-seo/nap-citations", "maps/schema-generation"]}, {"id": "local-seo/gbp-signals", "type": "Ranking Dimension", "title": "GBP Signals", "description": "Google Business Profile is the leading driver of local pack visibility; the primary category is the most important single setting.", "resource": "", "tags": ["local-seo", "gbp", "ranking-factors"], "body": "Your Google Business Profile is the single biggest lever on local pack visibility (the top-three map results), per Whitespark's ranking-factors study. We don't quote a precise weighting \u2014 Whitespark's exact percentages aren't published \u2014 but its relative ranking is consistent and well-established.\n\n# What to check\n\n* Primary category \u2014 the most important setting on the profile. Pick the most specific category that genuinely fits; a wrong primary category actively suppresses visibility.\n* Relevant secondary categories that reflect real services.\n* A complete, accurate profile: name, address (if applicable), hours, phone, website.\n* Photos and regular activity (posts, updates) \u2014 an actively maintained profile reads as a live business.\n* Reviews flowing steadily \u2014 see [reviews & reputation](/local-seo/reviews-reputation.md).\n* The website URL strategy \u2014 point the GBP link at a relevant, well-optimised page rather than reflexively at the homepage.\n\n# On-page detection signals\n\nWhen auditing from the website alone, look for a Maps embed, a place reference, or a reviews widget as evidence the GBP exists and is linked.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Accurate primary category, complete profile, active posts/photos, steady reviews. |\n| Partial | Profile present but incomplete or inactive. |\n| Low | No visible GBP integration on the website. |\n\n# Related\n\nLive profile completeness is scored in [GBP profile audit](/maps/gbp-profile-audit.md). For the hands-on first pass, see the [GBP optimisation checklist](/playbooks/gbp-optimisation-checklist.md).\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/reviews-reputation", "maps/gbp-profile-audit", "playbooks/gbp-optimisation-checklist", "references/whitespark-2026"]}, {"id": "local-seo/industry-vertical-detection", "type": "Detection Method", "title": "Industry Vertical Detection", "description": "Detect the industry vertical from page and GBP signals to route to industry-specific local SEO checks.", "resource": "", "tags": ["local-seo", "detection"], "body": "Detect the vertical from page signals and GBP category patterns, then route to industry-specific checks (see [local schema markup](/local-seo/local-schema.md)). If no vertical is detected, use the generic `LocalBusiness` path.\n\n# Detection signals\n\n| Vertical | Detection signals |\n|----------|-------------------|\n| **Restaurant** | /menu, menu items, reservations, cuisine types, food ordering, \"dine-in\", \"takeout\" |\n| **Healthcare** | insurance accepted, patients, appointments, NPI, medical terms, \"Dr.\", HIPAA notice |\n| **Legal** | attorney, lawyer, practice areas, bar admission, case results, \"free consultation\" |\n| **Home Services** | service area, emergency service, \"free estimate\", licensed/insured/bonded, \"24/7\" |\n| **Real Estate** | listings, MLS, properties for sale/rent, agent bio, brokerage, \"open house\" |\n| **Automotive** | inventory, VIN, test drive, dealership, service department, \"new/used/certified\" |\n\n# Why it matters\n\nThe vertical changes the correct schema subtype, the citation directories worth pursuing, and the review-response rules (e.g. HIPAA constraints for healthcare). When the vertical is unclear, present the top two detected verticals with supporting signals and confirm before applying industry-specific recommendations.\n\n# Citations\n\nA heuristic detection method derived from observable page and GBP-category signals; not an externally published taxonomy. The schema subtypes it routes to are defined by:\n\n[1] [Schema.org \u2014 LocalBusiness (subtype hierarchy)](https://schema.org/LocalBusiness)\n\n[2] [Google Business Profile Help \u2014 Categories](https://support.google.com/business/answer/3038177?hl=en)\n", "links": ["local-seo/local-schema"]}, {"id": "local-seo/local-authority-links", "type": "Ranking Dimension", "title": "Local Links & Authority", "description": "Local backlinks, brand mentions, and being listed where AI and search look for credible businesses.", "resource": "", "tags": ["local-seo", "links", "authority", "ranking-factors"], "body": "Links still matter for local organic rankings, but the bigger shift is towards **brand mentions and earned media** \u2014 especially for AI visibility. Ahrefs' 75,000-brand study found brand web mentions correlate far more strongly with AI Overview visibility (\u22480.664) than backlinks do (\u22480.218) \u2014 roughly three times the strength. It's a correlation study, not proof of causation, but the direction is clear: get talked about, not just linked to.\n\n# What to check\n\n* Local authority signals on the page \u2014 Chamber of Commerce, BBB, local press, sponsorships, community involvement.\n* Brand mentions across the wider web (not just links).\n* Placement on credible local \"best of\" / round-up lists.\n* A steady trickle of quality local links rather than spikes.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Visible local authority signals (chamber, BBB, press) and evident community presence. |\n| Partial | Some signals but limited local link/mention footprint. |\n| Low | No detectable local authority signals. |\n\n# Related\n\nBrand mentions and earned placements feed directly into [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/ai-search-local", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/local-onpage", "type": "Ranking Dimension", "title": "Local On-Page SEO", "description": "Dedicated service pages, visible NAP, and avoiding doorway-page patterns.", "resource": "", "tags": ["local-seo", "on-page", "ranking-factors"], "body": "Dedicated, genuinely useful service pages are among the strongest local on-page signals (Whitespark ranks dedicated service pages near the top of its local organic factors). This is where most local sites win or lose.\n\n# What to check\n\n* Title tag and H1 carry the city + service intent.\n* NAP (name, address, phone) visible in the page HTML \u2014 footer, contact section, or header. See [NAP consistency & citations](/local-seo/nap-citations.md).\n* One dedicated page per core service, with real, specific content.\n* Click-to-call (`tel:`) and a contact form above the fold.\n* Sensible internal linking \u2014 every important page reachable in a few clicks, with descriptive anchor text.\n\n# Location pages (multi-location)\n\nThe big risk is **doorway pages** \u2014 near-identical templates with only the town name swapped. The quick test: if you can swap the city and the copy still reads fine, it's a doorway page, and Google's core updates have repeatedly hit that pattern. Make each page genuinely unique \u2014 local photos, area-specific testimonials, local FAQs \u2014 and give each its own [LocalBusiness schema](/local-seo/local-schema.md) with a unique `@id`. Prefer crawlable, server-rendered location URLs under a tidy `/locations/city/` structure.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | City in title + H1, NAP visible, dedicated service pages, no doorway patterns, clean internal linking. |\n| Partial | Some local signals but missing service pages or doorway-page risk. |\n| Low | Generic title/H1, NAP not visible, thin location pages. |\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/nap-citations", "local-seo/local-schema", "references/whitespark-2026"]}, {"id": "local-seo/local-schema", "type": "Ranking Dimension", "title": "Local Schema Markup", "description": "LocalBusiness JSON-LD with the correct industry subtype \u2014 not a ranking factor, but it helps search and AI parse the business.", "resource": "", "tags": ["local-seo", "schema", "json-ld", "ranking-factors"], "body": "Structured data is **not** a direct ranking factor (Google's own line), but it can earn rich results and, increasingly, it helps AI systems read your business facts cleanly. Worth getting right; not worth over-claiming.\n\n# What to check\n\n* LocalBusiness JSON-LD present (extract the blocks).\n* Required: `name`, `address` with `PostalAddress` sub-properties.\n* Recommended: `geo` (use real lat/long with several decimal places), `openingHoursSpecification`, `telephone`, `url`, `image`, and `aggregateRating` where genuine.\n* **Correct subtype for the industry** (see [industry vertical detection](/local-seo/industry-vertical-detection.md)) \u2014 e.g. `Restaurant`, `LegalService`, `Dentist`, `AutoDealer`, rather than a generic `LocalBusiness`.\n* Service-area businesses: use `areaServed` with named places instead of a street address.\n* Multi-location: each page gets its own LocalBusiness with a unique `@id`, linked via `branchOf` to the Organization on the homepage.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Correct subtype, recommended properties present, valid JSON-LD. |\n| Partial | Present but generic type or missing recommended properties. |\n| Low | No local schema, or schema with errors/placeholder content. |\n\n# Related\n\nGenerate ready-to-paste JSON-LD via [maps schema generation](/maps/schema-generation.md). Don't mark up your own self-serving reviews \u2014 Google ignores LocalBusiness review markup that comes from the business itself.\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/industry-vertical-detection", "maps/schema-generation", "references/whitespark-2026"]}, {"id": "local-seo/nap-citations", "type": "Ranking Dimension", "title": "NAP Consistency & Citations", "description": "Consistent name/address/phone across sources, and presence on the directories that feed search and AI.", "resource": "", "tags": ["local-seo", "nap", "citations", "ranking-factors"], "body": "Citations carry less weight for the traditional local pack than they once did, but consistency still matters \u2014 and citation-style signals feed AI discovery, which sources business facts from across the web rather than from Google Business Profile directly.\n\n# What to check\n\n* **NAP consistency** \u2014 compare name, address, and phone across three sources and flag any mismatch:\n  1. Visible page HTML (footer, contact page).\n  2. LocalBusiness JSON-LD schema.\n  3. Any visible GBP data.\n* Presence on core directories \u2014 Google Business Profile, plus the likes of Yelp, BBB, and Facebook. Quick checks: `site:yelp.com \"Business Name\"`, `site:bbb.org \"Business Name\"`.\n* **Apple Business Connect** \u2014 adoption is strikingly low (BrightLocal: only ~16% of businesses use it, and ~58% haven't even claimed their Apple Maps listing). That makes claiming it a cheap, uncontested win.\n* **Bing Places** \u2014 worth claiming; the Bing index feeds several AI assistants, so it has reach beyond Bing search itself.\n* Data aggregators (e.g. Data Axle, Foursquare) for downstream distribution.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Consistent NAP across page/schema/GBP; present on core directories. |\n| Partial | NAP present but with inconsistencies; some listings missing. |\n| Low | NAP discrepancies, no detectable listings, no schema address. |\n\n# Related\n\nCross-platform NAP across Google, Bing, Apple, and OSM is verified in [maps NAP verification](/maps/nap-verification.md).\n\n# Citations\n\n[1] [BrightLocal Apple Business Connect research](/references/brightlocal-apple-business-connect.md)\n", "links": ["maps/nap-verification", "references/brightlocal-apple-business-connect"]}, {"id": "local-seo/reviews-reputation", "type": "Ranking Dimension", "title": "Reviews & Reputation", "description": "Review recency and rating thresholds \u2014 steady velocity matters more than a big one-off total.", "resource": "", "tags": ["local-seo", "reviews", "ranking-factors"], "body": "Reviews are a major local ranking and conversion signal, and **recency beats raw count**. Sterling Sky's case-study research describes an **18-day rule**: rankings can start to slip once a business goes roughly two to three weeks without a new review. It's a community-recognised pattern, not confirmed Google policy \u2014 but the practical takeaway is sound: keep reviews coming in steadily.\n\n# Rating thresholds (BrightLocal)\n\nConsumer expectations have climbed:\n\n* **68%** won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require at least 4.5 stars (up from 17%).\n\nSo the bar for \"acceptable\" has moved up roughly half a star in two years.\n\n# What to check\n\n* Total Google review count visible on page or in schema (`aggregateRating`).\n* Star rating against the thresholds above.\n* Recency \u2014 is there a steady, recent flow rather than a stale cluster?\n* Owner responses, especially to negatives.\n* Presence across more than one review platform.\n* **No review gating** \u2014 pre-screening for happy customers before steering them to a review platform breaches Google's policies and risks FTC enforcement. Ask everyone.\n\n# Industry notes\n\n* Healthcare: HIPAA limits what you can say in responses \u2014 don't confirm or deny that a reviewer is a patient.\n* Legal: mind attorney-client privilege in responses.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Healthy count, 4.5+ stars, recent steady flow, owner responses, multi-platform. |\n| Partial | Some reviews but gaps in recency, rating, or response rate. |\n| Low | Few reviews, stale, no responses, single platform. |\n\n# Related\n\nCross-platform velocity, sentiment, and fake-review detection live in [review intelligence](/maps/review-intelligence.md).\n\n# Citations\n\n[1] [Sterling Sky review research](/references/sterling-sky.md)\n[2] [BrightLocal Local Consumer Review Survey](/references/brightlocal-lcrs.md)\n", "links": ["maps/review-intelligence", "references/sterling-sky", "references/brightlocal-lcrs"]}, {"id": "maps/capability-tiers", "type": "Concept", "title": "Maps Capability Tiers", "description": "Three-tier capability model for maps intelligence \u2014 detect the available tier before any analysis and communicate it to the user.", "resource": "", "tags": ["maps", "dataforseo", "tiers"], "body": "Maps intelligence analyses the business on maps **platforms** (via APIs), as opposed to [local on-page SEO](/local-seo/local-onpage.md) which analyses the **website** via HTML fetch. Detect the available tier first and always communicate it to the user.\n\n# Tiers\n\n| Tier | Detection | Capabilities |\n|------|-----------|--------------|\n| **0 \u2014 Free** | No DataForSEO MCP tools | Overpass API competitor discovery, Geoapify POI search, Nominatim geocoding, static GBP checklist, schema generation, cross-platform NAP guidance. |\n| **1 \u2014 DataForSEO** | `business_data_business_listings_search` available | Tier 0 + [geo-grid rank tracking](/maps/geo-grid-tracking.md), live [GBP profile audit](/maps/gbp-profile-audit.md), [review intelligence](/maps/review-intelligence.md), GBP post/Q&A data, Tripadvisor/Trustpilot reviews. |\n| **2 \u2014 DataForSEO + Google Maps** | Tier 1 + Google Maps API key | Tier 1 + Google Places details, real-time business status, AI place summaries, photo analysis. Google ToS restricts storage to `place_id`; lat/lng cached 30 days max. |\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/local-onpage", "maps/geo-grid-tracking", "maps/gbp-profile-audit", "maps/review-intelligence", "references/dataforseo"]}, {"id": "maps/competitor-radius", "type": "Maps Analysis", "title": "Competitor Radius Mapping", "description": "Identify and analyse competitors within a defined radius, free via Overpass or richer via DataForSEO.", "resource": "", "tags": ["maps", "competitors", "radius"], "body": "Identify and analyse competitors within a defined radius. Available from [Tier 0](/maps/capability-tiers.md).\n\n# Tier 0 (Overpass API)\n\n1. Geocode the business address.\n2. Query Overpass for businesses with the same OSM tag within the radius.\n3. Parse name, address, phone, website, and distance from centre.\n4. Sort by distance and present as a competitor landscape table.\n\n# Tier 1 (DataForSEO)\n\n1. Use the Maps SERP API with the business keyword + location.\n2. Extract the top 20 competitors with full profile data.\n3. Compare rating, review count, categories, photos, and attributes.\n4. Calculate a competitive density score (competitors per km\u00b2).\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/gbp-profile-audit", "type": "Maps Analysis", "title": "GBP Profile Audit", "description": "Score the 25 Google Business Profile fields that affect quality and ranking, with industry weighting.", "resource": "", "tags": ["maps", "gbp", "audit"], "body": "Audits the 25 fields that affect GBP quality and ranking. Tier 1 uses live API data; [Tier 0](/maps/capability-tiers.md) falls back to detectable on-page signals. Complements the on-page view in [GBP signals](/local-seo/gbp-signals.md).\n\n# Tier 1 workflow\n\n1. Fetch the profile via the DataForSEO My Business Info API (keyword or CID).\n2. Map the API response to the 25-field checklist.\n3. Score each field: Present + Optimised = 2pts, Present = 1pt, Missing = 0pts.\n4. Apply industry-specific weight multipliers.\n5. Normalise to a 0\u2013100 scale.\n\n# Tier 0 workflow\n\n1. Fetch the business website.\n2. Extract visible GBP signals (Maps embed, place references, review widgets).\n3. Apply the static checklist from detectable signals.\n4. Mark undetectable fields as \"Unknown (requires DataForSEO for live data)\".\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "local-seo/gbp-signals", "references/dataforseo"]}, {"id": "maps/geo-grid-tracking", "type": "Maps Analysis", "title": "Geo-Grid Rank Tracking", "description": "Simulate Google Maps searches from multiple GPS coordinates to show ranking variation and compute Share of Local Voice.", "resource": "", "tags": ["maps", "geo-grid", "rank-tracking", "solv"], "body": "Geo-grid tracking simulates Maps searches from many GPS coordinates to reveal how rank varies across a geographic area. Requires DataForSEO ([Tier 1+](/maps/capability-tiers.md)).\n\n# Workflow\n\n1. Geocode the business address to a centre lat/lng.\n2. Generate grid points (default 7\u00d77, 5km radius) using a Haversine offset.\n3. **Display a cost estimate and ask for confirmation before proceeding.**\n4. Fire DataForSEO Maps SERP calls with `location_coordinate` per grid point.\n5. Find the target business rank at each point.\n6. Compute SoLV: `(top_3_count / total_points) * 100`.\n7. Render an ASCII heatmap in the output.\n\n# Cost warning (required)\n\nBefore every scan, display the keyword, location, grid size, keyword count, and estimated cost, and confirm before consuming DataForSEO credits.\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/nap-verification", "type": "Maps Analysis", "title": "Cross-Platform NAP Verification", "description": "Check business listing consistency across Google, Bing Places, Apple, and OpenStreetMap.", "resource": "", "tags": ["maps", "nap", "consistency"], "body": "Check listing consistency across Google, Bing Places, Apple, and OSM. Extends the page/schema/GBP checks in [NAP consistency & citations](/local-seo/nap-citations.md) to map platforms.\n\n# Workflow\n\n1. Search the business name on each platform:\n   * Google \u2014 infer from GBP data or Maps SERP result.\n   * Bing \u2014 fetch `bing.com/maps?q=BUSINESS+NAME+LOCATION`.\n   * Apple \u2014 manual check (no public API; recommend Apple Business Connect).\n   * OSM \u2014 Overpass or Nominatim search.\n2. Extract NAP from each source.\n3. Compare: exact match, partial match, missing, or conflicting.\n4. Flag discrepancies \u2014 Critical (name mismatch), High (address mismatch), Medium (phone mismatch).\n5. Recommend claiming unclaimed profiles.\n\n# Citations\n\nThis is a derived method built on the in-bundle [NAP consistency & citations](/local-seo/nap-citations.md) dimension. The platform endpoints it relies on:\n\n[1] [Bing Maps / Bing Places for Business](https://www.bingplaces.com/)\n\n[2] [Apple Business Connect](https://businessconnect.apple.com/)\n\n[3] [OpenStreetMap Nominatim search documentation](https://nominatim.org/release-docs/latest/)\n", "links": ["local-seo/nap-citations", "local-seo/nap-citations"]}, {"id": "maps/review-intelligence", "type": "Maps Analysis", "title": "Review Intelligence", "description": "Cross-platform review velocity, sentiment, rating distribution, and fake-review detection.", "resource": "", "tags": ["maps", "reviews", "velocity", "sentiment"], "body": "Cross-platform review analysis across Google, Tripadvisor, and Trustpilot. Extends the on-page view in [reviews & reputation](/local-seo/reviews-reputation.md) with platform data.\n\n# Workflow\n\n1. Fetch Google reviews via the DataForSEO Reviews API (newest first).\n2. Calculate review velocity: reviews per month over the last 6 months.\n3. Check the **18-day rule** (Sterling Sky): any 3-week gap = ranking risk.\n4. Analyse rating distribution: healthy = bell curve skewed to 5-star.\n5. Calculate owner response rate: responses / total reviews.\n6. Fetch Tripadvisor and Trustpilot reviews if available.\n7. Build a cross-platform comparison table.\n\n# Fake-review detection\n\nFlag reviews matching 2+ of: uniform timing; reviewer accounts with limited history; geographic inconsistencies; exclusively 5-star velocity spikes; near-identical text; sudden volume spikes without corresponding marketing activity.\n\n# Citations\n\n[1] [Sterling Sky](/references/sterling-sky.md)\n[2] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/reviews-reputation", "references/sterling-sky", "references/dataforseo"]}, {"id": "maps/schema-generation", "type": "Maps Analysis", "title": "Schema Generation", "description": "Generate LocalBusiness JSON-LD markup from collected maps and business data.", "resource": "", "tags": ["maps", "schema", "json-ld"], "body": "Generate LocalBusiness JSON-LD from collected data. See [local schema markup](/local-seo/local-schema.md) for the audit-side view and industry subtypes.\n\n# Workflow\n\n1. Determine the most specific schema subtype for the industry (see [industry vertical detection](/local-seo/industry-vertical-detection.md)).\n2. Populate required properties: `@type`, `name`, `address`, `image`.\n3. Add recommended properties: `telephone`, `url`, `geo`, `openingHoursSpecification`, `priceRange`.\n4. Add multi-location properties where relevant: `branchOf`, `areaServed`, `sameAs`.\n5. Add `aggregateRating` if review data is available.\n6. Output a valid JSON-LD block ready to implement.\n\n# Example\n\n```json\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"LocalBusiness\",\n  \"name\": \"Example Co\",\n  \"address\": {\n    \"@type\": \"PostalAddress\",\n    \"streetAddress\": \"1 High Street\",\n    \"addressLocality\": \"Manchester\",\n    \"postalCode\": \"M1 1AA\",\n    \"addressCountry\": \"GB\"\n  },\n  \"telephone\": \"+44-161-000-0000\",\n  \"url\": \"https://example.co.uk\",\n  \"geo\": { \"@type\": \"GeoCoordinates\", \"latitude\": 53.48095, \"longitude\": -2.23743 }\n}\n```\n\n> Do **not** generate self-serving review markup \u2014 Google ignores LocalBusiness review markup from the business itself. Only mark up third-party reviews visible on the page.\n\n# Citations\n\nThis method generates markup against the in-bundle [local schema markup](/local-seo/local-schema.md) dimension. Authoritative definitions:\n\n[1] [Schema.org \u2014 LocalBusiness](https://schema.org/LocalBusiness)\n\n[2] [Google Search Central \u2014 Local Business (LocalBusiness) structured data](https://developers.google.com/search/docs/appearance/structured-data/local-business)\n\n[3] [Google Search Central \u2014 Review snippet structured data (self-serving review policy)](https://developers.google.com/search/docs/appearance/structured-data/review-snippet)\n", "links": ["local-seo/local-schema", "local-seo/industry-vertical-detection", "local-seo/local-schema"]}, {"id": "playbooks/gbp-optimisation-checklist", "type": "Playbook", "title": "GBP Optimisation Quick-Wins Checklist", "description": "The fastest high-impact local SEO fixes to run on a new client engagement.", "resource": "", "tags": ["playbook", "gbp", "local-seo", "onboarding"], "body": "A short, high-leverage checklist for the first pass on a new local client. Pair it with the full [local SEO dimensions](/local-seo/) for the deep audit.\n\n# Quick wins\n\n1. Claim and optimise **Apple Business Connect** \u2014 adoption is low (~16% per BrightLocal), so it's an easy win.\n2. Claim and optimise **Bing Places** \u2014 the Bing index feeds several AI assistants, so it has reach beyond Bing (see [AI search impact](/local-seo/ai-search-local.md)).\n3. Fix any **NAP discrepancies** across page, schema, and GBP (see [NAP & citations](/local-seo/nap-citations.md)).\n4. Add **LocalBusiness schema** with the correct industry subtype (see [local schema markup](/local-seo/local-schema.md)).\n5. Add `geo` coordinates with 5+ decimal precision.\n6. Ensure the phone number uses a `tel:` click-to-call link.\n7. Add city + service keywords to the title tag and H1.\n\n# Medium effort\n\n1. Create a dedicated page for each core service (one of the strongest local organic signals \u2014 see [local on-page SEO](/local-seo/local-onpage.md)).\n2. Build a review-generation cadence that never breaks the [18-day rule](/local-seo/reviews-reputation.md).\n3. Submit to the main data aggregators (e.g. Data Axle, Foursquare).\n4. Claim industry-specific directories for the detected [vertical](/local-seo/industry-vertical-detection.md).\n\n# High impact\n\n1. Build a local digital-PR strategy targeting brand mentions and \"best of\" lists (mentions correlate strongly with AI visibility \u2014 see [local links & authority](/local-seo/local-authority-links.md)).\n2. Develop unique, non-swappable content for each location page.\n3. Establish presence on the third-party sources AI assistants commonly cite \u2014 review sites, directories, and community platforms.\n\n# Citations\n\nThis playbook operationalises claims sourced in the bundle's reference set:\n\n[1] [BrightLocal Apple Business Connect research](/references/brightlocal-apple-business-connect.md) \u2014 low Apple Business Connect adoption (~16%).\n\n[2] [Sterling Sky review research](/references/sterling-sky.md) \u2014 the 18-day review-recency rule.\n\n[3] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md) \u2014 brand mentions correlate with AI visibility.\n", "links": ["local-seo/ai-search-local", "local-seo/nap-citations", "local-seo/local-schema", "local-seo/local-onpage", "local-seo/reviews-reputation", "local-seo/industry-vertical-detection", "local-seo/local-authority-links", "references/brightlocal-apple-business-connect", "references/sterling-sky", "references/ahrefs-ai-overviews"]}, {"id": "references/agentic-commerce-protocols", "type": "Reference", "title": "Agentic commerce protocols (UCP, AP2, ACP, x402)", "description": "Primary specifications and announcements for the open protocols behind agent-led commerce.", "resource": "https://ucp.dev/", "tags": ["reference", "commerce", "agentic", "protocols"], "body": "Primary sources for the open protocols referenced by [Agentic Commerce](/agentic/agentic-commerce.md) and [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md). These are distinct, independently governed specifications \u2014 not one universal, fully adopted stack.\n\n# Per-protocol provenance\n\n| Protocol | Publisher / backers | First public | Canonical source |\n|---|---|---|---|\n| Universal Commerce Protocol (UCP) | Google with retail and platform partners | January 2026 | https://ucp.dev/ |\n| Agent Payments Protocol (AP2) | Google + 60+ participating organisations | September 2025 | https://ap2-protocol.org/ |\n| Agentic Commerce Protocol (ACP) | OpenAI and Stripe | September 2025 | https://www.agenticcommerce.dev/ |\n| x402 | Coinbase (open protocol) | per Coinbase docs | https://docs.cdp.coinbase.com/x402/welcome |\n\n# What the sources establish\n\n* Each protocol has a public specification and named backers; early production integrations exist.\n* UCP defines discovery via `/.well-known/ucp`; cryptographically signed mandates are a mechanism **within AP2**, not a separate protocol; AP2 documents an A2A x402 extension for stablecoin payments.\n\n# What they do not establish\n\nUniversal adoption is not demonstrated. A business should adopt a protocol only when a target channel or integration partner supports it, and should preserve ordinary web and API fallbacks.\n\n# Citations\n\n[1] [Universal Commerce Protocol \u2014 Specification and ecosystem](https://ucp.dev/)\n\n[2] [Agent Payments Protocol (AP2) \u2014 Specification](https://ap2-protocol.org/)\n\n[3] [Google Cloud \u2014 Announcing the Agent Payments Protocol (AP2)](https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol)\n\n[4] [Agentic Commerce Protocol \u2014 Open specification](https://www.agenticcommerce.dev/)\n\n[5] [Coinbase Developer Platform \u2014 x402 overview](https://docs.cdp.coinbase.com/x402/welcome)\n", "links": ["agentic/agentic-commerce", "agentic/agentic-commerce-readiness"]}, {"id": "references/ahrefs-ai-overviews", "type": "Reference", "title": "Ahrefs AI Overview brand-correlation study", "description": "75,000-brand analysis of what correlates with appearing in Google AI Overviews.", "resource": "https://ahrefs.com/blog/ai-overview-brand-correlation/", "tags": ["reference", "ai-search", "brand-mentions"], "body": "Ahrefs analysed ~75,000 brands to see what correlates with AI Overview visibility. Verified headline finding: **brand web mentions correlate far more strongly (\u22480.664) than backlinks (\u22480.218)** \u2014 roughly 3\u00d7 the strength. Note this is a *correlation* study across AI Overviews generally, not a controlled or local-specific test. Cited in [local links & authority](/local-seo/local-authority-links.md) and [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [An analysis of AI Overview brand visibility factors](https://ahrefs.com/blog/ai-overview-brand-correlation/)\n", "links": ["local-seo/local-authority-links", "local-seo/ai-search-local"]}, {"id": "references/brightlocal-apple-business-connect", "type": "Reference", "title": "BrightLocal Apple Business Connect research", "description": "BrightLocal poll on adoption and awareness of Apple Business Connect among local businesses.", "resource": "https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/", "tags": ["reference", "apple", "citations"], "body": "BrightLocal research on Apple Business Connect take-up. Verified figures:\n\n* Only **~16%** of businesses are using Apple Business Connect.\n* **~58%** have not claimed their Apple Maps listing.\n* **~59%** are unaware of the tools Apple Business Connect offers.\n\nThe low adoption is the point: claiming Apple Maps is a cheap, uncontested win. Cited in [NAP consistency & citations](/local-seo/nap-citations.md).\n\n# Citations\n\n[1] [Are businesses using Apple Business Connect?](https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/)\n", "links": ["local-seo/nap-citations"]}, {"id": "references/brightlocal-lcrs", "type": "Reference", "title": "BrightLocal Local Consumer Review Survey", "description": "Annual survey of consumer review behaviour; source for rating thresholds.", "resource": "https://www.brightlocal.com/research/local-consumer-review-survey/", "tags": ["reference", "reviews", "consumer-behaviour"], "body": "BrightLocal's annual Local Consumer Review Survey (LCRS). Verified figures used in this bundle:\n\n* **68%** of consumers won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require a minimum of 4.5 stars (up from 17% the prior year).\n\nCited in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Local Consumer Review Survey](https://www.brightlocal.com/research/local-consumer-review-survey/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/dataforseo", "type": "Reference", "title": "DataForSEO", "description": "SEO data API powering Tier 1+ maps intelligence \u2014 Maps SERP, My Business Info, and Reviews endpoints.", "resource": "https://dataforseo.com/", "tags": ["reference", "api", "maps"], "body": "DataForSEO provides the live data behind [Tier 1+ maps intelligence](/maps/capability-tiers.md): the Maps SERP API ([geo-grid](/maps/geo-grid-tracking.md), [competitors](/maps/competitor-radius.md)), My Business Info API ([GBP audit](/maps/gbp-profile-audit.md)), and the Reviews API ([review intelligence](/maps/review-intelligence.md)). Usage consumes credits \u2014 always show a cost estimate before geo-grid scans.\n\n# Citations\n\n[1] [DataForSEO](https://dataforseo.com/)\n", "links": ["maps/capability-tiers", "maps/geo-grid-tracking", "maps/competitor-radius", "maps/gbp-profile-audit", "maps/review-intelligence"]}, {"id": "references/google-ai-optimization-guide", "type": "Reference", "title": "Google \u2014 AI features and your website", "description": "Google's primary-source guidance on how AI features in Search relate to ordinary SEO.", "resource": "https://developers.google.com/search/docs/appearance/ai-features", "tags": ["reference", "ai-search", "google"], "body": "Google's own documentation on AI features in Search. The position we rely on: appearing in AI Overviews and AI Mode runs on the same systems as ordinary Search \u2014 there is no separate \"AI SEO\" lever, and standard indexing/eligibility is the floor. Underpins [AI search impact on local](/local-seo/ai-search-local.md).\n\nThe canonical URL was confirmed live at `developers.google.com/search/docs/appearance/ai-features` on 25 June 2026. Google reorganises its Search Central docs periodically; if the link 404s, re-locate the \"AI features and your website\" page and update the `resource` field and citation below.\n\n# Citations\n\n[1] [Google Search Central \u2014 AI features and your website](https://developers.google.com/search/docs/appearance/ai-features)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/google-ask-maps", "type": "Reference", "title": "Google \u2014 Ask Maps announcement", "description": "Google's primary-source announcement of Ask Maps, the Gemini-powered conversational experience in Google Maps.", "resource": "https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/", "tags": ["reference", "google-maps", "ai-search", "agentic"], "body": "Google's primary-source announcement for **Ask Maps**, its Gemini-powered conversational experience in Google Maps. This is the single source underpinning the [Ask Maps](/agentic/ask-maps.md) concept doc.\n\n# What the source establishes\n\n* Ask Maps is a Gemini-powered conversational experience reached from an **Ask Maps** button. The announcement does not specify a durable on-screen position for that button.\n* Announced **12 March 2026**, rolling out on Android and iOS in the **United States and India**, with desktop described as coming soon.\n* Inputs Google names: information on more than 300 million places; reviews and local knowledge from more than 500 million contributors; the user's searched and saved places; and route context including directions and ETAs.\n* The experience can help a user act on a result \u2014 reserve, save, share or start navigation.\n\n# What it does not establish\n\nGoogle has not published Ask Maps ranking factors. Profile-completeness and media practices are data-quality measures, not guaranteed optimisation levers. See [Generative Engine Optimization](/agentic/generative-engine-optimization.md).\n\n# Citations\n\n[1] [Google \u2014 How we're reimagining Maps with Gemini](https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/)\n", "links": ["agentic/ask-maps", "agentic/generative-engine-optimization"]}, {"id": "references/google-business-agent", "type": "Reference", "title": "Google \u2014 Get started with Business Agent", "description": "Google's primary-source eligibility and setup guidance for Business Agent, the Search experience for eligible US e-commerce retailers.", "resource": "https://support.google.com/brandprofile/answer/16410382?hl=en", "tags": ["reference", "google", "commerce", "agentic", "gbp"], "body": "Google's primary-source documentation for **Business Agent**, cited by [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md).\n\n# What the source establishes\n\n* Business Agent is a **Search** experience for eligible **US-based e-commerce retailers**.\n* Customisation requires: a US-based store, a verified **Merchant Center** account, **at least 50 approved free listings**, and a **claimed brand profile**.\n* It draws on Merchant Center data, the retailer's website and additional supplied business data.\n\n# Clarification carried into the bundle\n\nGoogle's Search **brand profile** and **Google Business Profile** are separate surfaces. A brand profile is not another name for a Business Profile. The \"~50 offers\" figure used in earlier drafts is corrected to **at least 50 approved free listings** plus the other conditions above.\n\n# Citations\n\n[1] [Google \u2014 Get started with Business Agent](https://support.google.com/brandprofile/answer/16410382?hl=en)\n", "links": ["agentic/agentic-commerce-readiness"]}, {"id": "references/google-maps-grounding", "type": "Reference", "title": "Google \u2014 Maps grounding for AI (full, Lite, place summaries)", "description": "Google's developer documentation for grounding AI models with Google Maps data, including Grounding Lite and Places API AI summaries.", "resource": "https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps", "tags": ["reference", "google-maps", "ai", "grounding", "developer"], "body": "The Google developer documentation underpinning the [Grounding with Google Maps](/agentic/grounding-google-maps.md) concept doc. Three related products:\n\n# Full Maps grounding\n\nEnabled as a grounding tool in the Gemini Enterprise Agent Platform / Vertex AI Studio. Documented to draw on **more than 250 million places**. Responses carry Maps sources in REST field `groundingMetadata.groundingChunks` (SDKs may use snake_case). Source attribution is a display requirement. The current documentation contains no \"widget context token\" or \"Contextual View\"; those earlier-draft claims are not retained.\n\n# Maps Grounding Lite\n\nA Google Maps Platform service with Model Context Protocol (MCP) support, exposing tools for place search, current/forecast weather, and driving/walking route distance and duration. It does **not** provide turn-by-turn directions, real-time traffic or navigation.\n\n# Places API (New) AI summaries\n\n`generativeSummary` returns brief (~100-character) place overviews in Place Details, Text Search and Nearby Search, requiring a \"Summarized with Gemini\" disclosure. As of 25 June 2026, documented for supported place types in English in India and the United States; not guaranteed for every place.\n\n# Citations\n\n[1] [Google Cloud \u2014 Grounding with Google Maps](https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps)\n\n[2] [Google Maps Platform \u2014 Maps Grounding Lite](https://developers.google.com/maps/ai/grounding-lite)\n\n[3] [Google Maps Platform \u2014 AI-powered place summaries](https://developers.google.com/maps/documentation/places/web-service/place-summaries)\n", "links": ["agentic/grounding-google-maps"]}, {"id": "references/lastmile-high-dollar-survey", "type": "Reference", "title": "Lastmile Retail \u2014 High-dollar local purchase survey", "description": "Consumer survey on real-time local availability and high-dollar local purchases, run by Lastmile Retail with Greg Sterling.", "resource": "https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte", "tags": ["reference", "retail", "inventory", "consumer-behaviour"], "body": "The consumer survey underpinning the demand-side claims in [Real-Time Local Inventory](/agentic/real-time-local-inventory.md). Conducted by Lastmile Retail with Greg Sterling among **1,000 US adults**, about local purchases of **$300 or more**.\n\n# Verified figures\n\n* **95%** said confirming local availability before visiting was somewhat to extremely important.\n* **56%** selected real-time product availability before visiting as a factor favouring local over remote shipping.\n* **48%** selected reserving online for in-store purchase or pickup.\n* **40%** reported insufficient product information on company websites.\n* **37%** could not confirm availability at a particular store; another **37%** reported inaccurate inventory information.\n\n# Scope caveat\n\nThese figures are specific to the reported US survey and the high-dollar (\\$300+) scenario. Do not generalise them to all markets or purchase values.\n\n# Citations\n\n[1] [Lastmile Retail / Miriam Ellis \u2014 Data-based Tactics for Increasing High-Dollar Local Purchases](https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte)\n", "links": ["agentic/real-time-local-inventory"]}, {"id": "references/seer-chatgpt-conversion", "type": "Reference", "title": "Seer Interactive ChatGPT conversion case study", "description": "Single-client case study comparing how ChatGPT traffic converts vs Google organic.", "resource": "https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts", "tags": ["reference", "ai-search", "conversion"], "body": "Seer Interactive case study on how AI-assistant traffic converts. Verified figures: **ChatGPT traffic converted at ~15.9% vs ~1.76% for Google organic** on the site studied. Important caveat carried through to our docs: this is **one client's data**, so treat it as directional, not a benchmark. Cited in [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Case study: how traffic from ChatGPT converts](https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/sterling-sky", "type": "Reference", "title": "Sterling Sky review research", "description": "Joy Hawkins' agency research on how review recency affects local ranking \u2014 the basis for the 18-day rule.", "resource": "https://www.sterlingsky.ca/number-of-reviews-impact-ranking/", "tags": ["reference", "reviews"], "body": "Sterling Sky (founded by Joy Hawkins) publishes case-study research on local ranking. We cite it for the **18-day rule** \u2014 the observation, drawn from client case studies, that local rankings can weaken once a business goes roughly two to three weeks without a new review. It is a community-recognised pattern, **not** confirmed Google policy. Used in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Does the number of Google reviews impact ranking?](https://www.sterlingsky.ca/number-of-reviews-impact-ranking/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/verification-report-2026-06-25", "type": "Report", "title": "Verification report \u2014 2026-06-25", "description": "Claim-by-claim fact-check of the agentic section against primary sources, completed 25 June 2026.", "resource": "", "tags": ["governance", "verification", "agentic"], "body": "Checked against primary sources on 25 June 2026. Each row records the original draft claim, the verification result, and the primary source consulted. See the [maintenance policy](/maintenance.md) for review cadence.\n\n# Results\n\n| Document | Claim | Result | Primary source |\n|---|---|---|---|\n| `agentic/ask-maps.md` | Official name is Ask Maps | Verified | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Entry point is under the Maps search bar | Corrected: Google confirms an **Ask Maps** button but does not specify a durable screen position in the primary announcement. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Gemini-powered | Verified | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Launch date and regions | Verified: announced 12 March 2026; rolling out on Android and iOS in the US and India; desktop described as coming soon. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Inputs include place facts, reviews, saved/search history and route context | Corrected to Google's wording: 300M+ places, reviews from 500M+ contributors, searched/saved places, directions and ETAs. Cross-app personal data was not claimed. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/agentic-commerce.md` | Universal Commerce Protocol exists | Verified: launched January 2026 with public specification and named co-developers/endorsers. | https://ucp.dev/ |\n| `agentic/agentic-commerce.md` | Agent Payments Protocol exists | Verified: announced September 2025 with 60+ participating organisations. | https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol |\n| `agentic/agentic-commerce.md` | Agentic Commerce Protocol exists | Verified: developed by OpenAI and Stripe and open-sourced in September 2025. | https://www.agenticcommerce.dev/ |\n| `agentic/agentic-commerce.md` | Signed payment mandates are a protocol layer | Corrected: signed mandates are an AP2 mechanism, not a separate protocol. | https://ap2-protocol.org/ |\n| `agentic/agentic-commerce.md` | x402 exists and is relevant to agents | Verified: Coinbase documents an open HTTP-native stablecoin payment protocol; AP2 documents an x402 extension. | https://docs.cdp.coinbase.com/x402/welcome |\n| `agentic/agentic-commerce.md` | The protocols form an adopted industry stack | Corrected: specifications and early implementations exist, but universal adoption is not established. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Merchant Center should align with GBP \"Brand Profile\" | Corrected: Google's Search brand profile and Google Business Profile are separate surfaces. Business Agent eligibility uses Merchant Center plus a claimed brand profile. | https://support.google.com/brandprofile/answer/16410382?hl=en |\n| `agentic/agentic-commerce-readiness.md` | Roughly 50 offers unlock Business Agent | Corrected to **at least 50 approved free listings**, plus other eligibility conditions. | https://support.google.com/brandprofile/answer/16410382?hl=en |\n| `agentic/agentic-commerce-readiness.md` |
