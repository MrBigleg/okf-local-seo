<script>
const DATA = [{"id": "maintenance", "type": "Policy", "title": "Maintenance Policy", "description": "Ownership, review cadence and freshness tiers for keeping fast-moving claims in this bundle accurate.", "resource": "", "tags": ["governance", "maintenance", "policy"], "body": "This bundle mixes durable principles with fast-moving product facts. This policy says who keeps it current, how often, and how to tell which claims need the closest watch.\n\n# Ownership\n\n* **Owner:** CTB Marketing (bundle maintainer).\n* The owner is accountable for the scheduled reviews below and for re-running `tool/okf_verify.py` before any export or release.\n* Each reference doc records its own `accessed` date in frontmatter; each concept records a `timestamp`. The `last_verified` date in this file is the date of the most recent full pass.\n\n# Freshness tiers\n\n| Tier | What it covers | Review cadence |\n|---|---|---|\n| **Volatile** | Named product names, eligibility thresholds, launch dates, rollout regions, API field names, protocol adoption status. Mostly the `agentic/` section. | Monthly, plus on any known vendor announcement. |\n| **Semi-stable** | Survey figures, study percentages, ranking-factor framing. The `references/` studies. | Quarterly; re-check the source for a newer edition. |\n| **Durable** | Method and detection docs, governance principles (HITL, NAP consistency, schema fundamentals). | Semi-annually, or when a dependency changes. |\n\n# Review procedure\n\n1. Run `python tool/okf_verify.py bundles/local-seo` and resolve every hard failure.\n2. Run it with `--check-urls` to catch dead external links.\n3. For each **volatile** claim, re-open the cited primary source and confirm the figure, name and status still match. Update the doc body and the reference's `accessed` date.\n4. Re-run `python tool/okf_build.py bundles/local-seo --name \"Local SEO OKF\"` to regenerate `viz.html`.\n5. Append a dated entry to [log.md](/log.md) and update `last_verified` above.\n6. File or update a dated verification report (see [the 2026-06-25 report](/references/verification-report-2026-06-25.md)) when a full claim-by-claim pass is done.\n\n# Open follow-ups\n\nCarried from the latest verification pass:\n\n* Confirm whether Google has a current replacement for the earlier Maps grounding widget context token / \"Contextual View\".\n* If OTA commission or rate-parity guidance is ever required, research it by jurisdiction, contract type and named platform rather than publishing a universal range.\n", "links": ["log", "references/verification-report-2026-06-25"]}, {"id": "agentic/agentic-commerce-readiness", "type": "Playbook", "title": "Agentic Commerce Readiness", "description": "A conservative checklist for making a local business discoverable and safely transactable by supported AI agents.", "resource": "", "tags": ["local-seo", "commerce", "gbp", "agentic", "checklist"], "body": "This is the actionable counterpart to [Agentic Commerce](/agentic/agentic-commerce.md). Readiness means publishing reliable business, offer and fulfilment data, then exposing transaction capabilities only through channels the business can operate safely.\n\n# 1. Separate local identity from retail identity\n\n* Claim and maintain each [Google Business Profile](/local-seo/gbp-signals.md) for location facts such as address, hours, categories and services.\n* Retailers should separately verify Merchant Center and, where eligible, claim their Search brand profile.\n* Do not treat a brand profile as another name for a Business Profile; they are different surfaces.\n\nGoogle's Business Agent is a Search experience for eligible US e-commerce retailers. Customisation requires a US-based store, a verified Merchant Center account, at least **50 approved free listings**, and a claimed brand profile. It uses Merchant Center data, the retailer's website and additional supplied business data. See the reference page [Google \u2014 Get started with Business Agent](/references/google-business-agent.md).\n\n# 2. Publish structured offers\n\n* Keep product identifiers, titles, descriptions, prices, availability and fulfilment terms consistent across the site and connected feeds.\n* Use appropriate [schema](/local-seo/local-schema.md) on first-party pages, but do not assume schema alone enrols a business in an agent checkout programme.\n* Restaurants should publish structured menu data. The Business Profile API supports menu-item names, prices, descriptions, dietary information and associated photos.\n* Do not rely on photos of a printed menu as a substitute for structured menu data. No primary source was found for automatic menu extraction from Business Profile photos.\n\n# 3. Expose only supported protocol capabilities\n\nIf adopting UCP, publish the business profile at `/.well-known/ucp`. The profile declares supported protocol versions, services, capabilities, endpoints, payment handlers and verification keys.\n\nA discovery document is useful only when the corresponding protocol is actually implemented. Publishing an invented or incomplete endpoint creates false capability signals.\n\n# 4. Connect operations to promises\n\n## Retail\n\nPublish branch-level [local inventory](/agentic/real-time-local-inventory.md), price and pickup terms. Availability shown to an agent must match the store.\n\n## Restaurants\n\nEnsure the ordering channel, point-of-sale system and kitchen workflow share the same menu and order state. Removing an unavailable item should update every active ordering surface. This is an operational requirement; current UCP food specifications were still described as forthcoming on 25 June 2026.\n\n## Hotels\n\nConnect the property or central reservation system to the chosen distribution channel through a supported integration. Google's Hotel Prices documentation supports availability, rates and inventory messages, along with price-accuracy and coverage reporting. This verifies channel synchronisation capabilities, but not a universal requirement to use any named property-management vendor.\n\n# 5. Keep a safe fallback\n\nWhen price, availability, identity or authority cannot be verified, the system should stop before purchase and hand the user to a human or first-party checkout. Readiness is not maximum automation; it is reliable execution within explicit limits.\n\n# Citations\n\n[1] [Google \u2014 Get started with Business Agent](https://support.google.com/brandprofile/answer/16410382?hl=en)\n\n[2] [Google Business Profile APIs \u2014 Update Food Menus](https://developers.google.com/my-business/content/update-food-menus)\n\n[3] [Universal Commerce Protocol \u2014 Specification overview](https://ucp.dev/specification/overview/)\n\n[4] [Google Hotel APIs \u2014 Hotel Prices Developer's Guide](https://developers.google.com/hotels/hotel-prices/dev-guide)\n\n[5] [Universal Commerce Protocol \u2014 Protocol and industry roadmap](https://ucp.dev/)\n", "links": ["agentic/agentic-commerce", "local-seo/gbp-signals", "references/google-business-agent", "local-seo/local-schema", "agentic/real-time-local-inventory"]}, {"id": "agentic/agentic-commerce", "type": "Concept", "title": "Agentic Commerce", "description": "Commerce in which an AI agent can help discover, select and transact with a business under explicit user authority.", "resource": "", "tags": ["local-seo", "ai-search", "commerce", "agentic"], "body": "Agentic commerce describes commerce in which an AI agent can move beyond recommendation into actions such as building a cart, initiating checkout or completing an authorised purchase. For local businesses, the practical shift is from being merely discoverable to exposing reliable data and transaction capabilities that an agent can use.\n\n# The protocol landscape\n\nAs of 25 June 2026, several distinct open protocols exist. They are not one universal, fully adopted stack.\n\n| Protocol | Scope | Primary backing and status |\n|---|---|---|\n| Universal Commerce Protocol (UCP) | Discovery, catalogue, cart, checkout, identity linking and order management | Launched in January 2026; co-developed by Google and several retailers and platforms, with public specifications and reference implementations. |\n| Agent Payments Protocol (AP2) | Verifiable authority, payment instructions and accountability for agent-led payments | Announced by Google in September 2025 with more than 60 participating organisations; public specification available. |\n| Agentic Commerce Protocol (ACP) | Programmatic checkout between buyers, agents and businesses | Open-sourced in September 2025 and developed by OpenAI and Stripe; first implemented for an in-chat checkout experience. |\n| x402 | HTTP-native, programmatic stablecoin payments | Developed by Coinbase as an open protocol. AP2 also documents an A2A x402 extension for agent-based crypto payments. |\n\n# Signed mandates\n\nCryptographically signed mandates are a mechanism within AP2, not a separate commerce protocol. AP2 uses tamper-evident digital credentials to record checkout and payment authority for both human-present and delegated transactions.\n\n# Adoption should not be overstated\n\nPublic specifications, launch partners and early production integrations demonstrate that these protocols exist. They do not establish universal merchant, wallet or payment-network adoption. A business should select a protocol only when a target channel or integration partner supports it, then preserve ordinary web and API fallbacks.\n\n# Local-business implication\n\nThe durable requirement is structured, current and actionable data: identity, offers, price, availability, fulfilment and a safe way to authorise an action. See [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md) and [Real-Time Local Inventory](/agentic/real-time-local-inventory.md).\n\nPer-protocol provenance (publisher, first-public date, canonical spec) lives in the reference page [Agentic commerce protocols](/references/agentic-commerce-protocols.md).\n\n# Citations\n\n[1] [Google \u2014 New tech and tools for retailers to succeed in an agentic shopping era](https://blog.google/products/ads-commerce/agentic-commerce-ai-tools-protocol-retailers-platforms/)\n\n[2] [Universal Commerce Protocol \u2014 Specification and ecosystem](https://ucp.dev/)\n\n[3] [Google Cloud \u2014 Powering AI commerce with the Agent Payments Protocol](https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol)\n\n[4] [OpenAI \u2014 Instant Checkout and the Agentic Commerce Protocol](https://openai.com/index/buy-it-in-chatgpt/)\n\n[5] [Agentic Commerce Protocol \u2014 Open specification](https://www.agenticcommerce.dev/)\n\n[6] [Coinbase Developer Platform \u2014 x402 overview](https://docs.cdp.coinbase.com/x402/welcome)\n", "links": ["agentic/agentic-commerce-readiness", "agentic/real-time-local-inventory", "references/agentic-commerce-protocols"]}, {"id": "agentic/ask-maps", "type": "Concept", "title": "Ask Maps", "description": "Google's Gemini-powered conversational experience in Google Maps for complex, place-based questions and actions.", "resource": "", "tags": ["local-seo", "ai-search", "google-maps", "agentic"], "body": "Ask Maps is Google's Gemini-powered conversational experience in Google Maps. A user taps the **Ask Maps** button, asks a complex place-based question, and receives a conversational answer with a customised map.\n\nGoogle announced Ask Maps on 12 March 2026. It began rolling out on Android and iOS in the United States and India, with desktop availability described as coming soon. This rollout status was checked on 25 June 2026.\n\n# What it uses\n\nGoogle says Ask Maps can draw on:\n\n* information from more than 300 million places;\n* reviews and other local knowledge from a community of more than 500 million contributors;\n* places the user has searched for or saved in Maps; and\n* route context, directions and estimated arrival times.\n\nThe experience can also help a user act on a result, such as making a restaurant reservation, saving a place, sharing it or starting navigation.\n\n# What changes for a business\n\nAsk Maps can synthesise constraints that do not fit neatly into a short keyword query: location, timing, route, atmosphere, availability and personal preferences. This increases the importance of complete, current and mutually consistent source data across the [Google Business Profile](/local-seo/gbp-signals.md), [reviews](/local-seo/reviews-reputation.md), menus, photos and first-party website.\n\nGoogle has not published a separate set of Ask Maps ranking factors. Treat recommendations about profile completeness, media and review detail as data-quality practices, not guaranteed optimisation levers. See [Generative Engine Optimization](/agentic/generative-engine-optimization.md).\n\nSource provenance for this concept lives in the reference page [Google \u2014 Ask Maps announcement](/references/google-ask-maps.md).\n\n# Citations\n\n[1] [Google \u2014 How we\u2019re reimagining Maps with Gemini](https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/)\n", "links": ["local-seo/gbp-signals", "local-seo/reviews-reputation", "agentic/generative-engine-optimization", "references/google-ask-maps"]}, {"id": "agentic/generative-engine-optimization", "type": "Concept", "title": "Generative Engine Optimization", "description": "Improving the visibility and attribution of source content in answers synthesised by generative search systems.", "resource": "", "tags": ["seo", "ai-search", "local-seo", "geo"], "body": "Generative Engine Optimization (GEO) is the practice of improving the visibility of source content in responses produced by generative engines. The term was formalised in the 2023 paper *GEO: Generative Engine Optimization*, which describes generative engines as systems that retrieve and synthesise information from multiple sources.\n\n# Applying GEO to local search\n\nThe original GEO research evaluates content visibility in generated responses; it does not establish Google Maps ranking factors. For local search, GEO is therefore best treated as a data-quality discipline:\n\n* publish clear, specific descriptions of the business, services and locations;\n* keep names, prices, availability and policies consistent across the [Business Profile](/local-seo/gbp-signals.md), website and structured data;\n* provide useful first-party evidence and cite authoritative sources;\n* maintain descriptive, authentic media and current structured menus or catalogues; and\n* make booking, ordering or contact paths explicit.\n\nGoogle has not said that any one of these practices guarantees inclusion in [Ask Maps](/agentic/ask-maps.md).\n\n# GEO and AEO\n\nThere is no single authoritative industry standard separating GEO from Answer Engine Optimization (AEO). In this bundle:\n\n| Term | Working objective |\n|---|---|\n| AEO | Make a fact or answer easy for an answer system to retrieve and present directly. |\n| GEO | Improve whether a source is used, represented or attributed in a synthesised generative response. |\n\nThe practices overlap. Both depend on accessible, accurate and well-structured source material.\n\n# Media context\n\nIn April 2026, Google introduced Gemini-generated draft captions for contributor photos in Maps. The model analyses selected images and suggests captions that contributors can edit or remove. At launch, caption suggestions were available in English on iOS in the United States, with wider Android and international availability planned.\n\nThis update shows that Maps is adding machine-generated textual context to contributed media. It does not prove that captions are a ranking factor.\n\n# Citations\n\n[1] [Aggarwal et al. \u2014 GEO: Generative Engine Optimization](https://arxiv.org/abs/2311.09735)\n\n[2] [Google \u2014 3 updates that make contributing to Maps easier](https://blog.google/products-and-platforms/products/maps/contributor-updates/)\n", "links": ["local-seo/gbp-signals", "agentic/ask-maps"]}, {"id": "agentic/grounding-google-maps", "type": "Concept", "title": "Grounding with Google Maps", "description": "Google's developer services for adding Google Maps place, route, weather and review context to AI applications.", "resource": "", "tags": ["google-maps", "ai", "grounding", "developer"], "body": "Grounding with Google Maps connects Gemini models to Google Maps geospatial data. Google states that the service can use information on **more than 250 million places** and can be combined with Google Search grounding or private data sources.\n\n# Full Maps grounding\n\nIn the Gemini Enterprise Agent Platform and Vertex AI Studio workflow, a developer enables Google Maps as a grounding tool. Responses can include Google Maps sources in REST field `groundingMetadata.groundingChunks`; client libraries may expose equivalent snake-case names such as `grounding_metadata` and `grounding_chunks`.\n\nMaps source chunks can contain:\n\n* a Google Maps URI and title;\n* a place ID;\n* place-answer sources; and\n* review snippets and review identifiers where available.\n\nSource attribution is part of the product's display requirements. The current documentation does not describe the earlier draft's widget context token or a product named \u201cContextual View\u201d, so those claims are not retained.\n\n# Maps Grounding Lite\n\nMaps Grounding Lite is a Google Maps Platform service with Model Context Protocol support. Its MCP server exposes tools to:\n\n* search for places;\n* look up current and forecast weather; and\n* compute driving or walking route distance and duration.\n\nIt does not provide turn-by-turn directions, real-time traffic or navigation.\n\n# Places API AI summaries\n\nPlaces API (New) can return AI-powered place summaries through `generativeSummary` in Place Details, Text Search and Nearby Search responses. Google describes these as brief, 100-character overviews and requires a \u201cSummarized with Gemini\u201d disclosure. On 25 June 2026, place summaries were documented for supported place types in English in India and the United States and were not guaranteed for every place.\n\n# Why it matters\n\nThese services let developers build location-aware applications with identifiable source material instead of relying only on a model's internal knowledge. They are developer products, not evidence that every consumer Maps answer uses the same API path. See [Ask Maps](/agentic/ask-maps.md).\n\nSource provenance for these products lives in the reference page [Google \u2014 Maps grounding for AI](/references/google-maps-grounding.md).\n\n# Citations\n\n[1] [Google Cloud \u2014 Grounding with Google Maps](https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps)\n\n[2] [Google Maps Platform \u2014 Maps Grounding Lite](https://developers.google.com/maps/ai/grounding-lite)\n\n[3] [Google Maps Platform \u2014 AI-powered place summaries](https://developers.google.com/maps/documentation/places/web-service/place-summaries)\n", "links": ["agentic/ask-maps", "references/google-maps-grounding"]}, {"id": "agentic/hitl-gbp-management", "type": "Playbook", "title": "Human-in-the-Loop GBP Management", "description": "A control pattern in which AI drafts Google Business Profile changes and an authorised human approves execution.", "resource": "", "tags": ["local-seo", "gbp", "ai-ops", "hitl"], "body": "Human-in-the-loop (HITL) Business Profile management is a governance pattern: software prepares a proposed change, but an authorised person reviews it before any customer-visible write.\n\nGoogle does not require this approval pattern. It is an operator control for reducing accidental, misleading or policy-breaking changes.\n\n# Control flow\n\n1. **Draft** \u2014 generate a proposed reply, post or field update.\n2. **Validate** \u2014 check required fields, policy constraints and current profile state.\n3. **Approve** \u2014 record the human reviewer, decision and any edits.\n4. **Execute** \u2014 use the relevant Business Profile API only after approval.\n5. **Audit** \u2014 store the request, response, timestamp and resulting resource identifier.\n\n# Supported candidates\n\nGoogle's Business Profile APIs document support for:\n\n* creating, editing and deleting event, call-to-action and offer posts;\n* listing reviews, publishing or replacing an owner reply, and deleting an owner reply;\n* patching supported location fields with an update mask;\n* uploading media;\n* updating eligible food menus; and\n* managing services and attributes through their relevant resources.\n\nProduct posts cannot currently be created through the documented Posts API.\n\n# Guardrails\n\n* Compare the proposed update with the latest live resource immediately before execution.\n* Reject a change if the live profile changed after the draft was approved.\n* Use the narrowest possible update mask.\n* Never fabricate customer experiences, prices, availability or review details.\n* Treat \u201creversion\u201d as a new, reviewed API update based on a known-good snapshot; there is no generic undo endpoint.\n* Keep credentials, approval authority and execution authority separately scoped where practical.\n\n# Suitable drafting tasks\n\n* review replies;\n* event, offer and call-to-action posts;\n* category, hours, service or attribute corrections supported by the API; and\n* structured menu updates for eligible restaurant locations.\n\n# Citations\n\n[1] [Google Business Profile APIs \u2014 Create Posts on Google](https://developers.google.com/my-business/content/posts-data)\n\n[2] [Google Business Profile APIs \u2014 Work with review data](https://developers.google.com/my-business/content/review-data)\n\n[3] [Google Business Profile APIs \u2014 Update a location](https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch)\n\n[4] [Google Business Profile APIs \u2014 Update Food Menus](https://developers.google.com/my-business/content/update-food-menus)\n", "links": []}, {"id": "agentic/real-time-local-inventory", "type": "Concept", "title": "Real-Time Local Inventory", "description": "Store-level product availability, price and pickup data that makes local retail results actionable.", "resource": "", "tags": ["local-seo", "retail", "inventory", "agentic", "ai-search"], "body": "Real-time local inventory is store-level data showing whether a product is available at a particular location, at what price and under which pickup terms. It helps a shopper or agent distinguish a product that exists in a catalogue from one that can actually be obtained nearby.\n\n\u201cReal-time\u201d is an operational objective, not a guarantee made by every publishing channel. Google notes that Business Profile locations can take up to 24 hours to synchronise into Merchant Center.\n\n# Consumer evidence\n\nLastmile Retail reported results from a consumer survey conducted with Greg Sterling among **1,000 US adults** about local purchases totalling **$300 or more**:\n\n* **95%** said confirming that an item priced at $300 or more is available locally before visiting is somewhat to extremely important.\n* **56%** selected real-time product availability before visiting as a factor that would influence them to choose a local option instead of remote shipping.\n* **48%** selected the option to reserve online for in-store purchase or pickup.\n* **40%** reported insufficient product information on company websites when searching online to buy locally.\n* **37%** reported being unable to confirm whether a product was available at a particular store; the same proportion reported inaccurate inventory information.\n\nThese findings are specific to the reported US survey and high-dollar purchase scenario. They should not be generalised to all markets or purchase values. Provenance is recorded in the reference page [Lastmile Retail \u2014 High-dollar local purchase survey](/references/lastmile-high-dollar-survey.md).\n\n# Minimum data\n\nGoogle's local inventory specification supports:\n\n* product ID;\n* store code matched to the corresponding Business Profile;\n* availability: in stock, limited availability, on display to order or out of stock;\n* store-specific price and sale price;\n* optional quantity;\n* pickup method, including buy, reserve or ship to store; and\n* pickup service level, such as same day or next day.\n\nThe submitted availability, price and pickup promise should match the physical store and the landing or checkout experience.\n\n# Implementation checklist\n\n* Maintain one stable product identifier across product and local-inventory data.\n* Publish availability for each store, not only at chain level.\n* Update stock promptly after sales, returns and stock transfers.\n* Show nearby alternatives when the preferred branch is unavailable.\n* Keep first-party pages, Merchant Center and the [Business Profile](/local-seo/gbp-signals.md) consistent.\n* Provide a human confirmation path for expensive, scarce or fast-moving items.\n\n# Agentic angle\n\nAvailability, price and fulfilment are decision inputs for [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md). An agent should not reserve or purchase when those inputs are stale or contradictory.\n\n# Citations\n\n[1] [Google Merchant Center \u2014 Local inventory ads and free local listings overview](https://support.google.com/merchants/answer/14615117?hl=en)\n\n[2] [Google Merchant Center \u2014 Local inventory data specification](https://support.google.com/merchants/answer/14819809?hl=en)\n\n[3] [Lastmile Retail / Miriam Ellis \u2014 Data-based Tactics for Increasing High-Dollar Local Purchases](https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte)\n", "links": ["references/lastmile-high-dollar-survey", "local-seo/gbp-signals", "agentic/agentic-commerce-readiness"]}, {"id": "gbp/business-description", "type": "Playbook", "title": "GBP Business Description", "description": "The 750-character \"From the business\" field \u2014 what Google allows, a working formula, and the anti-patterns that get descriptions rejected.", "resource": "", "tags": ["local-seo", "gbp", "content"], "body": "The business description is the free-text field on a [Google Business Profile](/gbp/google-business-profile.md), shown in the **\"From the business\"** section of the profile on Search and Maps. Google's editing help confirms a limit of **750 characters** (accessed 2026-07-06). In some regions and languages Google offers AI-assisted drafting inside the profile editor.\n\nTreat the description primarily as a conversion asset: Google's guidance frames it as customer information (\"services and products offered, as well as the mission and history of your business\"), and no primary source documents a specific ranking weight for it. Completeness in general feeds relevance \u2014 see [GBP signals](/local-seo/gbp-signals.md).\n\n# What Google's rules allow\n\nFrom Google's guidelines for representing your business and the profile-editing help:\n\n* Describe what you offer, what makes the business unique, your history, and anything else useful to customers.\n* **No links of any type** \u2014 URLs and HTML are rejected.\n* Don't focus on promotions, prices or sales (\"Everything on sale, \u221250%\" is Google's own example of what to avoid).\n* No low-quality or irrelevant content: misspellings, gimmicky character use, gibberish.\n* Be \"upfront and honest about the information provided\".\n\n# A working formula\n\nSpend the 750 characters in roughly this order, most important first:\n\n1. **What you are and where** \u2014 one plain sentence: offer + primary service area. Front-load it; on small screens only the opening is visible before the reader expands.\n2. **Core services** \u2014 the two-to-four things people actually search for, phrased the way customers say them (which supports relevance matching without stuffing).\n3. **Differentiators** \u2014 years trading, credentials, guarantees, specialisms. Verifiable claims only.\n4. **A soft close** \u2014 what to do next, without a URL: \"Call for a same-day quote.\"\n\nReuse the same factual core on the website's homepage or location page and in the `LocalBusiness` schema `description` \u2014 consistency across surfaces is the point of [NAP & citations](/local-seo/nap-citations.md) and [local schema](/local-seo/local-schema.md).\n\n# Anti-patterns\n\n* **Keyword stuffing** \u2014 a list of city names and service permutations reads as low-quality content and wastes the field's persuasive job.\n* **Promo copy** \u2014 offer-led text breaches the guideline outright; put offers in [Google Posts](/gbp/google-posts.md), which exist for that.\n* **Links, phone numbers, ALL-CAPS, emoji runs** \u2014 rejected or flagged as gimmicky character use.\n* **Restating the category list** \u2014 the categories, services and attributes fields already carry that data structurally; duplicating them spends characters without adding information.\n* **Unverifiable superlatives** \u2014 \"the best in town\" is neither honest per the guidelines nor useful to a reader.\n\n# Citations\n\n[1] [Google \u2014 Edit your Business Profile](https://support.google.com/business/answer/3039617)\n\n[2] [Google \u2014 Guidelines for representing your business on Google](https://support.google.com/business/answer/3038177)\n", "links": ["gbp/google-business-profile", "local-seo/gbp-signals", "local-seo/nap-citations", "local-seo/local-schema", "gbp/google-posts"]}, {"id": "gbp/google-business-profile", "type": "Concept", "title": "Google Business Profile", "description": "The free Google listing that controls how a business appears on Search and Maps, ranked by relevance, distance and prominence.", "resource": "", "tags": ["local-seo", "gbp", "ranking-factors"], "body": "A Google Business Profile (GBP) is the free listing through which a business manages how it appears on Google Search and Google Maps. Google's own framing: \"With a Business Profile on Google, you can manage how your business shows up on Maps and Search at no charge.\" Eligibility requires in-person contact with customers \u2014 a storefront customers visit, or a service-area business that travels to them; online-only businesses are not eligible.\n\nThe profile is the single biggest lever on local pack visibility \u2014 that ranking-dimension view, including why the primary category is the most important single setting, lives in [GBP signals](/local-seo/gbp-signals.md). The field-by-field audit method is in [GBP profile audit](/maps/gbp-profile-audit.md), and the hands-on first pass is the [GBP optimisation checklist](/playbooks/gbp-optimisation-checklist.md).\n\n# From Google My Business to Google Business Profile\n\nThe product has been renamed several times. Every date below is taken from Google's own announcement of that change:\n\n| Date | Change | Google's wording |\n|------|--------|------------------|\n| 20 April 2010 | Google Local Business Center becomes **Google Places**. | \"Today the Local Business Center is becoming Google Places.\" |\n| 30 May 2012 | **Google+ Local** launches as the consumer-facing local surface; owners \"continue to manage your local listing information via Google Places for Business\". | \"We're rolling out Google+ Local, a simple way to discover and share local information.\" |\n| 11 June 2014 | **Google My Business (GMB)** launches, \"upgrading current users of Places for Business and the Google+ Dashboard to this new experience\". | \"Help your business shine with Google My Business.\" |\n| 4 November 2021 | GMB becomes **Google Business Profile**. | \"To keep things simple, 'Google My Business' is being renamed 'Google Business Profile.'\" |\n\nThe 2021 announcement also changed how profiles are managed: single-location businesses claim, verify and manage the profile directly in Google Search and the Google Maps app; the standalone GMB mobile app was retired in 2022; and the old web console was repositioned for multi-location businesses as **Business Profile Manager**. \"GMB\" and \"GBP\" refer to the same product \u2014 management now happens in Search and Maps themselves.\n\n# Google's three local ranking factors\n\nGoogle states that local results are ranked primarily on three factors, and that \"there's no way to request or pay for a better local ranking on Google.\"\n\n| Factor | Google's definition | What feeds it |\n|--------|--------------------|---------------|\n| **Relevance** | How well a Business Profile matches what someone is searching for. | Complete, accurate profile information \u2014 above all the primary category, plus services, attributes and description. |\n| **Distance** | How far each business is from the customer who's searching. | The searcher's location. Not directly controllable; service-area settings define where you claim to serve. |\n| **Prominence** | How well-known a business is. | Google names inbound links and review count explicitly; offline reputation and web presence feed it too. |\n\n# Ranking-factor impact overview\n\nDistance is fixed per search, so the controllable levers are relevance and prominence:\n\n* **Relevance** \u2014 primary category first, then completeness: services, attributes, hours, [business description](/gbp/business-description.md) and regular [posts](/gbp/google-posts.md). See [GBP signals](/local-seo/gbp-signals.md) for the relative weighting evidence.\n* **Prominence** \u2014 [reviews](/gbp/reviews.md) (count, rating, recency \u2014 see [reviews & reputation](/local-seo/reviews-reputation.md)), links, and consistent citations ([NAP & citations](/local-seo/nap-citations.md)).\n* **Trust** \u2014 a [verified](/gbp/verification.md) profile that is actively monitored ([profile shielding](/gbp/profile-shielding.md)) and clean of policy violations ([spam & fake listings](/gbp/spam-and-fake-listings.md)).\n\n# Citations\n\n[1] [Google \u2014 Tips to improve your local ranking on Google](/references/google-local-ranking.md)\n\n[2] [Google \u2014 Get started with Google Business Profile](https://support.google.com/business/answer/7039811)\n\n[3] [Google \u2014 Connect with local holiday shoppers (4 November 2021 rename announcement)](/references/google-gbp-rename-2021.md)\n\n[4] [Google \u2014 Introducing Google Places (20 April 2010)](https://googleblog.blogspot.com/2010/04/introducing-google-places.html)\n\n[5] [Google \u2014 Local, now with a dash of Zagat and a sprinkle of Google+ (30 May 2012)](https://blog.google/products/google-plus/localnow-with-dash-of-zagat-and/)\n\n[6] [Google \u2014 Help your business shine with Google My Business (11 June 2014)](https://smallbusiness.googleblog.com/2014/06/help-your-business-shine-with-google-my.html)\n", "links": ["local-seo/gbp-signals", "maps/gbp-profile-audit", "playbooks/gbp-optimisation-checklist", "gbp/business-description", "gbp/google-posts", "local-seo/gbp-signals", "gbp/reviews", "local-seo/reviews-reputation", "local-seo/nap-citations", "gbp/verification", "gbp/profile-shielding", "gbp/spam-and-fake-listings", "references/google-local-ranking", "references/google-gbp-rename-2021"]}, {"id": "gbp/google-posts", "type": "Playbook", "title": "Google Posts", "description": "Update, Offer and Event posts on a Business Profile \u2014 mechanics, cadence, advanced tactics, and the visibility evidence.", "resource": "", "tags": ["local-seo", "gbp", "posts", "content"], "body": "Posts are the publishing surface of a [Google Business Profile](/gbp/google-business-profile.md): short, dated announcements that appear on the profile itself. On mobile Search and Maps they show in the **Updates** (or Overview) tab; on desktop they show in the **\"From the owner\"** section. Posts without a date range are archived after six months.\n\n# The three post types\n\n| Type | Required | Optional | Notes |\n|------|----------|----------|-------|\n| **Update** | Description | Photo, video, action button (book, order, learn more) | The general-purpose type. |\n| **Offer** | Title, start/end dates | Description, photo/video, coupon code, link, terms | Gets a \"View Offer\" button automatically. |\n| **Event** | Title, start/end dates and times | Description, photo/video, action button | Without times, the event shows as lasting 24 hours on the event dates. |\n\nContent rules worth knowing before drafting: posts containing phone numbers may be rejected, and the usual content policies apply (no misspellings-as-style, explicit material, or product-level content for regulated goods such as alcohol or tobacco).\n\n# Cadence\n\nGoogle sets no required frequency; the archive rule and the \"recent activity\" reading of the profile argue for a steady rhythm rather than bursts. A **weekly post** is the common working baseline \u2014 the multi-location case study below runs a weekly planning cycle. Tie the calendar to real events: offers to actual promotions, events to actual dates, updates to genuine news. Regular activity also feeds the \"actively maintained profile\" signal described in [GBP signals](/local-seo/gbp-signals.md).\n\n# Advanced tactics\n\n* **Tag every action-button link with UTM parameters** so post traffic and conversions are attributable in analytics \u2014 otherwise post clicks blend into direct/organic and the programme can't defend its cost.\n* **Use Offer and Event types when they apply** rather than defaulting to Updates: the automatic \"View Offer\" button and the date-scoped display are free structure.\n* **Plan from the promotions calendar, not ad hoc.** The published case study team reviews the week's planned events every Monday and drafts the week's posts in one sitting.\n* **Multi-location: centralise drafting, localise details.** Posts can be drafted centrally and varied per location; AI-assisted drafting under human approval is covered in [HITL GBP management](/agentic/hitl-gbp-management.md).\n\n# What posts do for visibility\n\nGoogle does not document any direct ranking boost from posting. The honest case for posts is: they occupy profile real estate with fresh, owner-controlled content; they carry the only native call-to-action buttons on the profile; and they contribute to the active-profile signal. The strongest public quantified result is a vendor-published case study of a 161-location home-retail brand (US/Canada) that layered weekly posts into centralised profile management and reported **+31% Google Maps views and +6% Google Search views, 2024 versus 2023**, alongside a 95% profile-completeness rate \u2014 a correlation from one programme, not a controlled experiment, so treat it as directional.\n\n# Citations\n\n[1] [Google \u2014 Create and manage posts on your Business Profile](https://support.google.com/business/answer/7342169)\n\n[2] [Uberall \u2014 Crate & Barrel case study (accessed 2026-07-06)](https://uberall.com/en-us/customers/how-crate-barrel-grew-google-visibility-by-31-while-saving-time)\n", "links": ["gbp/google-business-profile", "local-seo/gbp-signals", "agentic/hitl-gbp-management"]}, {"id": "gbp/profile-shielding", "type": "Playbook", "title": "Profile Shielding", "description": "A generic detect-diff-decide-revert pattern for catching and reversing unauthorised Business Profile edits (\"Google updates\").", "resource": "", "tags": ["local-seo", "gbp", "monitoring", "api"], "body": "A [Google Business Profile](/gbp/google-business-profile.md) is not solely owner-authored. Google updates profiles from other sources \u2014 user suggestions and reports among them \u2014 to keep customer-facing information current. When that happens the owner gets a notification and an alert in the profile's Edit profile section; the change may already be live. \"Profile shielding\" is the generic operational pattern for catching these changes quickly and re-asserting the canonical data. It is written here product-neutrally: any scheduler, any alerting channel, any data store.\n\nThe risk being managed: a category, hours or address change you didn't make silently degrades [relevance](/local-seo/gbp-signals.md), misdirects customers, or (address changes) undermines [NAP consistency](/local-seo/nap-citations.md).\n\n# The pattern: detect \u2192 diff \u2192 decide \u2192 re-assert\n\nGoogle's Business Profile API documents the mechanics end-to-end (\"Manage Google Updates\", accessed 2026-07-06):\n\n1. **Detect** \u2014 poll the locations you manage and check the **`metadata.hasGoogleUpdated`** flag. `true` means Google's serving version differs from your submitted version and needs review. This flag is the programmatic equivalent of the pending-updates alert in the profile editor.\n2. **Diff** \u2014 call **`locations.getGoogleUpdated`** for the flagged location. The response carries a **`diffMask`** listing exactly which fields Google's serving data changed (action needed), and a `pendingMask` for fields you submitted that are still in review (no action needed \u2014 don't fight your own pending edits).\n3. **Decide** \u2014 route the diff to a human with the canonical value alongside Google's value. Some Google updates are correct (a real hours change reported by the public); auto-reverting everything re-breaks those. This is a [human-in-the-loop](/agentic/hitl-gbp-management.md) decision point.\n4. **Re-assert or accept** \u2014 both are the same API call: **`locations.patch`** with an `updateMask` scoped to the disputed fields. To accept, patch in Google's new value; to reject, patch your original value back, which re-submits it through Google's normal review. After a successful patch, `hasGoogleUpdated` clears.\n\n# Operational notes\n\n* **Keep a canonical record.** Reversion requires a trusted copy of every field's correct value, versioned and dated, outside the profile itself. The [audit checklist](/maps/gbp-profile-audit.md) fields are the natural schema.\n* **Patch narrowly.** Always use the tightest `updateMask` that covers the disputed fields \u2014 a broad patch can overwrite unrelated pending changes.\n* **Expect review latency.** Owner edits are themselves reviewed \u2014 usually about ten minutes, but up to 30 days for sensitive fields \u2014 so a re-asserted value is not instantly live, and repeated rapid flip-flopping of high-trust fields (name, address, category) invites scrutiny.\n* **Alert on the fields that hurt most.** Primary category, name, address, phone, website and hours deserve immediate alerts; attribute-level drift can batch into a daily digest.\n* **Non-API fallback.** The same loop runs manually at lower frequency: check the Edit profile section for the pending-updates alert on a schedule, compare against the canonical record, and accept or edit back through the editor.\n\n# Citations\n\n[1] [Google Business Profile APIs \u2014 Manage Google Updates](/references/google-manage-google-updates.md)\n\n[2] [Google \u2014 Understand what happens to your Business Profile edits](https://support.google.com/business/answer/3038311)\n\n[3] [Google Business Profile APIs \u2014 locations.patch](https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch)\n", "links": ["gbp/google-business-profile", "local-seo/gbp-signals", "local-seo/nap-citations", "agentic/hitl-gbp-management", "maps/gbp-profile-audit", "references/google-manage-google-updates"]}, {"id": "gbp/review-gating", "type": "Concept", "title": "Review Gating", "description": "Where \"ask happy customers first\" crosses Google's review policy and the FTC Consumer Reviews and Testimonials Rule.", "resource": "", "tags": ["local-seo", "gbp", "reviews", "policy", "compliance"], "body": "Review gating is filtering customers by satisfaction before asking for a public review \u2014 typically a \"how was your experience?\" pre-survey that routes happy customers to Google and unhappy ones to a private feedback form. It sits in genuine tension with mainstream advice to \"ask your happy customers for reviews\", and since 2024 it carries regulatory as well as platform risk. The generation workflow it constrains is in [reviews on GBP](/gbp/reviews.md); the ranking dimension is in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Google's policy\n\nGoogle Maps' prohibited-content policy bars merchants from conduct including, verbatim: \"Discourage or prohibit negative reviews, or selectively solicit positive reviews from customers.\" The same policy prohibits offering incentives \u2014 payment, discounts, free goods or services \u2014 in exchange for posting, revising or removing a review, and prohibits pressuring users to review while on the premises. Merchants *may* \"solicit or encourage the posting of content that does represent a genuine experience, without offering incentives\". Enforcement ranges from content removal to feature limits and account suspension.\n\nSo the platform line is clear: ask everyone, incentivise no one.\n\n# The FTC Consumer Reviews and Testimonials Rule\n\nThe FTC's Rule on the Use of Consumer Reviews and Testimonials (16 CFR Part 465) took effect on **21 October 2024** and authorises civil penalties for knowing violations \u2014 up to **$53,088 per violation** as of the FTC's December 2025 enforcement communications. Provisions relevant to review programmes:\n\n* **\u00a7465.2** \u2014 fake or false reviews (including buying, selling or creating them).\n* **\u00a7465.4** \u2014 compensation or incentives **conditioned on the review's sentiment**, positive or negative, express or implied. Incentives for reviews as such are not banned by this rule; incentives for *positive* reviews are (and remain banned by Google's stricter policy either way).\n* **\u00a7465.5** \u2014 undisclosed insider reviews (owners, employees, relatives).\n* **\u00a7465.7** \u2014 review suppression: false accusations against reviewers, or presenting a review set as complete while hiding negatives.\n\nOn gating specifically, the FTC's own Q&A is precise, and worth quoting: *\"Can my business ask for reviews only from customers whom we think are happy with our services? The rule does not contain a specific prohibition against such conduct. But this practice could violate the FTC Act.\"* \u2014 citing the Endorsement Guides (16 CFR 255.2(d) and (e)(11)). Gating is thus not a per-violation penalty under the Rule itself, but it remains actionable deception under the FTC Act, and it always breaches Google policy.\n\nThe Q&A also marks the safe edges: making **generalised solicitations to all purchasers** is expressly exempt (even with an incentive offered equally to everyone \u2014 though Google still prohibits incentives); contacting negative reviewers to resolve their issue is fine; and simply asking satisfied customers to *update* an existing review is fine.\n\n# Enforcement is active\n\n* On **22 December 2025** FTC staff sent warning letters to **ten companies** flagging potential Rule violations \u2014 including review suppression and misuse of social-media indicators \u2014 reminding them of the $53,088-per-violation exposure. The letters were based on consumer complaints; they are warnings, not adjudications.\n* The Rule was invoked in the May 2026 federal complaint over mass fake listings and fabricated reviews \u2014 see [spam & fake listings](/gbp/spam-and-fake-listings.md).\n\n# Safe pattern vs risk pattern\n\n| Safe | Risk |\n|------|------|\n| Ask **every** customer, through the same flow, at the same moment. | Pre-survey that routes only satisfied customers to Google. |\n| Internal satisfaction surveys, run separately from review requests. | Survey that suppresses the review ask when the score is low. |\n| Respond to negatives and resolve offline; invite an updated review afterwards. | Incentives to remove or revise a negative review. |\n| Incentive-free requests via link or QR code. | Any incentive tied to sentiment; any incentive at all on Google. |\n\n# Citations\n\n[1] [Google Maps \u2014 Prohibited and restricted content](https://support.google.com/contributionpolicy/answer/7400114)\n\n[2] [FTC \u2014 Consumer Reviews and Testimonials Rule: Questions and Answers](/references/ftc-consumer-review-rule.md)\n\n[3] [FTC \u2014 press release: FTC Warns 10 Companies About Possible Violations of the Consumer Review Rule (22 December 2025)](https://www.ftc.gov/news-events/news/press-releases/2025/12/ftc-warns-10-companies-about-possible-violations-agencys-new-consumer-review-rule)\n", "links": ["gbp/reviews", "local-seo/reviews-reputation", "gbp/spam-and-fake-listings", "references/ftc-consumer-review-rule"]}, {"id": "gbp/reviews", "type": "Playbook", "title": "Reviews on GBP", "description": "GBP-specific review mechanics \u2014 the response flow, a generation workflow with review links and QR codes, and handling problematic reviews.", "resource": "", "tags": ["local-seo", "gbp", "reviews"], "body": "This is the operational playbook for reviews on a [Google Business Profile](/gbp/google-business-profile.md). The ranking dimension \u2014 recency, thresholds, the 18-day rule \u2014 lives in [reviews & reputation](/local-seo/reviews-reputation.md); cross-platform velocity and fake-review detection live in [review intelligence](/maps/review-intelligence.md).\n\nWhy the effort is justified: in the 2025 SOCi Consumer Behavior Index (1,001 US adults, February 2025), **91% of consumers rely on peer-generated content to evaluate local businesses**, and among younger consumers **65% say they are more likely to choose a business that actively responds to reviews**.\n\n# Response flow\n\nReviews are read and answered from the profile management surface in Google Search or the Maps app (the Reviews section). Google's own response guidance:\n\n1. **Respond to everything**, positive and negative \u2014 response behaviour is visible to every future reader, not just the reviewer.\n2. Keep replies **professional, short and personalised**; don't use replies as advertising.\n3. For negatives: acknowledge, apologise where warranted, state the fix, and move detail offline. Never make accusations about the reviewer (see problematic reviews below).\n4. Respond promptly \u2014 a stale unanswered negative does compounding damage.\n\nIndustry constraints (healthcare/HIPAA, legal privilege) are noted in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Generation workflow\n\nGoogle explicitly supports asking for reviews \u2014 it provides each verified profile with a shareable **review link and QR code** for exactly this purpose. What it prohibits is filtering who you ask and paying for outcomes (see [review gating](/gbp/review-gating.md)).\n\n1. **Get the short link / QR code** from the profile's \"Ask for reviews\" facility.\n2. **Ask everyone, systematically** \u2014 build the ask into the moment the job finishes or the order completes, not an occasional campaign. Asking all customers is both the policy-safe pattern and what keeps velocity steady.\n3. **Match the channel to the customer**: SMS or email follow-up with the link for remote customers; the QR code on receipts, invoices, packaging, table cards or the van for in-person ones.\n4. **Never offer incentives.** Google treats free or discounted goods in exchange for reviews as fake and misleading content, and incentives conditioned on sentiment breach the FTC rule \u2014 details in [review gating](/gbp/review-gating.md).\n5. **Respond as they arrive** \u2014 the response flow above is part of generation: visible responses raise the perceived value of leaving a review.\n\n# Handling problematic reviews\n\n* **Policy-violating content** (spam, off-topic, conflict of interest, harassment, fake) \u2014 report it through the profile's review-reporting flow against Google's prohibited-content policy, and document what you reported. Removal is Google's decision; report and move on rather than replying in kind.\n* **Genuine negatives** \u2014 not removable and not worth fighting: respond with the flow above. A visible, calm owner response is read by prospects as a trust signal.\n* **Suspected fake attacks** \u2014 the detection heuristics (timing, account history, text similarity) are in [review intelligence](/maps/review-intelligence.md); report matches through the same flow.\n* **Never pay for removal or revision.** Offering money, discounts or goods for changing or deleting a negative review breaches Google policy, and the FTC has stated that such incentives can be an unfair practice under the FTC Act.\n\n# Citations\n\n[1] [SOCi 2025 Consumer Behavior Index](/references/soci-cbi-2025.md)\n\n[2] [Google \u2014 Tips to get more reviews](https://support.google.com/business/answer/3474122)\n\n[3] [Google Maps \u2014 Prohibited and restricted content](https://support.google.com/contributionpolicy/answer/7400114)\n\n[4] [FTC \u2014 Consumer Reviews and Testimonials Rule: Questions and Answers](/references/ftc-consumer-review-rule.md)\n", "links": ["gbp/google-business-profile", "local-seo/reviews-reputation", "maps/review-intelligence", "local-seo/reviews-reputation", "gbp/review-gating", "gbp/review-gating", "maps/review-intelligence", "references/soci-cbi-2025", "references/ftc-consumer-review-rule"]}, {"id": "gbp/spam-and-fake-listings", "type": "Concept", "title": "GBP Spam & Fake Listings", "description": "How fake-listing operations work, what enforcement now looks like, and why legitimacy signals protect real businesses.", "resource": "", "tags": ["local-seo", "gbp", "spam", "trust"], "body": "Fake listings are profiles for businesses that don't exist as presented: invented names, addresses the operator doesn't occupy, and phone numbers that route elsewhere. They work because local search rewards apparent proximity and apparent reputation \u2014 both of which can be fabricated at scale for far less than the cost of being a real local business. The victims are consumers, and equally the legitimate businesses whose [visibility](/local-seo/gbp-signals.md) they displace.\n\n# The tactic set\n\nDocumented in the 2026 US federal complaint described below, and consistent with what [profile auditing](/maps/gbp-profile-audit.md) and [review intelligence](/maps/review-intelligence.md) see in the wild:\n\n* **Fabricated local identities** \u2014 profile names invented per city, often keyword-loaded (\"electrical services\", \"plumbing\", \"garage door repair\") to match service searches.\n* **Address abuse** \u2014 listed addresses belonging to unrelated third parties, or made up entirely; nobody is at the location.\n* **Phone-number laundering** \u2014 local area codes that forward to centralised, often overseas, call centres.\n* **Fake reviews at scale** \u2014 fabricated five-star reviews to bury genuine one-star reviews and lift the aggregate rating, sometimes using profile photos misappropriated from unrelated websites' staff pages.\n* **Subcontracted fulfilment** \u2014 when a customer does book, the work is passed to third-party contractors posing as employees, with no control over qualifications or quality.\n\n# Enforcement is no longer only Google's\n\nGoogle's own enforcement runs through [verification](/gbp/verification.md), content policy and suspensions. What changed in 2025\u201326 is that listing fraud became a legal-enforcement matter:\n\n* In **May 2026**, the US Department of Justice \u2014 acting on an FTC referral, with the Illinois Attorney General \u2014 filed a civil complaint against an Illinois company trading as \"Premium Home Service\" (B.E.S.T. GDR, LLC) and its CEO. The DOJ alleges the defendants created **over 15,000 fake business profiles on Google Search and Maps**, deceived **well over 100,000 consumers** since at least 2018, took **\"tens of millions of dollars\"**, and operated **over 7,600 phone numbers across more than 250 area codes** routing to overseas representatives. (Figures are allegations from the filing, not adjudicated findings.)\n* The complaint invokes the FTC Act, the FTC's Consumer Reviews and Testimonials Rule (see [review gating](/gbp/review-gating.md)), the Gramm-Leach-Bliley Act, and state consumer-protection law \u2014 a template other actions can reuse.\n\nA widely reported \"$79 million\" gains figure for this case comes from investigative journalism, not the filing; the complaint itself says \"tens of millions of dollars\".\n\n# Why legitimacy signals matter\n\nThe enforcement story is also the optimisation story in reverse. Everything a fake listing must fabricate is something a real business can prove:\n\n* **Verification** \u2014 video and live-call [verification](/gbp/verification.md) exists precisely because postcards were spoofable at scale.\n* **Consistent NAP** \u2014 a real address and phone number that match across the web ([NAP & citations](/local-seo/nap-citations.md)) is expensive to fake per listing.\n* **Organic review patterns** \u2014 steady velocity from accounts with history ([review intelligence](/maps/review-intelligence.md)), versus the burst patterns fake operations produce.\n* **A real web footprint** \u2014 [local schema](/local-seo/local-schema.md), a matching website, and photos of a premises that exists.\n\nFor a legitimate business, the practical defence against fake competitors is to report them through Google's redressal channels and to be conspicuously verifiable yourself; for the profile-integrity side of the same problem, see [profile shielding](/gbp/profile-shielding.md).\n\n# Citations\n\n[1] [US DOJ \u2014 complaint against B.E.S.T. GDR, LLC d/b/a Premium Home Service (11 May 2026)](/references/doj-best-gdr-2026.md)\n\n[2] [FTC \u2014 press release and filed complaint, United States and State of Illinois v. B.E.S.T. GDR, LLC](https://www.ftc.gov/news-events/news/press-releases/2026/05/ftc-illinois-take-action-stop-deceptive-conduct-company-created-thousands-business-listings-fake)\n\n[3] [Google Maps \u2014 Prohibited and restricted content](https://support.google.com/contributionpolicy/answer/7400114)\n", "links": ["local-seo/gbp-signals", "maps/gbp-profile-audit", "maps/review-intelligence", "gbp/verification", "gbp/review-gating", "gbp/verification", "local-seo/nap-citations", "maps/review-intelligence", "local-seo/local-schema", "gbp/profile-shielding", "references/doj-best-gdr-2026"]}, {"id": "gbp/verification", "type": "Playbook", "title": "GBP Verification", "description": "The six verification methods, how Google auto-assigns them, review timing, claiming an existing profile, and service-area edge cases.", "resource": "", "tags": ["local-seo", "gbp", "verification"], "body": "Verification proves to Google that you legitimately represent the business, and it gates almost everything else on a [Google Business Profile](/gbp/google-business-profile.md): responding to [reviews](/gbp/reviews.md), publishing [posts](/gbp/google-posts.md), and editing core fields. It is also the front line of Google's defence against [fake listings](/gbp/spam-and-fake-listings.md).\n\n# The six methods\n\nGoogle's verification help (accessed 2026-07-06) lists six methods:\n\n| Method | Mechanics |\n|--------|-----------|\n| **Video recording** | Record the business location, equipment and proof of management (details below). |\n| **Phone or text** | A code delivered by call or SMS to the listed number. |\n| **Email** | A code to the business email. |\n| **Live video call** | A real-time walkthrough with a Google representative. |\n| **Postcard** | A code posted to the business address; most codes arrive within 14 days. |\n| **Search Console** | Instant verification when the business website is already verified in Google Search Console. |\n\nTwo operational rules matter more than the list:\n\n* **Google assigns the methods; you can't change them.** Which options appear is determined automatically from business type, public information, region and business hours. Plan for the method offered, not the one you'd prefer.\n* **Codes expire after 30 days**, and once you submit, review can take **up to five business days**.\n\n# Video verification in practice\n\nVideo has become the workhorse method, and most rejections are avoidable. The recording must be a single continuous take, at least 30 seconds, captured live from a mobile device (pre-recorded uploads are not accepted), and must show three things:\n\n1. **Location** \u2014 the surroundings and the business name on permanent signage (signboard, wall or window \u2014 not a paper sign).\n2. **Business evidence** \u2014 for service-area businesses: tools, equipment, stock, branded vehicle or apparel.\n3. **Proof of management** \u2014 something only a representative can do or access: unlocking the premises, opening the till or point-of-sale, a business licence or utility bill matching the profile name.\n\n# Claiming and ownership\n\n* **Profile already exists, unclaimed** \u2014 claim it through the profile itself (\"Own this business?\") and verify as above.\n* **Profile claimed by someone else** (a former agency, ex-employee, previous owner) \u2014 use Google's request-ownership flow: the current owner is notified by email and has **3 days** to respond; if they don't, Google offers the option to claim and verify yourself.\n* **Transferring ownership** \u2014 profiles carry primary-owner, owner and manager roles; primary ownership is transferred from the profile's people-management settings rather than by re-verifying. Never let an agency hold primary ownership of a client profile.\n\n# Service-area and hybrid businesses\n\n* A **service-area business (SAB)** \u2014 one that visits or delivers to customers but doesn't serve them at its own address \u2014 must remove the address from the profile and define service areas instead: up to **20 areas**, set by city or postal code, with Google advising boundaries within about **2 hours' driving time** of the base.\n* A **hybrid business** (storefront plus delivery/callouts, e.g. a restaurant that also delivers) keeps its address and hours and adds service areas.\n* Service-area edits can take up to 48 hours to appear. Settle the address/SAB question before verifying rather than after \u2014 the address is part of what verification attests to.\n\n# Citations\n\n[1] [Google \u2014 Verify your business on Google](/references/google-gbp-verification.md)\n\n[2] [Google \u2014 Verify your business with a video recording](https://support.google.com/business/answer/14271705)\n\n[3] [Google \u2014 Request ownership of a Business Profile](https://support.google.com/business/answer/4566671)\n\n[4] [Google \u2014 Manage your service areas for service-area and hybrid businesses](https://support.google.com/business/answer/9157481)\n", "links": ["gbp/google-business-profile", "gbp/reviews", "gbp/google-posts", "gbp/spam-and-fake-listings", "references/google-gbp-verification"]}, {"id": "local-seo/ai-search-local", "type": "Concept", "title": "AI Search Impact on Local", "description": "How AI assistants and AI Overviews reshape local discovery, and where they source business facts.", "resource": "", "tags": ["local-seo", "ai-search", "geo", "aeo"], "body": "AI assistants and AI Overviews are now a real local-discovery surface. Google's own guidance is that AI features run on the same systems as ordinary Search \u2014 there's no separate \"AI SEO\" trick, and normal indexing/eligibility is the floor. So the work is mostly good SEO done well, plus attention to where AI gets its facts.\n\n# What the data suggests\n\n* AI traffic tends to **convert well**: Seer Interactive's case study saw ChatGPT traffic convert at ~15.9% vs ~1.76% for Google organic \u2014 though that's a single client, so treat it as directional, not a benchmark.\n* **Brand mentions** matter more than backlinks for AI visibility (Ahrefs) \u2014 see [local links & authority](/local-seo/local-authority-links.md).\n* AI assistants generally pull from the open web and major third-party sources rather than reading Google Business Profile directly, so your presence on independent sites and directories ([NAP & citations](/local-seo/nap-citations.md)) does real work.\n\n# What to do\n\n1. Get the SEO fundamentals right \u2014 indexable, eligible, well-structured pages.\n2. Build genuine brand mentions and earned media.\n3. Be present and consistent on the third-party sources AI tools commonly cite (review sites, directories, community platforms).\n4. Claim under-used surfaces like Bing Places and Apple Business Connect.\n\n# Citations\n\n[1] [Google \u2014 AI features and your website](/references/google-ai-optimization-guide.md)\n[2] [Seer Interactive ChatGPT conversion case study](/references/seer-chatgpt-conversion.md)\n[3] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/local-authority-links", "local-seo/nap-citations", "references/google-ai-optimization-guide", "references/seer-chatgpt-conversion", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/business-type-detection", "type": "Detection Method", "title": "Business Type Detection", "description": "Classify a business as brick-and-mortar, service-area, or hybrid before running local SEO checks.", "resource": "", "tags": ["local-seo", "detection", "gbp"], "body": "Detect the business type from page signals **before** analysis. The type determines which checks apply \u2014 for example, service-area businesses skip embedded-map and physical-address checks.\n\n# Types\n\n| Type | Signals |\n|------|---------|\n| **Brick-and-mortar** | Physical street address in content/footer; Google Maps embed with pin/directions; \"Visit us at\", \"Located at\"; structured address in [LocalBusiness schema](/local-seo/local-schema.md). |\n| **Service Area Business (SAB)** | No visible physical address; \"serving [city/region]\", \"we come to you\", \"mobile [service]\"; `areaServed` in schema without `address.streetAddress`. |\n| **Hybrid** | Both a physical address and service-area language; e.g. \"visit our showroom\" plus \"we also serve [areas]\". |\n\n# Impact on checks\n\nSABs skip embedded-map verification and physical-address consistency. Brick-and-mortar gets the full [NAP and citation](/local-seo/nap-citations.md) checks. This classification also shapes [schema generation](/maps/schema-generation.md) \u2014 SABs use `areaServed` with named cities rather than a street address.\n\n# Citations\n\nA heuristic detection method derived from observable page signals; not an externally published taxonomy. Its schema implications follow Google's service-area handling:\n\n[1] [Google Business Profile Help \u2014 Service-area businesses on Google](https://support.google.com/business/answer/9157481?hl=en)\n\n[2] [Schema.org \u2014 LocalBusiness `areaServed`](https://schema.org/areaServed)\n", "links": ["local-seo/local-schema", "local-seo/nap-citations", "maps/schema-generation"]}, {"id": "local-seo/gbp-signals", "type": "Ranking Dimension", "title": "GBP Signals", "description": "Google Business Profile is the leading driver of local pack visibility; the primary category is the most important single setting.", "resource": "", "tags": ["local-seo", "gbp", "ranking-factors"], "body": "Your Google Business Profile is the single biggest lever on local pack visibility (the top-three map results), per Whitespark's ranking-factors study. We don't quote a precise weighting \u2014 Whitespark's exact percentages aren't published \u2014 but its relative ranking is consistent and well-established.\n\n# What to check\n\n* Primary category \u2014 the most important setting on the profile. Pick the most specific category that genuinely fits; a wrong primary category actively suppresses visibility.\n* Relevant secondary categories that reflect real services.\n* A complete, accurate profile: name, address (if applicable), hours, phone, website.\n* Photos and regular activity (posts, updates) \u2014 an actively maintained profile reads as a live business.\n* Reviews flowing steadily \u2014 see [reviews & reputation](/local-seo/reviews-reputation.md).\n* The website URL strategy \u2014 point the GBP link at a relevant, well-optimised page rather than reflexively at the homepage.\n\n# On-page detection signals\n\nWhen auditing from the website alone, look for a Maps embed, a place reference, or a reviews widget as evidence the GBP exists and is linked.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Accurate primary category, complete profile, active posts/photos, steady reviews. |\n| Partial | Profile present but incomplete or inactive. |\n| Low | No visible GBP integration on the website. |\n\n# Related\n\nLive profile completeness is scored in [GBP profile audit](/maps/gbp-profile-audit.md). For the hands-on first pass, see the [GBP optimisation checklist](/playbooks/gbp-optimisation-checklist.md).\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/reviews-reputation", "maps/gbp-profile-audit", "playbooks/gbp-optimisation-checklist", "references/whitespark-2026"]}, {"id": "local-seo/industry-vertical-detection", "type": "Detection Method", "title": "Industry Vertical Detection", "description": "Detect the industry vertical from page and GBP signals to route to industry-specific local SEO checks.", "resource": "", "tags": ["local-seo", "detection"], "body": "Detect the vertical from page signals and GBP category patterns, then route to industry-specific checks (see [local schema markup](/local-seo/local-schema.md)). If no vertical is detected, use the generic `LocalBusiness` path.\n\n# Detection signals\n\n| Vertical | Detection signals |\n|----------|-------------------|\n| **Restaurant** | /menu, menu items, reservations, cuisine types, food ordering, \"dine-in\", \"takeout\" |\n| **Healthcare** | insurance accepted, patients, appointments, NPI, medical terms, \"Dr.\", HIPAA notice |\n| **Legal** | attorney, lawyer, practice areas, bar admission, case results, \"free consultation\" |\n| **Home Services** | service area, emergency service, \"free estimate\", licensed/insured/bonded, \"24/7\" |\n| **Real Estate** | listings, MLS, properties for sale/rent, agent bio, brokerage, \"open house\" |\n| **Automotive** | inventory, VIN, test drive, dealership, service department, \"new/used/certified\" |\n\n# Why it matters\n\nThe vertical changes the correct schema subtype, the citation directories worth pursuing, and the review-response rules (e.g. HIPAA constraints for healthcare). When the vertical is unclear, present the top two detected verticals with supporting signals and confirm before applying industry-specific recommendations.\n\n# Citations\n\nA heuristic detection method derived from observable page and GBP-category signals; not an externally published taxonomy. The schema subtypes it routes to are defined by:\n\n[1] [Schema.org \u2014 LocalBusiness (subtype hierarchy)](https://schema.org/LocalBusiness)\n\n[2] [Google Business Profile Help \u2014 Categories](https://support.google.com/business/answer/3038177?hl=en)\n", "links": ["local-seo/local-schema"]}, {"id": "local-seo/local-authority-links", "type": "Ranking Dimension", "title": "Local Links & Authority", "description": "Local backlinks, brand mentions, and being listed where AI and search look for credible businesses.", "resource": "", "tags": ["local-seo", "links", "authority", "ranking-factors"], "body": "Links still matter for local organic rankings, but the bigger shift is towards **brand mentions and earned media** \u2014 especially for AI visibility. Ahrefs' 75,000-brand study found brand web mentions correlate far more strongly with AI Overview visibility (\u22480.664) than backlinks do (\u22480.218) \u2014 roughly three times the strength. It's a correlation study, not proof of causation, but the direction is clear: get talked about, not just linked to.\n\n# What to check\n\n* Local authority signals on the page \u2014 Chamber of Commerce, BBB, local press, sponsorships, community involvement.\n* Brand mentions across the wider web (not just links).\n* Placement on credible local \"best of\" / round-up lists.\n* A steady trickle of quality local links rather than spikes.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Visible local authority signals (chamber, BBB, press) and evident community presence. |\n| Partial | Some signals but limited local link/mention footprint. |\n| Low | No detectable local authority signals. |\n\n# Related\n\nBrand mentions and earned placements feed directly into [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/ai-search-local", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/local-onpage", "type": "Ranking Dimension", "title": "Local On-Page SEO", "description": "Dedicated service pages, visible NAP, and avoiding doorway-page patterns.", "resource": "", "tags": ["local-seo", "on-page", "ranking-factors"], "body": "Dedicated, genuinely useful service pages are among the strongest local on-page signals (Whitespark ranks dedicated service pages near the top of its local organic factors). This is where most local sites win or lose.\n\n# What to check\n\n* Title tag and H1 carry the city + service intent.\n* NAP (name, address, phone) visible in the page HTML \u2014 footer, contact section, or header. See [NAP consistency & citations](/local-seo/nap-citations.md).\n* One dedicated page per core service, with real, specific content.\n* Click-to-call (`tel:`) and a contact form above the fold.\n* Sensible internal linking \u2014 every important page reachable in a few clicks, with descriptive anchor text.\n\n# Location pages (multi-location)\n\nThe big risk is **doorway pages** \u2014 near-identical templates with only the town name swapped. The quick test: if you can swap the city and the copy still reads fine, it's a doorway page, and Google's core updates have repeatedly hit that pattern. Make each page genuinely unique \u2014 local photos, area-specific testimonials, local FAQs \u2014 and give each its own [LocalBusiness schema](/local-seo/local-schema.md) with a unique `@id`. Prefer crawlable, server-rendered location URLs under a tidy `/locations/city/` structure.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | City in title + H1, NAP visible, dedicated service pages, no doorway patterns, clean internal linking. |\n| Partial | Some local signals but missing service pages or doorway-page risk. |\n| Low | Generic title/H1, NAP not visible, thin location pages. |\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/nap-citations", "local-seo/local-schema", "references/whitespark-2026"]}, {"id": "local-seo/local-schema", "type": "Ranking Dimension", "title": "Local Schema Markup", "description": "LocalBusiness JSON-LD with the correct industry subtype \u2014 not a ranking factor, but it helps search and AI parse the business.", "resource": "", "tags": ["local-seo", "schema", "json-ld", "ranking-factors"], "body": "Structured data is **not** a direct ranking factor (Google's own line), but it can earn rich results and, increasingly, it helps AI systems read your business facts cleanly. Worth getting right; not worth over-claiming.\n\n# What to check\n\n* LocalBusiness JSON-LD present (extract the blocks).\n* Required: `name`, `address` with `PostalAddress` sub-properties.\n* Recommended: `geo` (use real lat/long with several decimal places), `openingHoursSpecification`, `telephone`, `url`, `image`, and `aggregateRating` where genuine.\n* **Correct subtype for the industry** (see [industry vertical detection](/local-seo/industry-vertical-detection.md)) \u2014 e.g. `Restaurant`, `LegalService`, `Dentist`, `AutoDealer`, rather than a generic `LocalBusiness`.\n* Service-area businesses: use `areaServed` with named places instead of a street address.\n* Multi-location: each page gets its own LocalBusiness with a unique `@id`, linked via `branchOf` to the Organization on the homepage.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Correct subtype, recommended properties present, valid JSON-LD. |\n| Partial | Present but generic type or missing recommended properties. |\n| Low | No local schema, or schema with errors/placeholder content. |\n\n# Related\n\nGenerate ready-to-paste JSON-LD via [maps schema generation](/maps/schema-generation.md). Don't mark up your own self-serving reviews \u2014 Google ignores LocalBusiness review markup that comes from the business itself.\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/industry-vertical-detection", "maps/schema-generation", "references/whitespark-2026"]}, {"id": "local-seo/nap-citations", "type": "Ranking Dimension", "title": "NAP Consistency & Citations", "description": "Consistent name/address/phone across sources, and presence on the directories that feed search and AI.", "resource": "", "tags": ["local-seo", "nap", "citations", "ranking-factors"], "body": "Citations carry less weight for the traditional local pack than they once did, but consistency still matters \u2014 and citation-style signals feed AI discovery, which sources business facts from across the web rather than from Google Business Profile directly.\n\n# What to check\n\n* **NAP consistency** \u2014 compare name, address, and phone across three sources and flag any mismatch:\n  1. Visible page HTML (footer, contact page).\n  2. LocalBusiness JSON-LD schema.\n  3. Any visible GBP data.\n* Presence on core directories \u2014 Google Business Profile, plus the likes of Yelp, BBB, and Facebook. Quick checks: `site:yelp.com \"Business Name\"`, `site:bbb.org \"Business Name\"`.\n* **Apple Business
