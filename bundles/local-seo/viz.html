 Vision AI extracts menu items and prices from GBP photos | Dropped: no primary source found. Replaced with the documented structured Food Menus API. | https://developers.google.com/my-business/content/update-food-menus |\n| `agentic/agentic-commerce-readiness.md` | Commerce protocol discovery uses `/.well-known/` | Verified specifically for UCP at `/.well-known/ucp`. | https://ucp.dev/specification/overview/ |\n| `agentic/agentic-commerce-readiness.md` | POS-to-KDS order injection is a protocol requirement | Corrected to an operational recommendation. UCP describes food ordering and real-time availability, but detailed food specifications were still forthcoming. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Real-time \"86-ing\" is supported by a named standard | Dropped as a platform capability claim; retained only as an operational consistency requirement. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Hotel PMS two-way sync through named vendors | Corrected: Google documents availability, rates and inventory integrations, but no universal requirement for the named vendors was established. | https://developers.google.com/hotels/hotel-prices/dev-guide |\n| `agentic/agentic-commerce-readiness.md` | OTA rate parity is universal | Dropped: contracts and law vary by market; no single primary source supports a universal claim. | \u2014 |\n| `agentic/agentic-commerce-readiness.md` | OTA commissions are 15\u201325% | Dropped: no primary source supports this as a universal range. | \u2014 |\n| `agentic/grounding-google-maps.md` | Google Maps grounding tool exists | Verified. Current documentation places it in Gemini Enterprise Agent Platform and exposes it through Vertex AI Studio. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Place index size | Corrected to **over 250 million places**. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Response has `grounding_metadata` and Maps chunks | Verified with naming correction: REST uses `groundingMetadata.groundingChunks`; SDKs may use snake case. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Widget context token / Contextual View | Dropped: not present in the current primary documentation. | \u2014 |\n| `agentic/grounding-google-maps.md` | Grounding Lite is MCP-native | Verified: MCP service with place, weather and route tools. | https://developers.google.com/maps/ai/grounding-lite |\n| `agentic/grounding-google-maps.md` | Grounding Lite provides navigation | Corrected: it does not provide turn-by-turn directions, real-time traffic or navigation. | https://developers.google.com/maps/ai/grounding-lite |\n| `agentic/grounding-google-maps.md` | Places API (New) has AI summaries | Verified; returned through `generativeSummary`, with limited language/region/type availability. | https://developers.google.com/maps/documentation/places/web-service/place-summaries |\n| `agentic/generative-engine-optimization.md` | Defensible GEO definition | Verified against the original GEO paper and narrowed to visibility in generative-engine responses. | https://arxiv.org/abs/2311.09735 |\n| `agentic/generative-engine-optimization.md` | GEO and AEO have a settled distinction | Corrected: no authoritative standard was found; the document labels its distinction as a bundle-specific working definition. | https://arxiv.org/abs/2311.09735 |\n| `agentic/generative-engine-optimization.md` | 2026 Maps contributor/Gemini caption update | Verified: announced 7 April 2026, initially English on iOS in the US. | https://blog.google/products-and-platforms/products/maps/contributor-updates/ |\n| `agentic/real-time-local-inventory.md` | ~95% say pre-visit confirmation is important | Verified and made exact: **95%** said confirming local availability before visiting was somewhat to extremely important for an item priced at $300 or more. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~56% rank real-time availability first | Verified and made exact: **56%** selected real-time product availability before visiting as a factor favouring local over remote shipping. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~48% want reserve/pickup | Verified and made exact: **48%** selected reserving online for in-store purchase or pickup. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~40% blame websites | Verified and narrowed: **40%** reported insufficient product information on company websites. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~37% cannot confirm branch availability | Verified and made exact: **37%** could not confirm availability at a particular store; another **37%** reported inaccurate inventory information. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | Merchant Center supports branch-level availability, price and pickup | Verified. | https://support.google.com/merchants/answer/14819809?hl=en |\n| `agentic/hitl-gbp-management.md` | GBP review replies can be written through API | Verified. | https://developers.google.com/my-business/content/review-data |\n| `agentic/hitl-gbp-management.md` | GBP posts can be created and edited through API | Verified for event, call-to-action and offer posts; product posts are excluded. | https://developers.google.com/my-business/content/posts-data |\n| `agentic/hitl-gbp-management.md` | Profile fields can be patched through API | Verified for supported fields using an update mask. | https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch |\n| `agentic/hitl-gbp-management.md` | Approval gates are a Google requirement or norm | Corrected: HITL is presented as an operator governance pattern, not a Google API requirement. | \u2014 |\n| `agentic/hitl-gbp-management.md` | GBP has a generic reversion endpoint | Dropped: no generic undo endpoint was found; reversion is described as a reviewed patch from a known-good snapshot. | https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch |\n\n# Claims requiring human follow-up\n\n* Confirm whether Google has a current replacement for the earlier Maps grounding widget context token or \"Contextual View\"; neither appears in the current documentation.\n* If OTA commission or rate-parity guidance is required, research it by jurisdiction, contract type and named platform rather than publishing a universal range.\n", "links": ["maintenance"]}, {"id": "references/whitespark-2026", "type": "Reference", "title": "Whitespark Local Search Ranking Factors", "description": "Whitespark's annual local search ranking-factors study; used here for the relative importance of factors, not exact weights.", "resource": "https://whitespark.ca/local-search-ranking-factors/", "tags": ["reference", "ranking-factors"], "body": "Whitespark's annual Local Search Ranking Factors study ranks the signals that influence local pack and local organic results. We cite it **qualitatively** \u2014 for the *relative* importance of factors (e.g. that Google Business Profile is the leading driver of local pack visibility, and that review and citation signals matter for AI discovery). The precise percentage weightings sit inside Whitespark's full report and are not publicly published, so this bundle does not assert specific percentages.\n\n# Citations\n\n[1] [Local Search Ranking Factors](https://whitespark.ca/local-search-ranking-factors/)\n", "links": []}];
const byId = {}; DATA.forEach(c => byId[c.id] = c);
const palette = {};
const colors = ["#0f3460","#e94560","#16a085","#8e44ad","#d35400","#2980b9","#27ae60","#c0392b","#7f8c8d"];
DATA.forEach(c => { if(!(c.type in palette)) palette[c.type] = colors[Object.keys(palette).length % colors.length]; });

const elements = [];
DATA.forEach(c => elements.push({data:{id:c.id,label:c.title,type:c.type}}));
const seen = new Set();
DATA.forEach(c => c.links.forEach(t => { if(byId[t]){const k=c.id+"->"+t; if(!seen.has(k)){seen.add(k);elements.push({data:{id:k,source:c.id,target:t}});}}}));

const cy = cytoscape({container:document.getElementById("cy"),elements,
  style:[
    {selector:"node",style:{"background-color":ele=>palette[ele.data("type")]||"#888","label":"data(label)","font-size":"10px","color":"#1a1a2e","text-wrap":"wrap","text-max-width":"110px","text-valign":"bottom","text-margin-y":"3px","width":"22px","height":"22px"}},
    {selector:"edge",style:{"width":1.2,"line-color":"#b8c4dd","target-arrow-color":"#b8c4dd","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":0.8}},
    {selector:".faded",style:{"opacity":0.15}},
    {selector:".sel",style:{"border-width":3,"border-color":"#e94560"}}
  ],
  layout:{name:"cose",animate:false,padding:30}});

const tf = document.getElementById("typeFilter");
tf.innerHTML = '<option value="">all types</option>' + Object.keys(palette).map(t=>`<option>${t}</option>`).join("");

function render(c){
  let b = marked.parse(c.body);
  b = b.replace(/href="(\/[^"]+)\.md"/g,'class="xlink" data-id="$1" href="javascript:void(0)"').replace(/data-id="\//g,'data-id="');
  const backlinks = DATA.filter(o=>o.links.includes(c.id));
  document.getElementById("panel").innerHTML =
    `<h2>${c.title}</h2><div class="meta"><span class="tag" style="background:${palette[c.type]};color:#fff">${c.type}</span> ${c.id}</div>`+
    (c.description?`<p>${c.description}</p>`:"")+
    (c.resource?`<p class="hint">resource: <a href="${c.resource}" target="_blank">${c.resource}</a></p>`:"")+
    (c.tags&&c.tags.length?`<div>${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:"")+
    `<div class="body">${b}</div>`+
    (backlinks.length?`<div class="backlinks"><strong>Cited by</strong>${backlinks.map(o=>`<a class="xlink" data-id="${o.id}">${o.title}</a>`).join("")}</div>`:"");
  document.querySelectorAll(".xlink").forEach(a=>a.onclick=()=>{const id=a.getAttribute("data-id");if(byId[id])select(id);});
}
function select(id){cy.nodes().removeClass("sel");const n=cy.getElementById(id);n.addClass("sel");if(byId[id])render(byId[id]);}
cy.on("tap","node",e=>select(e.target.id()));

document.getElementById("search").oninput=e=>{const q=e.target.value.toLowerCase();cy.nodes().forEach(n=>{const c=byId[n.id()];const hit=!q||c.title.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||(c.tags||[]).join(" ").toLowerCase().includes(q);n.toggleClass("faded",!hit);});};
tf.onchange=e=>{const t=e.target.value;cy.nodes().forEach(n=>n.toggleClass("faded",t&&byId[n.id()].type!==t));};
document.getElementById("layout").onchange=e=>cy.layout({name:e.target.value,animate:false,padding:30}).run();
</script></body></html>
