Connect** \u2014 adoption is strikingly low (BrightLocal: only ~16% of businesses use it, and ~58% haven't even claimed their Apple Maps listing). That makes claiming it a cheap, uncontested win.\n* **Bing Places** \u2014 worth claiming; the Bing index feeds several AI assistants, so it has reach beyond Bing search itself.\n* Data aggregators (e.g. Data Axle, Foursquare) for downstream distribution.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Consistent NAP across page/schema/GBP; present on core directories. |\n| Partial | NAP present but with inconsistencies; some listings missing. |\n| Low | NAP discrepancies, no detectable listings, no schema address. |\n\n# Related\n\nCross-platform NAP across Google, Bing, Apple, and OSM is verified in [maps NAP verification](/maps/nap-verification.md).\n\n# Citations\n\n[1] [BrightLocal Apple Business Connect research](/references/brightlocal-apple-business-connect.md)\n", "links": ["maps/nap-verification", "references/brightlocal-apple-business-connect"]}, {"id": "local-seo/reviews-reputation", "type": "Ranking Dimension", "title": "Reviews & Reputation", "description": "Review recency and rating thresholds \u2014 steady velocity matters more than a big one-off total.", "resource": "", "tags": ["local-seo", "reviews", "ranking-factors"], "body": "Reviews are a major local ranking and conversion signal, and **recency beats raw count**. Sterling Sky's case-study research describes an **18-day rule**: rankings can start to slip once a business goes roughly two to three weeks without a new review. It's a community-recognised pattern, not confirmed Google policy \u2014 but the practical takeaway is sound: keep reviews coming in steadily.\n\n# Rating thresholds (BrightLocal)\n\nConsumer expectations have climbed:\n\n* **68%** won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require at least 4.5 stars (up from 17%).\n\nSo the bar for \"acceptable\" has moved up roughly half a star in two years.\n\n# What to check\n\n* Total Google review count visible on page or in schema (`aggregateRating`).\n* Star rating against the thresholds above.\n* Recency \u2014 is there a steady, recent flow rather than a stale cluster?\n* Owner responses, especially to negatives.\n* Presence across more than one review platform.\n* **No review gating** \u2014 pre-screening for happy customers before steering them to a review platform breaches Google's policies and risks FTC enforcement. Ask everyone.\n\n# Industry notes\n\n* Healthcare: HIPAA limits what you can say in responses \u2014 don't confirm or deny that a reviewer is a patient.\n* Legal: mind attorney-client privilege in responses.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Healthy count, 4.5+ stars, recent steady flow, owner responses, multi-platform. |\n| Partial | Some reviews but gaps in recency, rating, or response rate. |\n| Low | Few reviews, stale, no responses, single platform. |\n\n# Related\n\nCross-platform velocity, sentiment, and fake-review detection live in [review intelligence](/maps/review-intelligence.md).\n\n# Citations\n\n[1] [Sterling Sky review research](/references/sterling-sky.md)\n[2] [BrightLocal Local Consumer Review Survey](/references/brightlocal-lcrs.md)\n", "links": ["maps/review-intelligence", "references/sterling-sky", "references/brightlocal-lcrs"]}, {"id": "maps/capability-tiers", "type": "Concept", "title": "Maps Capability Tiers", "description": "Three-tier capability model for maps intelligence \u2014 detect the available tier before any analysis and communicate it to the user.", "resource": "", "tags": ["maps", "dataforseo", "tiers"], "body": "Maps intelligence analyses the business on maps **platforms** (via APIs), as opposed to [local on-page SEO](/local-seo/local-onpage.md) which analyses the **website** via HTML fetch. Detect the available tier first and always communicate it to the user.\n\n# Tiers\n\n| Tier | Detection | Capabilities |\n|------|-----------|--------------|\n| **0 \u2014 Free** | No DataForSEO MCP tools | Overpass API competitor discovery, Geoapify POI search, Nominatim geocoding, static GBP checklist, schema generation, cross-platform NAP guidance. |\n| **1 \u2014 DataForSEO** | `business_data_business_listings_search` available | Tier 0 + [geo-grid rank tracking](/maps/geo-grid-tracking.md), live [GBP profile audit](/maps/gbp-profile-audit.md), [review intelligence](/maps/review-intelligence.md), GBP post/Q&A data, Tripadvisor/Trustpilot reviews. |\n| **2 \u2014 DataForSEO + Google Maps** | Tier 1 + Google Maps API key | Tier 1 + Google Places details, real-time business status, AI place summaries, photo analysis. Google ToS restricts storage to `place_id`; lat/lng cached 30 days max. |\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/local-onpage", "maps/geo-grid-tracking", "maps/gbp-profile-audit", "maps/review-intelligence", "references/dataforseo"]}, {"id": "maps/competitor-radius", "type": "Maps Analysis", "title": "Competitor Radius Mapping", "description": "Identify and analyse competitors within a defined radius, free via Overpass or richer via DataForSEO.", "resource": "", "tags": ["maps", "competitors", "radius"], "body": "Identify and analyse competitors within a defined radius. Available from [Tier 0](/maps/capability-tiers.md).\n\n# Tier 0 (Overpass API)\n\n1. Geocode the business address.\n2. Query Overpass for businesses with the same OSM tag within the radius.\n3. Parse name, address, phone, website, and distance from centre.\n4. Sort by distance and present as a competitor landscape table.\n\n# Tier 1 (DataForSEO)\n\n1. Use the Maps SERP API with the business keyword + location.\n2. Extract the top 20 competitors with full profile data.\n3. Compare rating, review count, categories, photos, and attributes.\n4. Calculate a competitive density score (competitors per km\u00b2).\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/gbp-profile-audit", "type": "Maps Analysis", "title": "GBP Profile Audit", "description": "Score the 25 Google Business Profile fields that affect quality and ranking, with industry weighting.", "resource": "", "tags": ["maps", "gbp", "audit"], "body": "Audits the 25 fields that affect GBP quality and ranking. Tier 1 uses live API data; [Tier 0](/maps/capability-tiers.md) falls back to detectable on-page signals. Complements the on-page view in [GBP signals](/local-seo/gbp-signals.md).\n\n# Tier 1 workflow\n\n1. Fetch the profile via the DataForSEO My Business Info API (keyword or CID).\n2. Map the API response to the 25-field checklist.\n3. Score each field: Present + Optimised = 2pts, Present = 1pt, Missing = 0pts.\n4. Apply industry-specific weight multipliers.\n5. Normalise to a 0\u2013100 scale.\n\n# Tier 0 workflow\n\n1. Fetch the business website.\n2. Extract visible GBP signals (Maps embed, place references, review widgets).\n3. Apply the static checklist from detectable signals.\n4. Mark undetectable fields as \"Unknown (requires DataForSEO for live data)\".\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "local-seo/gbp-signals", "references/dataforseo"]}, {"id": "maps/geo-grid-tracking", "type": "Maps Analysis", "title": "Geo-Grid Rank Tracking", "description": "Simulate Google Maps searches from multiple GPS coordinates to show ranking variation and compute Share of Local Voice.", "resource": "", "tags": ["maps", "geo-grid", "rank-tracking", "solv"], "body": "Geo-grid tracking simulates Maps searches from many GPS coordinates to reveal how rank varies across a geographic area. Requires DataForSEO ([Tier 1+](/maps/capability-tiers.md)).\n\n# Workflow\n\n1. Geocode the business address to a centre lat/lng.\n2. Generate grid points (default 7\u00d77, 5km radius) using a Haversine offset.\n3. **Display a cost estimate and ask for confirmation before proceeding.**\n4. Fire DataForSEO Maps SERP calls with `location_coordinate` per grid point.\n5. Find the target business rank at each point.\n6. Compute SoLV: `(top_3_count / total_points) * 100`.\n7. Render an ASCII heatmap in the output.\n\n# Cost warning (required)\n\nBefore every scan, display the keyword, location, grid size, keyword count, and estimated cost, and confirm before consuming DataForSEO credits.\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/nap-verification", "type": "Maps Analysis", "title": "Cross-Platform NAP Verification", "description": "Check business listing consistency across Google, Bing Places, Apple, and OpenStreetMap.", "resource": "", "tags": ["maps", "nap", "consistency"], "body": "Check listing consistency across Google, Bing Places, Apple, and OSM. Extends the page/schema/GBP checks in [NAP consistency & citations](/local-seo/nap-citations.md) to map platforms.\n\n# Workflow\n\n1. Search the business name on each platform:\n   * Google \u2014 infer from GBP data or Maps SERP result.\n   * Bing \u2014 fetch `bing.com/maps?q=BUSINESS+NAME+LOCATION`.\n   * Apple \u2014 manual check (no public API; recommend Apple Business Connect).\n   * OSM \u2014 Overpass or Nominatim search.\n2. Extract NAP from each source.\n3. Compare: exact match, partial match, missing, or conflicting.\n4. Flag discrepancies \u2014 Critical (name mismatch), High (address mismatch), Medium (phone mismatch).\n5. Recommend claiming unclaimed profiles.\n\n# Citations\n\nThis is a derived method built on the in-bundle [NAP consistency & citations](/local-seo/nap-citations.md) dimension. The platform endpoints it relies on:\n\n[1] [Bing Maps / Bing Places for Business](https://www.bingplaces.com/)\n\n[2] [Apple Business Connect](https://businessconnect.apple.com/)\n\n[3] [OpenStreetMap Nominatim search documentation](https://nominatim.org/release-docs/latest/)\n", "links": ["local-seo/nap-citations", "local-seo/nap-citations"]}, {"id": "maps/review-intelligence", "type": "Maps Analysis", "title": "Review Intelligence", "description": "Cross-platform review velocity, sentiment, rating distribution, and fake-review detection.", "resource": "", "tags": ["maps", "reviews", "velocity", "sentiment"], "body": "Cross-platform review analysis across Google, Tripadvisor, and Trustpilot. Extends the on-page view in [reviews & reputation](/local-seo/reviews-reputation.md) with platform data.\n\n# Workflow\n\n1. Fetch Google reviews via the DataForSEO Reviews API (newest first).\n2. Calculate review velocity: reviews per month over the last 6 months.\n3. Check the **18-day rule** (Sterling Sky): any 3-week gap = ranking risk.\n4. Analyse rating distribution: healthy = bell curve skewed to 5-star.\n5. Calculate owner response rate: responses / total reviews.\n6. Fetch Tripadvisor and Trustpilot reviews if available.\n7. Build a cross-platform comparison table.\n\n# Fake-review detection\n\nFlag reviews matching 2+ of: uniform timing; reviewer accounts with limited history; geographic inconsistencies; exclusively 5-star velocity spikes; near-identical text; sudden volume spikes without corresponding marketing activity.\n\n# Citations\n\n[1] [Sterling Sky](/references/sterling-sky.md)\n[2] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/reviews-reputation", "references/sterling-sky", "references/dataforseo"]}, {"id": "maps/schema-generation", "type": "Maps Analysis", "title": "Schema Generation", "description": "Generate LocalBusiness JSON-LD markup from collected maps and business data.", "resource": "", "tags": ["maps", "schema", "json-ld"], "body": "Generate LocalBusiness JSON-LD from collected data. See [local schema markup](/local-seo/local-schema.md) for the audit-side view and industry subtypes.\n\n# Workflow\n\n1. Determine the most specific schema subtype for the industry (see [industry vertical detection](/local-seo/industry-vertical-detection.md)).\n2. Populate required properties: `@type`, `name`, `address`, `image`.\n3. Add recommended properties: `telephone`, `url`, `geo`, `openingHoursSpecification`, `priceRange`.\n4. Add multi-location properties where relevant: `branchOf`, `areaServed`, `sameAs`.\n5. Add `aggregateRating` if review data is available.\n6. Output a valid JSON-LD block ready to implement.\n\n# Example\n\n```json\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"LocalBusiness\",\n  \"name\": \"Example Co\",\n  \"address\": {\n    \"@type\": \"PostalAddress\",\n    \"streetAddress\": \"1 High Street\",\n    \"addressLocality\": \"Manchester\",\n    \"postalCode\": \"M1 1AA\",\n    \"addressCountry\": \"GB\"\n  },\n  \"telephone\": \"+44-161-000-0000\",\n  \"url\": \"https://example.co.uk\",\n  \"geo\": { \"@type\": \"GeoCoordinates\", \"latitude\": 53.48095, \"longitude\": -2.23743 }\n}\n```\n\n> Do **not** generate self-serving review markup \u2014 Google ignores LocalBusiness review markup from the business itself. Only mark up third-party reviews visible on the page.\n\n# Citations\n\nThis method generates markup against the in-bundle [local schema markup](/local-seo/local-schema.md) dimension. Authoritative definitions:\n\n[1] [Schema.org \u2014 LocalBusiness](https://schema.org/LocalBusiness)\n\n[2] [Google Search Central \u2014 Local Business (LocalBusiness) structured data](https://developers.google.com/search/docs/appearance/structured-data/local-business)\n\n[3] [Google Search Central \u2014 Review snippet structured data (self-serving review policy)](https://developers.google.com/search/docs/appearance/structured-data/review-snippet)\n", "links": ["local-seo/local-schema", "local-seo/industry-vertical-detection", "local-seo/local-schema"]}, {"id": "playbooks/gbp-optimisation-checklist", "type": "Playbook", "title": "GBP Optimisation Quick-Wins Checklist", "description": "The fastest high-impact local SEO fixes to run on a new client engagement.", "resource": "", "tags": ["playbook", "gbp", "local-seo", "onboarding"], "body": "A short, high-leverage checklist for the first pass on a new local client. Pair it with the full [local SEO dimensions](/local-seo/) for the deep audit.\n\n# Quick wins\n\n1. Claim and optimise **Apple Business Connect** \u2014 adoption is low (~16% per BrightLocal), so it's an easy win.\n2. Claim and optimise **Bing Places** \u2014 the Bing index feeds several AI assistants, so it has reach beyond Bing (see [AI search impact](/local-seo/ai-search-local.md)).\n3. Fix any **NAP discrepancies** across page, schema, and GBP (see [NAP & citations](/local-seo/nap-citations.md)).\n4. Add **LocalBusiness schema** with the correct industry subtype (see [local schema markup](/local-seo/local-schema.md)).\n5. Add `geo` coordinates with 5+ decimal precision.\n6. Ensure the phone number uses a `tel:` click-to-call link.\n7. Add city + service keywords to the title tag and H1.\n\n# Medium effort\n\n1. Create a dedicated page for each core service (one of the strongest local organic signals \u2014 see [local on-page SEO](/local-seo/local-onpage.md)).\n2. Build a review-generation cadence that never breaks the [18-day rule](/local-seo/reviews-reputation.md).\n3. Submit to the main data aggregators (e.g. Data Axle, Foursquare).\n4. Claim industry-specific directories for the detected [vertical](/local-seo/industry-vertical-detection.md).\n\n# High impact\n\n1. Build a local digital-PR strategy targeting brand mentions and \"best of\" lists (mentions correlate strongly with AI visibility \u2014 see [local links & authority](/local-seo/local-authority-links.md)).\n2. Develop unique, non-swappable content for each location page.\n3. Establish presence on the third-party sources AI assistants commonly cite \u2014 review sites, directories, and community platforms.\n\n# Citations\n\nThis playbook operationalises claims sourced in the bundle's reference set:\n\n[1] [BrightLocal Apple Business Connect research](/references/brightlocal-apple-business-connect.md) \u2014 low Apple Business Connect adoption (~16%).\n\n[2] [Sterling Sky review research](/references/sterling-sky.md) \u2014 the 18-day review-recency rule.\n\n[3] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md) \u2014 brand mentions correlate with AI visibility.\n", "links": ["local-seo/ai-search-local", "local-seo/nap-citations", "local-seo/local-schema", "local-seo/local-onpage", "local-seo/reviews-reputation", "local-seo/industry-vertical-detection", "local-seo/local-authority-links", "references/brightlocal-apple-business-connect", "references/sterling-sky", "references/ahrefs-ai-overviews"]}, {"id": "references/agentic-commerce-protocols", "type": "Reference", "title": "Agentic commerce protocols (UCP, AP2, ACP, x402)", "description": "Primary specifications and announcements for the open protocols behind agent-led commerce.", "resource": "https://ucp.dev/", "tags": ["reference", "commerce", "agentic", "protocols"], "body": "Primary sources for the open protocols referenced by [Agentic Commerce](/agentic/agentic-commerce.md) and [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md). These are distinct, independently governed specifications \u2014 not one universal, fully adopted stack.\n\n# Per-protocol provenance\n\n| Protocol | Publisher / backers | First public | Canonical source |\n|---|---|---|---|\n| Universal Commerce Protocol (UCP) | Google with retail and platform partners | January 2026 | https://ucp.dev/ |\n| Agent Payments Protocol (AP2) | Google + 60+ participating organisations | September 2025 | https://ap2-protocol.org/ |\n| Agentic Commerce Protocol (ACP) | OpenAI and Stripe | September 2025 | https://www.agenticcommerce.dev/ |\n| x402 | Coinbase (open protocol) | per Coinbase docs | https://docs.cdp.coinbase.com/x402/welcome |\n\n# What the sources establish\n\n* Each protocol has a public specification and named backers; early production integrations exist.\n* UCP defines discovery via `/.well-known/ucp`; cryptographically signed mandates are a mechanism **within AP2**, not a separate protocol; AP2 documents an A2A x402 extension for stablecoin payments.\n\n# What they do not establish\n\nUniversal adoption is not demonstrated. A business should adopt a protocol only when a target channel or integration partner supports it, and should preserve ordinary web and API fallbacks.\n\n# Citations\n\n[1] [Universal Commerce Protocol \u2014 Specification and ecosystem](https://ucp.dev/)\n\n[2] [Agent Payments Protocol (AP2) \u2014 Specification](https://ap2-protocol.org/)\n\n[3] [Google Cloud \u2014 Announcing the Agent Payments Protocol (AP2)](https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol)\n\n[4] [Agentic Commerce Protocol \u2014 Open specification](https://www.agenticcommerce.dev/)\n\n[5] [Coinbase Developer Platform \u2014 x402 overview](https://docs.cdp.coinbase.com/x402/welcome)\n", "links": ["agentic/agentic-commerce", "agentic/agentic-commerce-readiness"]}, {"id": "references/ahrefs-ai-overviews", "type": "Reference", "title": "Ahrefs AI Overview brand-correlation study", "description": "75,000-brand analysis of what correlates with appearing in Google AI Overviews.", "resource": "https://ahrefs.com/blog/ai-overview-brand-correlation/", "tags": ["reference", "ai-search", "brand-mentions"], "body": "Ahrefs analysed ~75,000 brands to see what correlates with AI Overview visibility. Verified headline finding: **brand web mentions correlate far more strongly (\u22480.664) than backlinks (\u22480.218)** \u2014 roughly 3\u00d7 the strength. Note this is a *correlation* study across AI Overviews generally, not a controlled or local-specific test. Cited in [local links & authority](/local-seo/local-authority-links.md) and [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [An analysis of AI Overview brand visibility factors](https://ahrefs.com/blog/ai-overview-brand-correlation/)\n", "links": ["local-seo/local-authority-links", "local-seo/ai-search-local"]}, {"id": "references/brightlocal-apple-business-connect", "type": "Reference", "title": "BrightLocal Apple Business Connect research", "description": "BrightLocal poll on adoption and awareness of Apple Business Connect among local businesses.", "resource": "https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/", "tags": ["reference", "apple", "citations"], "body": "BrightLocal research on Apple Business Connect take-up. Verified figures:\n\n* Only **~16%** of businesses are using Apple Business Connect.\n* **~58%** have not claimed their Apple Maps listing.\n* **~59%** are unaware of the tools Apple Business Connect offers.\n\nThe low adoption is the point: claiming Apple Maps is a cheap, uncontested win. Cited in [NAP consistency & citations](/local-seo/nap-citations.md).\n\n# Citations\n\n[1] [Are businesses using Apple Business Connect?](https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/)\n", "links": ["local-seo/nap-citations"]}, {"id": "references/brightlocal-lcrs", "type": "Reference", "title": "BrightLocal Local Consumer Review Survey", "description": "Annual survey of consumer review behaviour; source for rating thresholds.", "resource": "https://www.brightlocal.com/research/local-consumer-review-survey/", "tags": ["reference", "reviews", "consumer-behaviour"], "body": "BrightLocal's annual Local Consumer Review Survey (LCRS). Verified figures used in this bundle:\n\n* **68%** of consumers won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require a minimum of 4.5 stars (up from 17% the prior year).\n\nCited in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Local Consumer Review Survey](https://www.brightlocal.com/research/local-consumer-review-survey/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/dataforseo", "type": "Reference", "title": "DataForSEO", "description": "SEO data API powering Tier 1+ maps intelligence \u2014 Maps SERP, My Business Info, and Reviews endpoints.", "resource": "https://dataforseo.com/", "tags": ["reference", "api", "maps"], "body": "DataForSEO provides the live data behind [Tier 1+ maps intelligence](/maps/capability-tiers.md): the Maps SERP API ([geo-grid](/maps/geo-grid-tracking.md), [competitors](/maps/competitor-radius.md)), My Business Info API ([GBP audit](/maps/gbp-profile-audit.md)), and the Reviews API ([review intelligence](/maps/review-intelligence.md)). Usage consumes credits \u2014 always show a cost estimate before geo-grid scans.\n\n# Citations\n\n[1] [DataForSEO](https://dataforseo.com/)\n", "links": ["maps/capability-tiers", "maps/geo-grid-tracking", "maps/competitor-radius", "maps/gbp-profile-audit", "maps/review-intelligence"]}, {"id": "references/doj-best-gdr-2026", "type": "Reference", "title": "US DOJ \u2014 United States and Illinois v. B.E.S.T. GDR, LLC (Premium Home Service)", "description": "The May 2026 federal complaint over 15,000+ fake Google business profiles \u2014 press release and filed complaint.", "resource": "https://www.justice.gov/opa/pr/department-justice-files-complaint-against-best-gdr-llc-doing-business-premium-home-service", "tags": ["reference", "gbp", "spam", "enforcement"], "body": "DOJ press release (11 May 2026, release 26-474) and the filed complaint in the US District Court for the Northern District of Illinois against B.E.S.T. GDR, LLC, d/b/a Premium Home Service, and its founder and CEO Yosef Bernath. Filed on referral from the FTC, jointly with the Illinois Attorney General. Primary source for [spam & fake listings](/gbp/spam-and-fake-listings.md).\n\n# What the source establishes\n\n* The press release states the defendants created **over 15,000 fake business profiles on Google Search and Maps**, using addresses of unrelated businesses and local numbers routed to overseas call centres, plus fabricated five-star reviews using images misappropriated from unrelated websites' staff directories.\n* The filed complaint alleges the scheme ran **since at least 2018**, deceived **well over 100,000 consumers**, took **\"tens of millions of dollars\"**, and operated **over 7,600 telephone numbers across more than 250 area codes**.\n* Alleged violations: the FTC Act, the FTC Rule on the Use of Consumer Reviews and Testimonials, the Gramm-Leach-Bliley Act, and Illinois consumer-protection statutes. Relief sought: permanent injunction, civil penalties and consumer redress.\n\n# Clarification carried into the bundle\n\nA widely circulated **\"~$79 million\"** gains figure is not in the press release, the FTC release, or the filed complaint; it originates in investigative journalism (KARE 11). The bundle uses the complaint's own wording (\"tens of millions of dollars\"). The CEO's name is spelled **Yosef** (one \"s\") in the filings.\n\n# Citations\n\n[1] [DOJ press release (11 May 2026)](https://www.justice.gov/opa/pr/department-justice-files-complaint-against-best-gdr-llc-doing-business-premium-home-service)\n\n[2] [Filed complaint (PDF, hosted by the FTC)](https://www.ftc.gov/system/files/ftc_gov/pdf/premium_home_service_-_filed_complaint.pdf)\n\n[3] [FTC press release and case page (11 May 2026)](https://www.ftc.gov/news-events/news/press-releases/2026/05/ftc-illinois-take-action-stop-deceptive-conduct-company-created-thousands-business-listings-fake)\n", "links": ["gbp/spam-and-fake-listings"]}, {"id": "references/ftc-consumer-review-rule", "type": "Reference", "title": "FTC \u2014 Consumer Reviews and Testimonials Rule", "description": "The FTC's rule (16 CFR Part 465, effective 21 October 2024) and its official Q&A, including the review-gating question.", "resource": "https://www.ftc.gov/business-guidance/resources/consumer-reviews-testimonials-rule-questions-answers", "tags": ["reference", "reviews", "compliance", "ftc"], "body": "The FTC's Rule on the Use of Consumer Reviews and Testimonials and the Commission's own Q&A guidance. Primary source for [review gating](/gbp/review-gating.md) and the compliance boundaries in [reviews on GBP](/gbp/reviews.md).\n\n# What the source establishes\n\n* The rule took effect **21 October 2024** and authorises civil penalties for knowing violations; the FTC's December 2025 warning letters state exposure of up to **$53,088 per violation**.\n* Key sections: \u00a7465.2 fake/false reviews; \u00a7465.4 incentives conditioned on sentiment; \u00a7465.5 undisclosed insider reviews; \u00a7465.6 company-controlled review entities misrepresented as independent; \u00a7465.7 review suppression; \u00a7465.8 fake indicators of social-media influence.\n* On gating, verbatim from the Q&A: \"Can my business ask for reviews only from customers whom we think are happy with our services? The rule does not contain a specific prohibition against such conduct. But this practice could violate the FTC Act.\" (citing Endorsement Guides 16 CFR 255.2(d) and (e)(11)).\n* Generalised solicitations to all purchasers are expressly exempt; contacting negative reviewers to resolve issues, and asking satisfied customers to update reviews, are permitted.\n* On 22 December 2025 FTC staff sent warning letters to ten companies about potential rule violations \u2014 warnings, not adjudications.\n\n# Citations\n\n[1] [Consumer Reviews and Testimonials Rule: Questions and Answers](https://www.ftc.gov/business-guidance/resources/consumer-reviews-testimonials-rule-questions-answers)\n\n[2] [FTC Warns 10 Companies About Possible Violations of the Consumer Review Rule (22 December 2025)](https://www.ftc.gov/news-events/news/press-releases/2025/12/ftc-warns-10-companies-about-possible-violations-agencys-new-consumer-review-rule)\n", "links": ["gbp/review-gating", "gbp/reviews"]}, {"id": "references/google-ai-optimization-guide", "type": "Reference", "title": "Google \u2014 AI features and your website", "description": "Google's primary-source guidance on how AI features in Search relate to ordinary SEO.", "resource": "https://developers.google.com/search/docs/appearance/ai-features", "tags": ["reference", "ai-search", "google"], "body": "Google's own documentation on AI features in Search. The position we rely on: appearing in AI Overviews and AI Mode runs on the same systems as ordinary Search \u2014 there is no separate \"AI SEO\" lever, and standard indexing/eligibility is the floor. Underpins [AI search impact on local](/local-seo/ai-search-local.md).\n\nThe canonical URL was confirmed live at `developers.google.com/search/docs/appearance/ai-features` on 25 June 2026. Google reorganises its Search Central docs periodically; if the link 404s, re-locate the \"AI features and your website\" page and update the `resource` field and citation below.\n\n# Citations\n\n[1] [Google Search Central \u2014 AI features and your website](https://developers.google.com/search/docs/appearance/ai-features)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/google-ask-maps", "type": "Reference", "title": "Google \u2014 Ask Maps announcement", "description": "Google's primary-source announcement of Ask Maps, the Gemini-powered conversational experience in Google Maps.", "resource": "https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/", "tags": ["reference", "google-maps", "ai-search", "agentic"], "body": "Google's primary-source announcement for **Ask Maps**, its Gemini-powered conversational experience in Google Maps. This is the single source underpinning the [Ask Maps](/agentic/ask-maps.md) concept doc.\n\n# What the source establishes\n\n* Ask Maps is a Gemini-powered conversational experience reached from an **Ask Maps** button. The announcement does not specify a durable on-screen position for that button.\n* Announced **12 March 2026**, rolling out on Android and iOS in the **United States and India**, with desktop described as coming soon.\n* Inputs Google names: information on more than 300 million places; reviews and local knowledge from more than 500 million contributors; the user's searched and saved places; and route context including directions and ETAs.\n* The experience can help a user act on a result \u2014 reserve, save, share or start navigation.\n\n# What it does not establish\n\nGoogle has not published Ask Maps ranking factors. Profile-completeness and media practices are data-quality measures, not guaranteed optimisation levers. See [Generative Engine Optimization](/agentic/generative-engine-optimization.md).\n\n# Citations\n\n[1] [Google \u2014 How we're reimagining Maps with Gemini](https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/)\n", "links": ["agentic/ask-maps", "agentic/generative-engine-optimization"]}, {"id": "references/google-business-agent", "type": "Reference", "title": "Google \u2014 Get started with Business Agent", "description": "Google's primary-source eligibility and setup guidance for Business Agent, the Search experience for eligible US e-commerce retailers.", "resource": "https://support.google.com/brandprofile/answer/16410382?hl=en", "tags": ["reference", "google", "commerce", "agentic", "gbp"], "body": "Google's primary-source documentation for **Business Agent**, cited by [Agentic Commerce Readiness](/agentic/agentic-commerce-readiness.md).\n\n# What the source establishes\n\n* Business Agent is a **Search** experience for eligible **US-based e-commerce retailers**.\n* Customisation requires: a US-based store, a verified **Merchant Center** account, **at least 50 approved free listings**, and a **claimed brand profile**.\n* It draws on Merchant Center data, the retailer's website and additional supplied business data.\n\n# Clarification carried into the bundle\n\nGoogle's Search **brand profile** and **Google Business Profile** are separate surfaces. A brand profile is not another name for a Business Profile. The \"~50 offers\" figure used in earlier drafts is corrected to **at least 50 approved free listings** plus the other conditions above.\n\n# Citations\n\n[1] [Google \u2014 Get started with Business Agent](https://support.google.com/brandprofile/answer/16410382?hl=en)\n", "links": ["agentic/agentic-commerce-readiness"]}, {"id": "references/google-gbp-rename-2021", "type": "Reference", "title": "Google \u2014 GMB to Google Business Profile rename (4 November 2021)", "description": "Google's own announcement of the Google My Business to Google Business Profile rename and the move to managing profiles in Search and Maps.", "resource": "https://blog.google/products/ads-commerce/connect-local-holiday-shoppers/", "tags": ["reference", "gbp", "history"], "body": "Google's announcement post \"Connect with local holiday shoppers\" (Matt Madrigal, VP/GM Merchant Shopping, 4 November 2021) \u2014 the primary source for the GMB\u2192GBP rename. The post is filed under ads-commerce rather than the small-business section, which is why it is often missed. Google's Business Profile community announcement of the same change (\"Introducing new updates to Business Profile\") carries the same wording with extra operational detail. Cited from [Google Business Profile](/gbp/google-business-profile.md).\n\n# What the source establishes\n\n* \"To keep things simple, 'Google My Business' is being renamed 'Google Business Profile.'\"\n* Businesses can claim, verify and manage the profile directly on Google Search or the Google Maps app.\n* The Google My Business app was slated for retirement in 2022.\n* The existing GMB web experience transitioned to supporting larger multi-location businesses as \"Business Profile Manager\"; the community announcement adds that the Google My Business API would be renamed the Business Profile API with functionality retained.\n\n# Citations\n\n[1] [Connect with local holiday shoppers (blog.google, 4 November 2021)](https://blog.google/products/ads-commerce/connect-local-holiday-shoppers/)\n\n[2] [Introducing new updates to Business Profile (Google Business Profile Community announcement)](https://support.google.com/business/thread/133876833)\n", "links": ["gbp/google-business-profile"]}, {"id": "references/google-gbp-verification", "type": "Reference", "title": "Google \u2014 Verify your business on Google", "description": "Google's primary documentation of the six verification methods, automatic method assignment, and review timing.", "resource": "https://support.google.com/business/answer/7107242", "tags": ["reference", "gbp", "verification"], "body": "Google's help-centre documentation of Business Profile verification. Primary source for [GBP verification](/gbp/verification.md).\n\n# What the source establishes\n\n* Six verification methods as of the access date: video recording, phone or text, email, live video call, postcard, and instant verification via Google Search Console.\n* \"Verification methods are automatically determined by Google and can't be changed\"; the options offered depend on business type, public information, region and business hours.\n* Post-submission review takes **up to 5 business days**; verification codes expire after 30 days; most postcards arrive within 14 days.\n\n# Clarification carried into the bundle\n\nInternal notes previously said *five* methods; the current help page lists six (Search Console instant verification is the addition). The bundle states six.\n\n# Citations\n\n[1] [Verify your business on Google](https://support.google.com/business/answer/7107242)\n\n[2] [Verify your business with a video recording](https://support.google.com/business/answer/14271705)\n", "links": ["gbp/verification"]}, {"id": "references/google-local-ranking", "type": "Reference", "title": "Google \u2014 Tips to improve your local ranking on Google", "description": "Google's primary statement of its three local ranking factors \u2014 relevance, distance and prominence.", "resource": "https://support.google.com/business/answer/7091", "tags": ["reference", "gbp", "ranking-factors"], "body": "Google's help-centre statement of how local results are ranked. Used as the primary source for the relevance / distance / prominence framework in [Google Business Profile](/gbp/google-business-profile.md).\n\n# What the source establishes\n\n* Local results are based primarily on **relevance** (\"how well a Business Profile matches what someone is searching for\"), **distance** (\"how far each business is from the customer who's searching\") and **prominence** (\"how well-known a business is\").\n* Prominence explicitly considers how many websites link to the business and how many reviews it has.\n* \"There's no way to request or pay for a better local ranking on Google.\"\n\n# Citations\n\n[1] [Tips to improve your local ranking on Google](https://support.google.com/business/answer/7091)\n", "links": ["gbp/google-business-profile"]}, {"id": "references/google-manage-google-updates", "type": "Reference", "title": "Google Business Profile APIs \u2014 Manage Google Updates", "description": "Developer documentation for detecting and accepting or rejecting Google-initiated profile changes.", "resource": "https://developers.google.com/my-business/content/accept-or-reject-updates", "tags": ["reference", "gbp", "api", "monitoring"], "body": "Google's developer documentation for handling Google-initiated updates to managed locations. Primary source for the [profile shielding](/gbp/profile-shielding.md) pattern.\n\n# What the source establishes\n\n* `metadata.hasGoogleUpdated` is `true` when a location has pending Google updates requiring review, and clears after they are processed.\n* `locations.getGoogleUpdated` returns the Google-updated view with a **`diffMask`** (fields where Google's serving data differs from your submitted values \u2014 action needed) and a `pendingMask` (fields you submitted that are still in review \u2014 no action needed).\n* Accepting and rejecting both use `locations.patch` with an `updateMask`: accept by patching in Google's value, reject by re-asserting your original value.\n\n# Citations\n\n[1] [Manage Google Updates](https://developers.google.com/my-business/content/accept-or-reject-updates)\n", "links": ["gbp/profile-shielding"]}, {"id": "references/google-maps-grounding", "type": "Reference", "title": "Google \u2014 Maps grounding for AI (full, Lite, place summaries)", "description": "Google's developer documentation for grounding AI models with Google Maps data, including Grounding Lite and Places API AI summaries.", "resource": "https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps", "tags": ["reference", "google-maps", "ai", "grounding", "developer"], "body": "The Google developer documentation underpinning the [Grounding with Google Maps](/agentic/grounding-google-maps.md) concept doc. Three related products:\n\n# Full Maps grounding\n\nEnabled as a grounding tool in the Gemini Enterprise Agent Platform / Vertex AI Studio. Documented to draw on **more than 250 million places**. Responses carry Maps sources in REST field `groundingMetadata.groundingChunks` (SDKs may use snake_case). Source attribution is a display requirement. The current documentation contains no \"widget context token\" or \"Contextual View\"; those earlier-draft claims are not retained.\n\n# Maps Grounding Lite\n\nA Google Maps Platform service with Model Context Protocol (MCP) support, exposing tools for place search, current/forecast weather, and driving/walking route distance and duration. It does **not** provide turn-by-turn directions, real-time traffic or navigation.\n\n# Places API (New) AI summaries\n\n`generativeSummary` returns brief (~100-character) place overviews in Place Details, Text Search and Nearby Search, requiring a \"Summarized with Gemini\" disclosure. As of 25 June 2026, documented for supported place types in English in India and the United States; not guaranteed for every place.\n\n# Citations\n\n[1] [Google Cloud \u2014 Grounding with Google Maps](https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps)\n\n[2] [Google Maps Platform \u2014 Maps Grounding Lite](https://developers.google.com/maps/ai/grounding-lite)\n\n[3] [Google Maps Platform \u2014 AI-powered place summaries](https://developers.google.com/maps/documentation/places/web-service/place-summaries)\n", "links": ["agentic/grounding-google-maps"]}, {"id": "references/lastmile-high-dollar-survey", "type": "Reference", "title": "Lastmile Retail \u2014 High-dollar local purchase survey", "description": "Consumer survey on real-time local availability and high-dollar local purchases, run by Lastmile Retail with Greg Sterling.", "resource": "https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte", "tags": ["reference", "retail", "inventory", "consumer-behaviour"], "body": "The consumer survey underpinning the demand-side claims in [Real-Time Local Inventory](/agentic/real-time-local-inventory.md). Conducted by Lastmile Retail with Greg Sterling among **1,000 US adults**, about local purchases of **$300 or more**.\n\n# Verified figures\n\n* **95%** said confirming local availability before visiting was somewhat to extremely important.\n* **56%** selected real-time product availability before visiting as a factor favouring local over remote shipping.\n* **48%** selected reserving online for in-store purchase or pickup.\n* **40%** reported insufficient product information on company websites.\n* **37%** could not confirm availability at a particular store; another **37%** reported inaccurate inventory information.\n\n# Scope caveat\n\nThese figures are specific to the reported US survey and the high-dollar (\\$300+) scenario. Do not generalise them to all markets or purchase values.\n\n# Citations\n\n[1] [Lastmile Retail / Miriam Ellis \u2014 Data-based Tactics for Increasing High-Dollar Local Purchases](https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte)\n", "links": ["agentic/real-time-local-inventory"]}, {"id": "references/seer-chatgpt-conversion", "type": "Reference", "title": "Seer Interactive ChatGPT conversion case study", "description": "Single-client case study comparing how ChatGPT traffic converts vs Google organic.", "resource": "https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts", "tags": ["reference", "ai-search", "conversion"], "body": "Seer Interactive case study on how AI-assistant traffic converts. Verified figures: **ChatGPT traffic converted at ~15.9% vs ~1.76% for Google organic** on the site studied. Important caveat carried through to our docs: this is **one client's data**, so treat it as directional, not a benchmark. Cited in [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Case study: how traffic from ChatGPT converts](https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/soci-cbi-2025", "type": "Reference", "title": "SOCi 2025 Consumer Behavior Index", "description": "SOCi's 2025 consumer survey \u2014 source of the 91% reviews statistic and the 65% respond-to-reviews statistic.", "resource": "https://www.soci.ai/insights/consumer-behavior-index", "tags": ["reference", "reviews", "consumer-behaviour"], "body": "SOCi's 2025 Consumer Behavior Index, announced 4 June 2025. Survey fieldwork 19\u201324 February 2025; 1,001 adult US respondents distributed evenly across gender, age and geography. Cited in [reviews on GBP](/gbp/reviews.md).\n\n# What the source establishes\n\n* **91% of consumers rely on peer-generated content to evaluate local businesses** (all respondents). SOCi's index page words the same finding as \"91% use reviews to validate decisions\".\n* **65% say they are more likely to choose a business that actively responds to reviews** \u2014 presented in SOCi's release in the context of younger audiences, so the bundle scopes it to younger consumers rather than all respondents.\n* Related findings: 40% of younger consumers prefer video reviews; 55% report growing scepticism of fake feedback.\n\n# Clarification carried into the bundle\n\nInternal notes attributed both headline figures to all consumers. The 91% figure is all-respondents; the 65% figure is scoped to younger audiences in the primary release, and is cited that way here.\n\n# Citations\n\n[1] [SOCi Consumer Behavior Index](https://www.soci.ai/insights/consumer-behavior-index)\n\n[2] [SOCi press release \u2014 AI Suggests, Humans Decide (4 June 2025)](https://www.prnewswire.com/news-releases/ai-suggests-humans-decide-soci-warns-brands-to-embrace-human-validation-or-get-left-behind-302472784.html)\n", "links": ["gbp/reviews"]}, {"id": "references/sterling-sky", "type": "Reference", "title": "Sterling Sky review research", "description": "Joy Hawkins' agency research on how review recency affects local ranking \u2014 the basis for the 18-day rule.", "resource": "https://www.sterlingsky.ca/number-of-reviews-impact-ranking/", "tags": ["reference", "reviews"], "body": "Sterling Sky (founded by Joy Hawkins) publishes case-study research on local ranking. We cite it for the **18-day rule** \u2014 the observation, drawn from client case studies, that local rankings can weaken once a business goes roughly two to three weeks without a new review. It is a community-recognised pattern, **not** confirmed Google policy. Used in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Does the number of Google reviews impact ranking?](https://www.sterlingsky.ca/number-of-reviews-impact-ranking/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/verification-report-2026-06-25", "type": "Report", "title": "Verification report \u2014 2026-06-25", "description": "Claim-by-claim fact-check of the agentic section against primary sources, completed 25 June 2026.", "resource": "", "tags": ["governance", "verification", "agentic"], "body": "Checked against primary sources on 25 June 2026. Each row records the original draft claim, the verification result, and the primary source consulted. See the [maintenance policy](/maintenance.md) for review cadence.\n\n# Results\n\n| Document | Claim | Result | Primary source |\n|---|---|---|---|\n| `agentic/ask-maps.md` | Official name is Ask Maps | Verified | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Entry point is under the Maps search bar | Corrected: Google confirms an **Ask Maps** button but does not specify a durable screen position in the primary announcement. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Gemini-powered | Verified | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Launch date and regions | Verified: announced 12 March 2026; rolling out on Android and iOS in the US and India; desktop described as coming soon. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/ask-maps.md` | Inputs include place facts, reviews, saved/search history and route context | Corrected to Google's wording: 300M+ places, reviews from 500M+ contributors, searched/saved places, directions and ETAs. Cross-app personal data was not claimed. | https://blog.google/products-and-platforms/products/maps/ask-maps-immersive-navigation/ |\n| `agentic/agentic-commerce.md` | Universal Commerce Protocol exists | Verified: launched January 2026 with public specification and named co-developers/endorsers. | https://ucp.dev/ |\n| `agentic/agentic-commerce.md` | Agent Payments Protocol exists | Verified: announced September 2025 with 60+ participating organisations. | https://cloud.google.com/blog/products/ai-machine-learning/announcing-agents-to-payments-ap2-protocol |\n| `agentic/agentic-commerce.md` | Agentic Commerce Protocol exists | Verified: developed by OpenAI and Stripe and open-sourced in September 2025. | https://www.agenticcommerce.dev/ |\n| `agentic/agentic-commerce.md` | Signed payment mandates are a protocol layer | Corrected: signed mandates are an AP2 mechanism, not a separate protocol. | https://ap2-protocol.org/ |\n| `agentic/agentic-commerce.md` | x402 exists and is relevant to agents | Verified: Coinbase documents an open HTTP-native stablecoin payment protocol; AP2 documents an x402 extension. | https://docs.cdp.coinbase.com/x402/welcome |\n| `agentic/agentic-commerce.md` | The protocols form an adopted industry stack | Corrected: specifications and early implementations exist, but universal adoption is not established. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Merchant Center should align with GBP \"Brand Profile\" | Corrected: Google's Search brand profile and Google Business Profile are separate surfaces. Business Agent eligibility uses Merchant Center plus a claimed brand profile. | https://support.google.com/brandprofile/answer/16410382?hl=en |\n| `agentic/agentic-commerce-readiness.md` | Roughly 50 offers unlock Business Agent | Corrected to **at least 50 approved free listings**, plus other eligibility conditions. | https://support.google.com/brandprofile/answer/16410382?hl=en |\n| `agentic/agentic-commerce-readiness.md` | Vision AI extracts menu items and prices from GBP photos | Dropped: no primary source found. Replaced with the documented structured Food Menus API. | https://developers.google.com/my-business/content/update-food-menus |\n| `agentic/agentic-commerce-readiness.md` | Commerce protocol discovery uses `/.well-known/` | Verified specifically for UCP at `/.well-known/ucp`. | https://ucp.dev/specification/overview/ |\n| `agentic/agentic-commerce-readiness.md` | POS-to-KDS order injection is a protocol requirement | Corrected to an operational recommendation. UCP describes food ordering and real-time availability, but detailed food specifications were still forthcoming. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Real-time \"86-ing\" is supported by a named standard | Dropped as a platform capability claim; retained only as an operational consistency requirement. | https://ucp.dev/ |\n| `agentic/agentic-commerce-readiness.md` | Hotel PMS two-way sync through named vendors | Corrected: Google documents availability, rates and inventory integrations, but no universal requirement for the named vendors was established. | https://developers.google.com/hotels/hotel-prices/dev-guide |\n| `agentic/agentic-commerce-readiness.md` | OTA rate parity is universal | Dropped: contracts and law vary by market; no single primary source supports a universal claim. | \u2014 |\n| `agentic/agentic-commerce-readiness.md` | OTA commissions are 15\u201325% | Dropped: no primary source supports this as a universal range. | \u2014 |\n| `agentic/grounding-google-maps.md` | Google Maps grounding tool exists | Verified. Current documentation places it in Gemini Enterprise Agent Platform and exposes it through Vertex AI Studio. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Place index size | Corrected to **over 250 million places**. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Response has `grounding_metadata` and Maps chunks | Verified with naming correction: REST uses `groundingMetadata.groundingChunks`; SDKs may use snake case. | https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/grounding/grounding-with-google-maps |\n| `agentic/grounding-google-maps.md` | Widget context token / Contextual View | Dropped: not present in the current primary documentation. | \u2014 |\n| `agentic/grounding-google-maps.md` | Grounding Lite is MCP-native | Verified: MCP service with place, weather and route tools. | https://developers.google.com/maps/ai/grounding-lite |\n| `agentic/grounding-google-maps.md` | Grounding Lite provides navigation | Corrected: it does not provide turn-by-turn directions, real-time traffic or navigation. | https://developers.google.com/maps/ai/grounding-lite |\n| `agentic/grounding-google-maps.md` | Places API (New) has AI summaries | Verified; returned through `generativeSummary`, with limited language/region/type availability. | https://developers.google.com/maps/documentation/places/web-service/place-summaries |\n| `agentic/generative-engine-optimization.md` | Defensible GEO definition | Verified against the original GEO paper and narrowed to visibility in generative-engine responses. | https://arxiv.org/abs/2311.09735 |\n| `agentic/generative-engine-optimization.md` | GEO and AEO have a settled distinction | Corrected: no authoritative standard was found; the document labels its distinction as a bundle-specific working definition. | https://arxiv.org/abs/2311.09735 |\n| `agentic/generative-engine-optimization.md` | 2026 Maps contributor/Gemini caption update | Verified: announced 7 April 2026, initially English on iOS in the US. | https://blog.google/products-and-platforms/products/maps/contributor-updates/ |\n| `agentic/real-time-local-inventory.md` | ~95% say pre-visit confirmation is important | Verified and made exact: **95%** said confirming local availability before visiting was somewhat to extremely important for an item priced at $300 or more. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~56% rank real-time availability first | Verified and made exact: **56%** selected real-time product availability before visiting as a factor favouring local over remote shipping. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~48% want reserve/pickup | Verified and made exact: **48%** selected reserving online for in-store purchase or pickup. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~40% blame websites | Verified and narrowed: **40%** reported insufficient product information on company websites. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | ~37% cannot confirm branch availability | Verified and made exact: **37%** could not confirm availability at a particular store; another **37%** reported inaccurate inventory information. | https://www.linkedin.com/pulse/data-based-tactics-increasing-high-dollar-local-purchases-lastmile-ozqte |\n| `agentic/real-time-local-inventory.md` | Merchant Center supports branch-level availability, price and pickup | Verified. | https://support.google.com/merchants/answer/14819809?hl=en |\n| `agentic/hitl-gbp-management.md` | GBP review replies can be written through API | Verified. | https://developers.google.com/my-business/content/review-data |\n| `agentic/hitl-gbp-management.md` | GBP posts can be created and edited through API | Verified for event, call-to-action and offer posts; product posts are excluded. | https://developers.google.com/my-business/content/posts-data |\n| `agentic/hitl-gbp-management.md` | Profile fields can be patched through API | Verified for supported fields using an update mask. | https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch |\n| `agentic/hitl-gbp-management.md` | Approval gates are a Google requirement or norm | Corrected: HITL is presented as an operator governance pattern, not a Google API requirement. | \u2014 |\n| `agentic/hitl-gbp-management.md` | GBP has a generic reversion endpoint | Dropped: no generic undo endpoint was found; reversion is described as a reviewed patch from a known-good snapshot. | https://developers.google.com/my-business/reference/businessinformation/rest/v1/locations/patch |\n\n# Claims requiring human follow-up\n\n* Confirm whether Google has a current replacement for the earlier Maps grounding widget context token or \"Contextual View\"; neither appears in the current documentation.\n* If OTA commission or rate-parity guidance is required, research it by jurisdiction, contract type and named platform rather than publishing a universal range.\n", "links": ["maintenance"]}, {"id": "references/verification-report-2026-07-06", "type": "Report", "title": "Verification report \u2014 2026-07-06", "description": "Claim-by-claim fact-check of the new gbp/ section against primary sources, completed 6 July 2026.", "resource": "", "tags": ["governance", "verification", "gbp"], "body": "Checked against primary sources on 6 July 2026, before the `gbp/` section was written. Each row records the claim as it arrived from internal notes, the verification result, and the primary source consulted. See the [maintenance policy](/maintenance.md) for review cadence.\n\n# Results\n\n| Document | Claim | Result | Primary source |\n|---|---|---|---|\n| `gbp/google-business-profile.md` | Google's local ranking factors are relevance, distance, prominence | Verified, with Google's definitions quoted; prominence explicitly considers links and review count, and Google states ranking cannot be requested or paid for. | https://support.google.com/business/answer/7091 |\n| `gbp/google-business-profile.md` | GMB was renamed Google Business Profile in 2021 | Verified against Google's own live announcement: \"Connect with local holiday shoppers\" (Matt Madrigal, **4 November 2021**) \u2014 \"To keep things simple, 'Google My Business' is being renamed 'Google Business Profile.'\" Corroborated by Google's Business Profile Community announcement (app retirement 2022, Business Profile Manager, Business Profile API). | https://blog.google/products/ads-commerce/connect-local-holiday-shoppers/ |\n| `gbp/google-business-profile.md` | Pre-2014 lineage (Local Business Center \u2192 Places \u2192 Google+ Local) | Verified with exact dates from Google's own live posts: Local Business Center became Google Places **20 April 2010** (\"Introducing Google Places\"); Google+ Local launched **30 May 2012** (owners kept managing via Google Places for Business); Google My Business launched **11 June 2014**, \"upgrading current users of Places for Business and the Google+ Dashboard\". | https://googleblog.blogspot.com/2010/04/introducing-google-places.html; https://blog.google/products/google-plus/localnow-with-dash-of-zagat-and/; https://smallbusiness.googleblog.com/2014/06/help-your-business-shine-with-google-my.html |\n| `gbp/business-description.md` | Description limit is 750 characters | Verified; shown in the \"From the business\" section; no URLs or HTML allowed. | https://support.google.com/business/answer/3039617 |\n| `gbp/business-description.md` | Description content rules | Verified: no links of any type; don't emphasise promotions/prices; no gimmicky or low-quality content; \"upfront and honest\". | https://support.google.com/business/answer/3038177 |\n| `gbp/reviews.md` | \"91% of consumers use reviews to evaluate local businesses\" (2025 SOCi CBI) | Verified with wording correction: **\"91% of consumers rely on peer-generated content to evaluate local businesses\"** (all respondents; survey 19\u201324 Feb 2025, n=1,001 US adults; released 4 June 2025). | https://www.prnewswire.com/news-releases/ai-suggests-humans-decide-soci-warns-brands-to-embrace-human-validation-or-get-left-behind-302472784.html |\n| `gbp/reviews.md` | \"65% more likely to choose a business that responds to reviews\" (2025 SOCi CBI) | Corrected scope: the primary release presents the 65% figure in the context of **younger audiences**, not all consumers. Cited as younger-consumers. | https://www.prnewswire.com/news-releases/ai-suggests-humans-decide-soci-warns-brands-to-embrace-human-validation-or-get-left-behind-302472784.html |\n| `gbp/reviews.md` | Google supports review links and QR codes; incentives prohibited | Verified: Google's own \"Tips to get more reviews\" page provides the link/QR facility and prohibits incentives as \"fake & misleading content\". | https://support.google.com/business/answer/3474122 |\n| `gbp/google-posts.md` | Post types are Update, Offer, Event | Verified, including required/optional fields per type, placement (Updates/Overview tab on mobile; \"From the owner\" on desktop), and 6-month archiving of undated posts. | https://support.google.com/business/answer/7342169 |\n| `gbp/google-posts.md` | Crate & Barrel + Uberall case study | Verified against the vendor-published case study: **+31% Google Maps views and +6% Google Search views, 2024 vs 2023**, across 161 locations, with 95% profile completeness. Cited with vendor-published, correlation-not-experiment caveats. | https://uberall.com/en-us/customers/how-crate-barrel-grew-google-visibility-by-31-while-saving-time |\n| `gbp/verification.md` | Five verification methods (postcard, phone, email, video, live walkthrough) | Corrected: the current help page lists **six** \u2014 video recording, phone/text, email, live video call, postcard, and instant verification via Search Console. | https://support.google.com/business/answer/7107242 |\n| `gbp/verification.md` | Method is auto-assigned by business category | Verified with broader wording: methods \"are automatically determined by Google and can't be changed\", based on business type, public info, region and hours. | https://support.google.com/business/answer/7107242 |\n| `gbp/verification.md` | Review window \"up to 5 business days\" | Verified; also: codes expire after 30 days, postcards mostly arrive within 14 days. | https://support.google.com/business/answer/7107242 |\n| `gbp/verification.md` | Video verification requirements | Verified: continuous unedited live recording \u226530 seconds showing location/signage, business evidence, and proof of management. | https://support.google.com/business/answer/14271705 |\n| `gbp/verification.md` | Ownership-request flow | Verified: current owner is notified and has 3 days to respond. | https://support.google.com/business/answer/4566671 |\n| `gbp/verification.md` | SAB/hybrid rules | Verified: SABs clear the address and set up to 20 service areas (city/postal-code based, ~2 hours' driving guidance); hybrids keep address + hours and add areas. | https://support.google.com/business/answer/9157481 |\n| `gbp/spam-and-fake-listings.md` | DOJ action against \"BEST\"/Premium Home Service, individual Yossef Bernath | Verified with corrections: complaint filed **11 May 2026** (N.D. Illinois) against B.E.S.T. GDR, LLC d/b/a Premium Home Service and CEO **Yosef** Bernath (one \"s\"); DOJ states **over 15,000 fake Google Search/Maps profiles**. | https://www.justice.gov/opa/pr/department-justice-files-complaint-against-best-gdr-llc-doing-business-premium-home-service |\n| `gbp/spam-and-fake-listings.md` | \"~$79M in gains\" | **Dropped/replaced**: not in the DOJ release, FTC release, or the filed complaint. The complaint alleges \"tens of millions of dollars\" from \"well over 100,000 consumers\" since at least 2018, via 7,600+ phone numbers in 250+ area codes. The $79M figure traces to KARE 11 investigative reporting and is noted as such. | https://www.ftc.gov/system/files/ftc_gov/pdf/premium_home_service_-_filed_complaint.pdf |\n| `gbp/profile-shielding.md` | `hasGoogleUpdated` flag and `diffMask` | Verified: `metadata.hasGoogleUpdated`; `locations.getGoogleUpdated` returns `diffMask` (differences needing action) and `pendingMask` (own edits in review). | https://developers.google.com/my-business/content/accept-or-reject-updates |\n| `gbp/profile-shielding.md` | Revert via PATCH | Verified: accept and reject both use `locations.patch` with an `updateMask` \u2014 accept by patching Google's value, reject by re-asserting your own. | https://developers.google.com/my-business/content/accept-or-reject-updates |\n| `gbp/profile-shielding.md` | \"Google updates\" pending-edit banner | Verified as a notification plus an alert in the profile's Edit profile section; the word \"banner\" is not in the primary source, so the doc uses Google's wording. Owner-edit review timing (\u224810 minutes, up to 30 days) verified on the same page. | https://support.google.com/business/answer/3038311 |\n| `gbp/review-gating.md` | Google policy bars selective solicitation | Verified verbatim: merchants must not \"discourage or prohibit negative reviews, or selectively solicit positive reviews from customers\"; incentivised reviews prohibited. | https://support.google.com/contributionpolicy/answer/7400114 |\n| `gbp/review-gating.md` | FTC rule effective 21 October 2024 | Verified (16 CFR Part 465); the FTC's Q&A states gating is not specifically prohibited by the rule but could violate the FTC Act (Endorsement Guides 16 CFR 255.2(d), (e)(11)). | https://www.ftc.gov/business-guidance/resources/consumer-reviews-testimonials-rule-questions-answers |\n| `gbp/review-gating.md` | December 2025 FTC warning letters | Verified: 22 December 2025, ten companies, civil-penalty exposure up to $53,088 per violation; letters are warnings, not adjudications. | https://www.ftc.gov/news-events/news/press-releases/2025/12/ftc-warns-10-companies-about-possible-violations-agencys-new-consumer-review-rule |\n\n# Claims requiring human follow-up\n\nNone. Three items initially flagged here were resolved on 6 July 2026:\n\n* **GMB\u2192GBP announcement primary source** \u2014 resolved. Google's announcement is live at blog.google under ads-commerce (\"Connect with local holiday shoppers\", 4 November 2021); the trade-press citation was replaced. See [the rename reference](/references/google-gbp-rename-2021.md).\n* **Pre-2014 product lineage dates** \u2014 resolved. Google's original announcements for Places (2010), Google+ Local (2012) and Google My Business (2014) are all live on Google-owned domains; the lineage is now stated with exact dates and quoted wording.\n* **SOCi 65% figure scope** \u2014 resolved by policy: the bundle's truth of record is the citable primary release, which presents the figure in the context of younger audiences, and the bundle cites it with exactly that scope. The full CBI report is gated; nothing gated is treated as citable. If SOCi publishes an ungated statement with a different scope, update [the SOCi reference](/references/soci-cbi-2025.md) first, then the citing documents.\n\n# Citations\n\n[1] [Tips to improve your local ranking on Google](https://support.google.com/business/answer/7091)\n\n[2] [Verify your business on Google](https://support.google.com/business/answer/7107242)\n\n[3] [Manage Google Updates](https://developers.google.com/my-business/content/accept-or-reject-updates)\n\n[4] [DOJ press release \u2014 B.E.S.T. GDR, LLC (11 May 2026)](https://www.justice.gov/opa/pr/department-justice-files-complaint-against-best-gdr-llc-doing-business-premium-home-service)\n\n[5] [FTC \u2014 Consumer Reviews and Testimonials Rule Q&A](https://www.ftc.gov/business-guidance/resources/consumer-reviews-testimonials-rule-questions-answers)\n", "links": ["maintenance", "references/google-gbp-rename-2021", "references/soci-cbi-2025"]}, {"id": "references/whitespark-2026", "type": "Reference", "title": "Whitespark Local Search Ranking Factors", "description": "Whitespark's annual local search ranking-factors study; used here for the relative importance of factors, not exact weights.", "resource": "https://whitespark.ca/local-search-ranking-factors/", "tags": ["reference", "ranking-factors"], "body": "Whitespark's annual Local Search Ranking Factors study ranks the signals that influence local pack and local organic results. We cite it **qualitatively** \u2014 for the *relative* importance of factors (e.g. that Google Business Profile is the leading driver of local pack visibility, and that review and citation signals matter for AI discovery). The precise percentage weightings sit inside Whitespark's full report and are not publicly published, so this bundle does not assert specific percentages.\n\n# Citations\n\n[1] [Local Search Ranking Factors](https://whitespark.ca/local-search-ranking-factors/)\n", "links": []}];
const byId = {}; DATA.forEach(c => byId[c.id] = c);
const palette = {};
const colors = ["#0f3460","#e94560","#16a085","#8e44ad","#d35400","#2980b9","#27ae60","#c0392b","#7f8c8d"];
DATA.forEach(c => { if(!(c.type in palette)) palette[c.type] = colors[Object.keys(palette).length % colors.length]; });

const elements = [];
DATA.forEach(c => elements.push({data:{id:c.id,label:c.title,type:c.type}}));
const seen = new Set();
DATA.forEach(c => c.links.forEach(t => { if(byId[t]){const k=c.id+"->"+t; if(!seen.has(k)){seen.add(k);elements.push({data:{id:k,source:c.id,target:t}});}}}));

const cy = cytoscape({container:document.getElementById("cy"),elements,
  style:[
    {selector:"node",style:{"background-color":ele=>palette[ele.data("type")]||"#888","label":"data(label)","font-size":"10px","color":"#1a1a2e","text-wrap":"wrap","text-max-width":"110px","text-valign":"bottom","text-margin-y":"3px","width":"22px","height":"22px"}},
    {selector:"edge",style:{"width":1.2,"line-color":"#b8c4dd","target-arrow-color":"#b8c4dd","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":0.8}},
    {selector:".faded",style:{"opacity":0.15}},
    {selector:".sel",style:{"border-width":3,"border-color":"#e94560"}}
  ],
  layout:{name:"cose",animate:false,padding:30}});

const tf = document.getElementById("typeFilter");
tf.innerHTML = '<option value="">all types</option>' + Object.keys(palette).map(t=>`<option>${t}</option>`).join("");

function render(c){
  let b = marked.parse(c.body);
  b = b.replace(/href="(\/[^"]+)\.md"/g,'class="xlink" data-id="$1" href="javascript:void(0)"').replace(/data-id="\//g,'data-id="');
  const backlinks = DATA.filter(o=>o.links.includes(c.id));
  document.getElementById("panel").innerHTML =
    `<h2>${c.title}</h2><div class="meta"><span class="tag" style="background:${palette[c.type]};color:#fff">${c.type}</span> ${c.id}</div>`+
    (c.description?`<p>${c.description}</p>`:"")+
    (c.resource?`<p class="hint">resource: <a href="${c.resource}" target="_blank">${c.resource}</a></p>`:"")+
    (c.tags&&c.tags.length?`<div>${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:"")+
    `<div class="body">${b}</div>`+
    (backlinks.length?`<div class="backlinks"><strong>Cited by</strong>${backlinks.map(o=>`<a class="xlink" data-id="${o.id}">${o.title}</a>`).join("")}</div>`:"");
  document.querySelectorAll(".xlink").forEach(a=>{const id=a.getAttribute("data-id");
    if(byId[id]){a.onclick=()=>select(id);}
    else{a.classList.remove("xlink");a.classList.add("navlink");}});  // reserved/non-node target
}
function select(id){cy.nodes().removeClass("sel");const n=cy.getElementById(id);n.addClass("sel");if(byId[id])render(byId[id]);}
cy.on("tap","node",e=>select(e.target.id()));

document.getElementById("search").oninput=e=>{const q=e.target.value.toLowerCase();cy.nodes().forEach(n=>{const c=byId[n.id()];const hit=!q||c.title.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||(c.tags||[]).join(" ").toLowerCase().includes(q);n.toggleClass("faded",!hit);});};
tf.onchange=e=>{const t=e.target.value;cy.nodes().forEach(n=>n.toggleClass("faded",t&&byId[n.id()].type!==t));};
document.getElementById("layout").onchange=e=>cy.layout({name:e.target.value,animate:false,padding:30}).run();
</script></body></html>
