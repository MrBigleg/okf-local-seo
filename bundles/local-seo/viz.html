<script>
const DATA = [{"id": "local-seo/ai-search-local", "type": "Concept", "title": "AI Search Impact on Local", "description": "How AI assistants and AI Overviews reshape local discovery, and where they source business facts.", "resource": "", "tags": ["local-seo", "ai-search", "geo", "aeo"], "body": "AI assistants and AI Overviews are now a real local-discovery surface. Google's own guidance is that AI features run on the same systems as ordinary Search \u2014 there's no separate \"AI SEO\" trick, and normal indexing/eligibility is the floor. So the work is mostly good SEO done well, plus attention to where AI gets its facts.\n\n# What the data suggests\n\n* AI traffic tends to **convert well**: Seer Interactive's case study saw ChatGPT traffic convert at ~15.9% vs ~1.76% for Google organic \u2014 though that's a single client, so treat it as directional, not a benchmark.\n* **Brand mentions** matter more than backlinks for AI visibility (Ahrefs) \u2014 see [local links & authority](/local-seo/local-authority-links.md).\n* AI assistants generally pull from the open web and major third-party sources rather than reading Google Business Profile directly, so your presence on independent sites and directories ([NAP & citations](/local-seo/nap-citations.md)) does real work.\n\n# What to do\n\n1. Get the SEO fundamentals right \u2014 indexable, eligible, well-structured pages.\n2. Build genuine brand mentions and earned media.\n3. Be present and consistent on the third-party sources AI tools commonly cite (review sites, directories, community platforms).\n4. Claim under-used surfaces like Bing Places and Apple Business Connect.\n\n# Citations\n\n[1] [Google \u2014 AI features and your website](/references/google-ai-optimization-guide.md)\n[2] [Seer Interactive ChatGPT conversion case study](/references/seer-chatgpt-conversion.md)\n[3] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/local-authority-links", "local-seo/nap-citations", "references/google-ai-optimization-guide", "references/seer-chatgpt-conversion", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/business-type-detection", "type": "Detection Method", "title": "Business Type Detection", "description": "Classify a business as brick-and-mortar, service-area, or hybrid before running local SEO checks.", "resource": "", "tags": ["local-seo", "detection", "gbp"], "body": "Detect the business type from page signals **before** analysis. The type determines which checks apply \u2014 for example, service-area businesses skip embedded-map and physical-address checks.\n\n# Types\n\n| Type | Signals |\n|------|---------|\n| **Brick-and-mortar** | Physical street address in content/footer; Google Maps embed with pin/directions; \"Visit us at\", \"Located at\"; structured address in [LocalBusiness schema](/local-seo/local-schema.md). |\n| **Service Area Business (SAB)** | No visible physical address; \"serving [city/region]\", \"we come to you\", \"mobile [service]\"; `areaServed` in schema without `address.streetAddress`. |\n| **Hybrid** | Both a physical address and service-area language; e.g. \"visit our showroom\" plus \"we also serve [areas]\". |\n\n# Impact on checks\n\nSABs skip embedded-map verification and physical-address consistency. Brick-and-mortar gets the full [NAP and citation](/local-seo/nap-citations.md) checks. This classification also shapes [schema generation](/maps/schema-generation.md) \u2014 SABs use `areaServed` with named cities rather than a street address.\n", "links": ["local-seo/local-schema", "local-seo/nap-citations", "maps/schema-generation"]}, {"id": "local-seo/gbp-signals", "type": "Ranking Dimension", "title": "GBP Signals", "description": "Google Business Profile is the leading driver of local pack visibility; the primary category is the most important single setting.", "resource": "", "tags": ["local-seo", "gbp", "ranking-factors"], "body": "Your Google Business Profile is the single biggest lever on local pack visibility (the top-three map results), per Whitespark's ranking-factors study. We don't quote a precise weighting \u2014 Whitespark's exact percentages aren't published \u2014 but its relative ranking is consistent and well-established.\n\n# What to check\n\n* Primary category \u2014 the most important setting on the profile. Pick the most specific category that genuinely fits; a wrong primary category actively suppresses visibility.\n* Relevant secondary categories that reflect real services.\n* A complete, accurate profile: name, address (if applicable), hours, phone, website.\n* Photos and regular activity (posts, updates) \u2014 an actively maintained profile reads as a live business.\n* Reviews flowing steadily \u2014 see [reviews & reputation](/local-seo/reviews-reputation.md).\n* The website URL strategy \u2014 point the GBP link at a relevant, well-optimised page rather than reflexively at the homepage.\n\n# On-page detection signals\n\nWhen auditing from the website alone, look for a Maps embed, a place reference, or a reviews widget as evidence the GBP exists and is linked.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Accurate primary category, complete profile, active posts/photos, steady reviews. |\n| Partial | Profile present but incomplete or inactive. |\n| Low | No visible GBP integration on the website. |\n\n# Related\n\nLive profile completeness is scored in [GBP profile audit](/maps/gbp-profile-audit.md). For the hands-on first pass, see the [GBP optimisation checklist](/playbooks/gbp-optimisation-checklist.md).\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/reviews-reputation", "maps/gbp-profile-audit", "playbooks/gbp-optimisation-checklist", "references/whitespark-2026"]}, {"id": "local-seo/industry-vertical-detection", "type": "Detection Method", "title": "Industry Vertical Detection", "description": "Detect the industry vertical from page and GBP signals to route to industry-specific local SEO checks.", "resource": "", "tags": ["local-seo", "detection"], "body": "Detect the vertical from page signals and GBP category patterns, then route to industry-specific checks (see [local schema markup](/local-seo/local-schema.md)). If no vertical is detected, use the generic `LocalBusiness` path.\n\n# Detection signals\n\n| Vertical | Detection signals |\n|----------|-------------------|\n| **Restaurant** | /menu, menu items, reservations, cuisine types, food ordering, \"dine-in\", \"takeout\" |\n| **Healthcare** | insurance accepted, patients, appointments, NPI, medical terms, \"Dr.\", HIPAA notice |\n| **Legal** | attorney, lawyer, practice areas, bar admission, case results, \"free consultation\" |\n| **Home Services** | service area, emergency service, \"free estimate\", licensed/insured/bonded, \"24/7\" |\n| **Real Estate** | listings, MLS, properties for sale/rent, agent bio, brokerage, \"open house\" |\n| **Automotive** | inventory, VIN, test drive, dealership, service department, \"new/used/certified\" |\n\n# Why it matters\n\nThe vertical changes the correct schema subtype, the citation directories worth pursuing, and the review-response rules (e.g. HIPAA constraints for healthcare). When the vertical is unclear, present the top two detected verticals with supporting signals and confirm before applying industry-specific recommendations.\n", "links": ["local-seo/local-schema"]}, {"id": "local-seo/local-authority-links", "type": "Ranking Dimension", "title": "Local Links & Authority", "description": "Local backlinks, brand mentions, and being listed where AI and search look for credible businesses.", "resource": "", "tags": ["local-seo", "links", "authority", "ranking-factors"], "body": "Links still matter for local organic rankings, but the bigger shift is towards **brand mentions and earned media** \u2014 especially for AI visibility. Ahrefs' 75,000-brand study found brand web mentions correlate far more strongly with AI Overview visibility (\u22480.664) than backlinks do (\u22480.218) \u2014 roughly three times the strength. It's a correlation study, not proof of causation, but the direction is clear: get talked about, not just linked to.\n\n# What to check\n\n* Local authority signals on the page \u2014 Chamber of Commerce, BBB, local press, sponsorships, community involvement.\n* Brand mentions across the wider web (not just links).\n* Placement on credible local \"best of\" / round-up lists.\n* A steady trickle of quality local links rather than spikes.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Visible local authority signals (chamber, BBB, press) and evident community presence. |\n| Partial | Some signals but limited local link/mention footprint. |\n| Low | No detectable local authority signals. |\n\n# Related\n\nBrand mentions and earned placements feed directly into [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Ahrefs AI Overview brand-correlation study](/references/ahrefs-ai-overviews.md)\n", "links": ["local-seo/ai-search-local", "references/ahrefs-ai-overviews"]}, {"id": "local-seo/local-onpage", "type": "Ranking Dimension", "title": "Local On-Page SEO", "description": "Dedicated service pages, visible NAP, and avoiding doorway-page patterns.", "resource": "", "tags": ["local-seo", "on-page", "ranking-factors"], "body": "Dedicated, genuinely useful service pages are among the strongest local on-page signals (Whitespark ranks dedicated service pages near the top of its local organic factors). This is where most local sites win or lose.\n\n# What to check\n\n* Title tag and H1 carry the city + service intent.\n* NAP (name, address, phone) visible in the page HTML \u2014 footer, contact section, or header. See [NAP consistency & citations](/local-seo/nap-citations.md).\n* One dedicated page per core service, with real, specific content.\n* Click-to-call (`tel:`) and a contact form above the fold.\n* Sensible internal linking \u2014 every important page reachable in a few clicks, with descriptive anchor text.\n\n# Location pages (multi-location)\n\nThe big risk is **doorway pages** \u2014 near-identical templates with only the town name swapped. The quick test: if you can swap the city and the copy still reads fine, it's a doorway page, and Google's core updates have repeatedly hit that pattern. Make each page genuinely unique \u2014 local photos, area-specific testimonials, local FAQs \u2014 and give each its own [LocalBusiness schema](/local-seo/local-schema.md) with a unique `@id`. Prefer crawlable, server-rendered location URLs under a tidy `/locations/city/` structure.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | City in title + H1, NAP visible, dedicated service pages, no doorway patterns, clean internal linking. |\n| Partial | Some local signals but missing service pages or doorway-page risk. |\n| Low | Generic title/H1, NAP not visible, thin location pages. |\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/nap-citations", "local-seo/local-schema", "references/whitespark-2026"]}, {"id": "local-seo/local-schema", "type": "Ranking Dimension", "title": "Local Schema Markup", "description": "LocalBusiness JSON-LD with the correct industry subtype \u2014 not a ranking factor, but it helps search and AI parse the business.", "resource": "", "tags": ["local-seo", "schema", "json-ld", "ranking-factors"], "body": "Structured data is **not** a direct ranking factor (Google's own line), but it can earn rich results and, increasingly, it helps AI systems read your business facts cleanly. Worth getting right; not worth over-claiming.\n\n# What to check\n\n* LocalBusiness JSON-LD present (extract the blocks).\n* Required: `name`, `address` with `PostalAddress` sub-properties.\n* Recommended: `geo` (use real lat/long with several decimal places), `openingHoursSpecification`, `telephone`, `url`, `image`, and `aggregateRating` where genuine.\n* **Correct subtype for the industry** (see [industry vertical detection](/local-seo/industry-vertical-detection.md)) \u2014 e.g. `Restaurant`, `LegalService`, `Dentist`, `AutoDealer`, rather than a generic `LocalBusiness`.\n* Service-area businesses: use `areaServed` with named places instead of a street address.\n* Multi-location: each page gets its own LocalBusiness with a unique `@id`, linked via `branchOf` to the Organization on the homepage.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Correct subtype, recommended properties present, valid JSON-LD. |\n| Partial | Present but generic type or missing recommended properties. |\n| Low | No local schema, or schema with errors/placeholder content. |\n\n# Related\n\nGenerate ready-to-paste JSON-LD via [maps schema generation](/maps/schema-generation.md). Don't mark up your own self-serving reviews \u2014 Google ignores LocalBusiness review markup that comes from the business itself.\n\n# Citations\n\n[1] [Whitespark Local Search Ranking Factors](/references/whitespark-2026.md)\n", "links": ["local-seo/industry-vertical-detection", "maps/schema-generation", "references/whitespark-2026"]}, {"id": "local-seo/nap-citations", "type": "Ranking Dimension", "title": "NAP Consistency & Citations", "description": "Consistent name/address/phone across sources, and presence on the directories that feed search and AI.", "resource": "", "tags": ["local-seo", "nap", "citations", "ranking-factors"], "body": "Citations carry less weight for the traditional local pack than they once did, but consistency still matters \u2014 and citation-style signals feed AI discovery, which sources business facts from across the web rather than from Google Business Profile directly.\n\n# What to check\n\n* **NAP consistency** \u2014 compare name, address, and phone across three sources and flag any mismatch:\n  1. Visible page HTML (footer, contact page).\n  2. LocalBusiness JSON-LD schema.\n  3. Any visible GBP data.\n* Presence on core directories \u2014 Google Business Profile, plus the likes of Yelp, BBB, and Facebook. Quick checks: `site:yelp.com \"Business Name\"`, `site:bbb.org \"Business Name\"`.\n* **Apple Business Connect** \u2014 adoption is strikingly low (BrightLocal: only ~16% of businesses use it, and ~58% haven't even claimed their Apple Maps listing). That makes claiming it a cheap, uncontested win.\n* **Bing Places** \u2014 worth claiming; the Bing index feeds several AI assistants, so it has reach beyond Bing search itself.\n* Data aggregators (e.g. Data Axle, Foursquare) for downstream distribution.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Consistent NAP across page/schema/GBP; present on core directories. |\n| Partial | NAP present but with inconsistencies; some listings missing. |\n| Low | NAP discrepancies, no detectable listings, no schema address. |\n\n# Related\n\nCross-platform NAP across Google, Bing, Apple, and OSM is verified in [maps NAP verification](/maps/nap-verification.md).\n\n# Citations\n\n[1] [BrightLocal Apple Business Connect research](/references/brightlocal-apple-business-connect.md)\n", "links": ["maps/nap-verification", "references/brightlocal-apple-business-connect"]}, {"id": "local-seo/reviews-reputation", "type": "Ranking Dimension", "title": "Reviews & Reputation", "description": "Review recency and rating thresholds \u2014 steady velocity matters more than a big one-off total.", "resource": "", "tags": ["local-seo", "reviews", "ranking-factors"], "body": "Reviews are a major local ranking and conversion signal, and **recency beats raw count**. Sterling Sky's case-study research describes an **18-day rule**: rankings can start to slip once a business goes roughly two to three weeks without a new review. It's a community-recognised pattern, not confirmed Google policy \u2014 but the practical takeaway is sound: keep reviews coming in steadily.\n\n# Rating thresholds (BrightLocal)\n\nConsumer expectations have climbed:\n\n* **68%** won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require at least 4.5 stars (up from 17%).\n\nSo the bar for \"acceptable\" has moved up roughly half a star in two years.\n\n# What to check\n\n* Total Google review count visible on page or in schema (`aggregateRating`).\n* Star rating against the thresholds above.\n* Recency \u2014 is there a steady, recent flow rather than a stale cluster?\n* Owner responses, especially to negatives.\n* Presence across more than one review platform.\n* **No review gating** \u2014 pre-screening for happy customers before steering them to a review platform breaches Google's policies and risks FTC enforcement. Ask everyone.\n\n# Industry notes\n\n* Healthcare: HIPAA limits what you can say in responses \u2014 don't confirm or deny that a reviewer is a patient.\n* Legal: mind attorney-client privilege in responses.\n\n# Scoring guide\n\n| Level | Criteria |\n|-------|----------|\n| Full | Healthy count, 4.5+ stars, recent steady flow, owner responses, multi-platform. |\n| Partial | Some reviews but gaps in recency, rating, or response rate. |\n| Low | Few reviews, stale, no responses, single platform. |\n\n# Related\n\nCross-platform velocity, sentiment, and fake-review detection live in [review intelligence](/maps/review-intelligence.md).\n\n# Citations\n\n[1] [Sterling Sky review research](/references/sterling-sky.md)\n[2] [BrightLocal Local Consumer Review Survey](/references/brightlocal-lcrs.md)\n", "links": ["maps/review-intelligence", "references/sterling-sky", "references/brightlocal-lcrs"]}, {"id": "maps/capability-tiers", "type": "Concept", "title": "Maps Capability Tiers", "description": "Three-tier capability model for maps intelligence \u2014 detect the available tier before any analysis and communicate it to the user.", "resource": "", "tags": ["maps", "dataforseo", "tiers"], "body": "Maps intelligence analyses the business on maps **platforms** (via APIs), as opposed to [local on-page SEO](/local-seo/local-onpage.md) which analyses the **website** via HTML fetch. Detect the available tier first and always communicate it to the user.\n\n# Tiers\n\n| Tier | Detection | Capabilities |\n|------|-----------|--------------|\n| **0 \u2014 Free** | No DataForSEO MCP tools | Overpass API competitor discovery, Geoapify POI search, Nominatim geocoding, static GBP checklist, schema generation, cross-platform NAP guidance. |\n| **1 \u2014 DataForSEO** | `business_data_business_listings_search` available | Tier 0 + [geo-grid rank tracking](/maps/geo-grid-tracking.md), live [GBP profile audit](/maps/gbp-profile-audit.md), [review intelligence](/maps/review-intelligence.md), GBP post/Q&A data, Tripadvisor/Trustpilot reviews. |\n| **2 \u2014 DataForSEO + Google Maps** | Tier 1 + Google Maps API key | Tier 1 + Google Places details, real-time business status, AI place summaries, photo analysis. Google ToS restricts storage to `place_id`; lat/lng cached 30 days max. |\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/local-onpage", "maps/geo-grid-tracking", "maps/gbp-profile-audit", "maps/review-intelligence", "references/dataforseo"]}, {"id": "maps/competitor-radius", "type": "Maps Analysis", "title": "Competitor Radius Mapping", "description": "Identify and analyse competitors within a defined radius, free via Overpass or richer via DataForSEO.", "resource": "", "tags": ["maps", "competitors", "radius"], "body": "Identify and analyse competitors within a defined radius. Available from [Tier 0](/maps/capability-tiers.md).\n\n# Tier 0 (Overpass API)\n\n1. Geocode the business address.\n2. Query Overpass for businesses with the same OSM tag within the radius.\n3. Parse name, address, phone, website, and distance from centre.\n4. Sort by distance and present as a competitor landscape table.\n\n# Tier 1 (DataForSEO)\n\n1. Use the Maps SERP API with the business keyword + location.\n2. Extract the top 20 competitors with full profile data.\n3. Compare rating, review count, categories, photos, and attributes.\n4. Calculate a competitive density score (competitors per km\u00b2).\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/gbp-profile-audit", "type": "Maps Analysis", "title": "GBP Profile Audit", "description": "Score the 25 Google Business Profile fields that affect quality and ranking, with industry weighting.", "resource": "", "tags": ["maps", "gbp", "audit"], "body": "Audits the 25 fields that affect GBP quality and ranking. Tier 1 uses live API data; [Tier 0](/maps/capability-tiers.md) falls back to detectable on-page signals. Complements the on-page view in [GBP signals](/local-seo/gbp-signals.md).\n\n# Tier 1 workflow\n\n1. Fetch the profile via the DataForSEO My Business Info API (keyword or CID).\n2. Map the API response to the 25-field checklist.\n3. Score each field: Present + Optimised = 2pts, Present = 1pt, Missing = 0pts.\n4. Apply industry-specific weight multipliers.\n5. Normalise to a 0\u2013100 scale.\n\n# Tier 0 workflow\n\n1. Fetch the business website.\n2. Extract visible GBP signals (Maps embed, place references, review widgets).\n3. Apply the static checklist from detectable signals.\n4. Mark undetectable fields as \"Unknown (requires DataForSEO for live data)\".\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "local-seo/gbp-signals", "references/dataforseo"]}, {"id": "maps/geo-grid-tracking", "type": "Maps Analysis", "title": "Geo-Grid Rank Tracking", "description": "Simulate Google Maps searches from multiple GPS coordinates to show ranking variation and compute Share of Local Voice.", "resource": "", "tags": ["maps", "geo-grid", "rank-tracking", "solv"], "body": "Geo-grid tracking simulates Maps searches from many GPS coordinates to reveal how rank varies across a geographic area. Requires DataForSEO ([Tier 1+](/maps/capability-tiers.md)).\n\n# Workflow\n\n1. Geocode the business address to a centre lat/lng.\n2. Generate grid points (default 7\u00d77, 5km radius) using a Haversine offset.\n3. **Display a cost estimate and ask for confirmation before proceeding.**\n4. Fire DataForSEO Maps SERP calls with `location_coordinate` per grid point.\n5. Find the target business rank at each point.\n6. Compute SoLV: `(top_3_count / total_points) * 100`.\n7. Render an ASCII heatmap in the output.\n\n# Cost warning (required)\n\nBefore every scan, display the keyword, location, grid size, keyword count, and estimated cost, and confirm before consuming DataForSEO credits.\n\n# Citations\n\n[1] [DataForSEO](/references/dataforseo.md)\n", "links": ["maps/capability-tiers", "references/dataforseo"]}, {"id": "maps/nap-verification", "type": "Maps Analysis", "title": "Cross-Platform NAP Verification", "description": "Check business listing consistency across Google, Bing Places, Apple, and OpenStreetMap.", "resource": "", "tags": ["maps", "nap", "consistency"], "body": "Check listing consistency across Google, Bing Places, Apple, and OSM. Extends the page/schema/GBP checks in [NAP consistency & citations](/local-seo/nap-citations.md) to map platforms.\n\n# Workflow\n\n1. Search the business name on each platform:\n   * Google \u2014 infer from GBP data or Maps SERP result.\n   * Bing \u2014 fetch `bing.com/maps?q=BUSINESS+NAME+LOCATION`.\n   * Apple \u2014 manual check (no public API; recommend Apple Business Connect).\n   * OSM \u2014 Overpass or Nominatim search.\n2. Extract NAP from each source.\n3. Compare: exact match, partial match, missing, or conflicting.\n4. Flag discrepancies \u2014 Critical (name mismatch), High (address mismatch), Medium (phone mismatch).\n5. Recommend claiming unclaimed profiles.\n", "links": ["local-seo/nap-citations"]}, {"id": "maps/review-intelligence", "type": "Maps Analysis", "title": "Review Intelligence", "description": "Cross-platform review velocity, sentiment, rating distribution, and fake-review detection.", "resource": "", "tags": ["maps", "reviews", "velocity", "sentiment"], "body": "Cross-platform review analysis across Google, Tripadvisor, and Trustpilot. Extends the on-page view in [reviews & reputation](/local-seo/reviews-reputation.md) with platform data.\n\n# Workflow\n\n1. Fetch Google reviews via the DataForSEO Reviews API (newest first).\n2. Calculate review velocity: reviews per month over the last 6 months.\n3. Check the **18-day rule** (Sterling Sky): any 3-week gap = ranking risk.\n4. Analyse rating distribution: healthy = bell curve skewed to 5-star.\n5. Calculate owner response rate: responses / total reviews.\n6. Fetch Tripadvisor and Trustpilot reviews if available.\n7. Build a cross-platform comparison table.\n\n# Fake-review detection\n\nFlag reviews matching 2+ of: uniform timing; reviewer accounts with limited history; geographic inconsistencies; exclusively 5-star velocity spikes; near-identical text; sudden volume spikes without corresponding marketing activity.\n\n# Citations\n\n[1] [Sterling Sky](/references/sterling-sky.md)\n[2] [DataForSEO](/references/dataforseo.md)\n", "links": ["local-seo/reviews-reputation", "references/sterling-sky", "references/dataforseo"]}, {"id": "maps/schema-generation", "type": "Maps Analysis", "title": "Schema Generation", "description": "Generate LocalBusiness JSON-LD markup from collected maps and business data.", "resource": "", "tags": ["maps", "schema", "json-ld"], "body": "Generate LocalBusiness JSON-LD from collected data. See [local schema markup](/local-seo/local-schema.md) for the audit-side view and industry subtypes.\n\n# Workflow\n\n1. Determine the most specific schema subtype for the industry (see [industry vertical detection](/local-seo/industry-vertical-detection.md)).\n2. Populate required properties: `@type`, `name`, `address`, `image`.\n3. Add recommended properties: `telephone`, `url`, `geo`, `openingHoursSpecification`, `priceRange`.\n4. Add multi-location properties where relevant: `branchOf`, `areaServed`, `sameAs`.\n5. Add `aggregateRating` if review data is available.\n6. Output a valid JSON-LD block ready to implement.\n\n# Example\n\n```json\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"LocalBusiness\",\n  \"name\": \"Example Co\",\n  \"address\": {\n    \"@type\": \"PostalAddress\",\n    \"streetAddress\": \"1 High Street\",\n    \"addressLocality\": \"Manchester\",\n    \"postalCode\": \"M1 1AA\",\n    \"addressCountry\": \"GB\"\n  },\n  \"telephone\": \"+44-161-000-0000\",\n  \"url\": \"https://example.co.uk\",\n  \"geo\": { \"@type\": \"GeoCoordinates\", \"latitude\": 53.48095, \"longitude\": -2.23743 }\n}\n```\n\n> Do **not** generate self-serving review markup \u2014 Google ignores LocalBusiness review markup from the business itself. Only mark up third-party reviews visible on the page.\n", "links": ["local-seo/local-schema", "local-seo/industry-vertical-detection"]}, {"id": "playbooks/gbp-optimisation-checklist", "type": "Playbook", "title": "GBP Optimisation Quick-Wins Checklist", "description": "The fastest high-impact local SEO fixes to run on a new client engagement.", "resource": "", "tags": ["playbook", "gbp", "local-seo", "onboarding"], "body": "A short, high-leverage checklist for the first pass on a new local client. Pair it with the full [local SEO dimensions](/local-seo/) for the deep audit.\n\n# Quick wins\n\n1. Claim and optimise **Apple Business Connect** \u2014 adoption is low (~16% per BrightLocal), so it's an easy win.\n2. Claim and optimise **Bing Places** \u2014 the Bing index feeds several AI assistants, so it has reach beyond Bing (see [AI search impact](/local-seo/ai-search-local.md)).\n3. Fix any **NAP discrepancies** across page, schema, and GBP (see [NAP & citations](/local-seo/nap-citations.md)).\n4. Add **LocalBusiness schema** with the correct industry subtype (see [local schema markup](/local-seo/local-schema.md)).\n5. Add `geo` coordinates with 5+ decimal precision.\n6. Ensure the phone number uses a `tel:` click-to-call link.\n7. Add city + service keywords to the title tag and H1.\n\n# Medium effort\n\n1. Create a dedicated page for each core service (one of the strongest local organic signals \u2014 see [local on-page SEO](/local-seo/local-onpage.md)).\n2. Build a review-generation cadence that never breaks the [18-day rule](/local-seo/reviews-reputation.md).\n3. Submit to the main data aggregators (e.g. Data Axle, Foursquare).\n4. Claim industry-specific directories for the detected [vertical](/local-seo/industry-vertical-detection.md).\n\n# High impact\n\n1. Build a local digital-PR strategy targeting brand mentions and \"best of\" lists (mentions correlate strongly with AI visibility \u2014 see [local links & authority](/local-seo/local-authority-links.md)).\n2. Develop unique, non-swappable content for each location page.\n3. Establish presence on the third-party sources AI assistants commonly cite \u2014 review sites, directories, and community platforms.\n", "links": ["local-seo/ai-search-local", "local-seo/nap-citations", "local-seo/local-schema", "local-seo/local-onpage", "local-seo/reviews-reputation", "local-seo/industry-vertical-detection", "local-seo/local-authority-links"]}, {"id": "references/ahrefs-ai-overviews", "type": "Reference", "title": "Ahrefs AI Overview brand-correlation study", "description": "75,000-brand analysis of what correlates with appearing in Google AI Overviews.", "resource": "https://ahrefs.com/blog/ai-overview-brand-correlation/", "tags": ["reference", "ai-search", "brand-mentions"], "body": "Ahrefs analysed ~75,000 brands to see what correlates with AI Overview visibility. Verified headline finding: **brand web mentions correlate far more strongly (\u22480.664) than backlinks (\u22480.218)** \u2014 roughly 3\u00d7 the strength. Note this is a *correlation* study across AI Overviews generally, not a controlled or local-specific test. Cited in [local links & authority](/local-seo/local-authority-links.md) and [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [An analysis of AI Overview brand visibility factors](https://ahrefs.com/blog/ai-overview-brand-correlation/)\n", "links": ["local-seo/local-authority-links", "local-seo/ai-search-local"]}, {"id": "references/brightlocal-apple-business-connect", "type": "Reference", "title": "BrightLocal Apple Business Connect research", "description": "BrightLocal poll on adoption and awareness of Apple Business Connect among local businesses.", "resource": "https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/", "tags": ["reference", "apple", "citations"], "body": "BrightLocal research on Apple Business Connect take-up. Verified figures:\n\n* Only **~16%** of businesses are using Apple Business Connect.\n* **~58%** have not claimed their Apple Maps listing.\n* **~59%** are unaware of the tools Apple Business Connect offers.\n\nThe low adoption is the point: claiming Apple Maps is a cheap, uncontested win. Cited in [NAP consistency & citations](/local-seo/nap-citations.md).\n\n# Citations\n\n[1] [Are businesses using Apple Business Connect?](https://www.brightlocal.com/research/are-businesses-using-apple-business-connect/)\n", "links": ["local-seo/nap-citations"]}, {"id": "references/brightlocal-lcrs", "type": "Reference", "title": "BrightLocal Local Consumer Review Survey", "description": "Annual survey of consumer review behaviour; source for rating thresholds.", "resource": "https://www.brightlocal.com/research/local-consumer-review-survey/", "tags": ["reference", "reviews", "consumer-behaviour"], "body": "BrightLocal's annual Local Consumer Review Survey (LCRS). Verified figures used in this bundle:\n\n* **68%** of consumers won't use a business rated under 4 stars (up from 55% the prior year).\n* **31%** require a minimum of 4.5 stars (up from 17% the prior year).\n\nCited in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Local Consumer Review Survey](https://www.brightlocal.com/research/local-consumer-review-survey/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/dataforseo", "type": "Reference", "title": "DataForSEO", "description": "SEO data API powering Tier 1+ maps intelligence \u2014 Maps SERP, My Business Info, and Reviews endpoints.", "resource": "https://dataforseo.com/", "tags": ["reference", "api", "maps"], "body": "DataForSEO provides the live data behind [Tier 1+ maps intelligence](/maps/capability-tiers.md): the Maps SERP API ([geo-grid](/maps/geo-grid-tracking.md), [competitors](/maps/competitor-radius.md)), My Business Info API ([GBP audit](/maps/gbp-profile-audit.md)), and the Reviews API ([review intelligence](/maps/review-intelligence.md)). Usage consumes credits \u2014 always show a cost estimate before geo-grid scans.\n\n# Citations\n\n[1] [DataForSEO](https://dataforseo.com/)\n", "links": ["maps/capability-tiers", "maps/geo-grid-tracking", "maps/competitor-radius", "maps/gbp-profile-audit", "maps/review-intelligence"]}, {"id": "references/google-ai-optimization-guide", "type": "Reference", "title": "Google \u2014 AI features and your website", "description": "Google's primary-source guidance on how AI features in Search relate to ordinary SEO.", "resource": "https://developers.google.com/search/docs/appearance/ai-features", "tags": ["reference", "ai-search", "google"], "body": "Google's own documentation on AI features in Search. The position we rely on: appearing in AI Overviews and AI Mode runs on the same systems as ordinary Search \u2014 there is no separate \"AI SEO\" lever, and standard indexing/eligibility is the floor. Underpins [AI search impact on local](/local-seo/ai-search-local.md).\n\n> Verify the exact live URL before publishing \u2014 Google reorganises its Search Central docs periodically.\n\n# Citations\n\n[1] [Google Search Central \u2014 AI features and your website](https://developers.google.com/search/docs/appearance/ai-features)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/seer-chatgpt-conversion", "type": "Reference", "title": "Seer Interactive ChatGPT conversion case study", "description": "Single-client case study comparing how ChatGPT traffic converts vs Google organic.", "resource": "https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts", "tags": ["reference", "ai-search", "conversion"], "body": "Seer Interactive case study on how AI-assistant traffic converts. Verified figures: **ChatGPT traffic converted at ~15.9% vs ~1.76% for Google organic** on the site studied. Important caveat carried through to our docs: this is **one client's data**, so treat it as directional, not a benchmark. Cited in [AI search impact on local](/local-seo/ai-search-local.md).\n\n# Citations\n\n[1] [Case study: how traffic from ChatGPT converts](https://www.seerinteractive.com/insights/case-study-6-learnings-about-how-traffic-from-chatgpt-converts)\n", "links": ["local-seo/ai-search-local"]}, {"id": "references/sterling-sky", "type": "Reference", "title": "Sterling Sky review research", "description": "Joy Hawkins' agency research on how review recency affects local ranking \u2014 the basis for the 18-day rule.", "resource": "https://www.sterlingsky.ca/number-of-reviews-impact-ranking/", "tags": ["reference", "reviews"], "body": "Sterling Sky (founded by Joy Hawkins) publishes case-study research on local ranking. We cite it for the **18-day rule** \u2014 the observation, drawn from client case studies, that local rankings can weaken once a business goes roughly two to three weeks without a new review. It is a community-recognised pattern, **not** confirmed Google policy. Used in [reviews & reputation](/local-seo/reviews-reputation.md).\n\n# Citations\n\n[1] [Does the number of Google reviews impact ranking?](https://www.sterlingsky.ca/number-of-reviews-impact-ranking/)\n", "links": ["local-seo/reviews-reputation"]}, {"id": "references/whitespark-2026", "type": "Reference", "title": "Whitespark Local Search Ranking Factors", "description": "Whitespark's annual local search ranking-factors study; used here for the relative importance of factors, not exact weights.", "resource": "https://whitespark.ca/local-search-ranking-factors/", "tags": ["reference", "ranking-factors"], "body": "Whitespark's annual Local Search Ranking Factors study ranks the signals that influence local pack and local organic results. We cite it **qualitatively** \u2014 for the *relative* importance of factors (e.g. that Google Business Profile is the leading driver of local pack visibility, and that review and citation signals matter for AI discovery). The precise percentage weightings sit inside Whitespark's full report and are not publicly published, so this bundle does not assert specific percentages.\n\n# Citations\n\n[1] [Local Search Ranking Factors](https://whitespark.ca/local-search-ranking-factors/)\n", "links": []}];
const byId = {}; DATA.forEach(c => byId[c.id] = c);
const palette = {};
const colors = ["#0f3460","#e94560","#16a085","#8e44ad","#d35400","#2980b9","#27ae60","#c0392b","#7f8c8d"];
DATA.forEach(c => { if(!(c.type in palette)) palette[c.type] = colors[Object.keys(palette).length % colors.length]; });

const elements = [];
DATA.forEach(c => elements.push({data:{id:c.id,label:c.title,type:c.type}}));
const seen = new Set();
DATA.forEach(c => c.links.forEach(t => { if(byId[t]){const k=c.id+"->"+t; if(!seen.has(k)){seen.add(k);elements.push({data:{id:k,source:c.id,target:t}});}}}));

const cy = cytoscape({container:document.getElementById("cy"),elements,
  style:[
    {selector:"node",style:{"background-color":ele=>palette[ele.data("type")]||"#888","label":"data(label)","font-size":"10px","color":"#1a1a2e","text-wrap":"wrap","text-max-width":"110px","text-valign":"bottom","text-margin-y":"3px","width":"22px","height":"22px"}},
    {selector:"edge",style:{"width":1.2,"line-color":"#b8c4dd","target-arrow-color":"#b8c4dd","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":0.8}},
    {selector:".faded",style:{"opacity":0.15}},
    {selector:".sel",style:{"border-width":3,"border-color":"#e94560"}}
  ],
  layout:{name:"cose",animate:false,padding:30}});

const tf = document.getElementById("typeFilter");
tf.innerHTML = '<option value="">all types</option>' + Object.keys(palette).map(t=>`<option>${t}</option>`).join("");

function render(c){
  let b = marked.parse(c.body);
  b = b.replace(/href="(\/[^"]+)\.md"/g,'class="xlink" data-id="$1" href="javascript:void(0)"').replace(/data-id="\//g,'data-id="');
  const backlinks = DATA.filter(o=>o.links.includes(c.id));
  document.getElementById("panel").innerHTML =
    `<h2>${c.title}</h2><div class="meta"><span class="tag" style="background:${palette[c.type]};color:#fff">${c.type}</span> ${c.id}</div>`+
    (c.description?`<p>${c.description}</p>`:"")+
    (c.resource?`<p class="hint">resource: <a href="${c.resource}" target="_blank">${c.resource}</a></p>`:"")+
    (c.tags&&c.tags.length?`<div>${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:"")+
    `<div class="body">${b}</div>`+
    (backlinks.length?`<div class="backlinks"><strong>Cited by</strong>${backlinks.map(o=>`<a class="xlink" data-id="${o.id}">${o.title}</a>`).join("")}</div>`:"");
  document.querySelectorAll(".xlink").forEach(a=>a.onclick=()=>{const id=a.getAttribute("data-id");if(byId[id])select(id);});
}
function select(id){cy.nodes().removeClass("sel");const n=cy.getElementById(id);n.addClass("sel");if(byId[id])render(byId[id]);}
cy.on("tap","node",e=>select(e.target.id()));

document.getElementById("search").oninput=e=>{const q=e.target.value.toLowerCase();cy.nodes().forEach(n=>{const c=byId[n.id()];const hit=!q||c.title.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||(c.tags||[]).join(" ").toLowerCase().includes(q);n.toggleClass("faded",!hit);});};
tf.onchange=e=>{const t=e.target.value;cy.nodes().forEach(n=>n.toggleClass("faded",t&&byId[n.id()].type!==t));};
document.getElementById("layout").onchange=e=>cy.layout({name:e.target.value,animate:false,padding:30}).run();
</script></body></html>
